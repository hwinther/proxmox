# Schedules only on Raspberry Pi edge workers: label role=sdr-edge and taint
# node-type=edge-sdr:NoSchedule (see cluster-architecture-plan.md, infra/k0s/raspberry-pi-worker.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: podinfo-edge
  namespace: podinfo-edge-sdr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: podinfo-edge
  template:
    metadata:
      labels:
        app: podinfo-edge
    spec:
      tolerations:
        - key: node-type
          operator: Equal
          value: edge-sdr
          effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - sdr-edge
      containers:
        - name: podinfod
          image: ghcr.io/stefanprodan/podinfo:6.11.2
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9898
              protocol: TCP
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: podinfo-edge
  namespace: podinfo-edge-sdr
spec:
  type: ClusterIP
  ports:
    - port: 9898
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app: podinfo-edge
