# Prometheus in agent mode: scrape edge node-exporter, remote_write to production Prometheus (NodePort 30081).
# Requires Secret prometheus-agent-remote-write (see prometheus-agent-edge-sdr-secrets.md).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: prometheus-agent
  namespace: prometheus-agent-edge-sdr
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
  - name: node-exporter
    namespace: node-exporter-edge-sdr
  chart:
    spec:
      chart: prometheus
      version: "29.2.1"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: prometheus-agent-edge-sdr
  valuesFrom:
  - kind: Secret
    name: prometheus-agent-remote-write
    valuesKey: values.yaml
    optional: false
  values:
    alertmanager:
      enabled: false
    kube-state-metrics:
      enabled: false
    prometheus-node-exporter:
      enabled: false
    prometheus-pushgateway:
      enabled: false
    scrapeConfigs:
      prometheus:
        enabled: false
      kubernetes-api-servers:
        enabled: false
      kubernetes-nodes:
        enabled: false
      kubernetes-nodes-cadvisor:
        enabled: false
      kubernetes-service-endpoints:
        enabled: false
      kubernetes-service-endpoints-slow:
        enabled: false
      prometheus-pushgateway:
        enabled: false
      kubernetes-services:
        enabled: false
      kubernetes-pods:
        enabled: false
      kubernetes-pods-slow:
        enabled: false
    server:
      name: server
      # The prometheus chart ALWAYS renders this as the single top-level `global:`
      # in prometheus.yml. Do NOT also put `global:` under serverFiles.prometheus.yml
      # — the chart appends that verbatim, yielding a duplicate `global` key that
      # Prometheus rejects (`field global already set`).
      global:
        scrape_interval: 30s
        scrape_timeout: 10s
        evaluation_interval: 1m
        external_labels:
          cluster: edge-sdr
      replicaCount: 1
      persistentVolume:
        enabled: false
      defaultFlagsOverride:
      - --agent
      - --config.file=/etc/config/prometheus.yml
      - --web.enable-lifecycle
      - --storage.agent.path=/prometheus
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
      tolerations: []
    serverFiles:
      prometheus.yml:
        # global lives under `server.global` (above) — the chart owns the single
        # top-level `global:`. remote_write is merged in from the
        # prometheus-agent-remote-write Secret (serverFiles.prometheus.yml.remote_write).
        rule_files: []
        scrape_configs:
        - job_name: kubernetes-endpoints-node-exporter
          kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names:
              - node-exporter-edge-sdr
          relabel_configs:
          - source_labels: [ __meta_kubernetes_service_name ]
            action: keep
            regex: node-exporter-prometheus-node-exporter
          - source_labels: [ __meta_kubernetes_endpoint_port_name ]
            action: keep
            regex: metrics
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [ __meta_kubernetes_pod_node_name ]
            action: replace
            target_label: node
          - source_labels: [ __meta_kubernetes_namespace ]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [ __meta_kubernetes_service_name ]
            action: replace
            target_label: kubernetes_name
