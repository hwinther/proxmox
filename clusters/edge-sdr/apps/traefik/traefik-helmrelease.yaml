apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    app.kubernetes.io/part-of: edge-sdr
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  # Detect manual changes to Helm-managed resources (warn-only; flip to enabled per-release once proven quiet).
  driftDetection:
    mode: warn
  interval: 30m
  ## CRDs applied from traefik-crds.yaml (same chart version); avoid Helm/Flux ordering issues.
  install:
    crds: Skip
  upgrade:
    crds: Skip
  chart:
    spec:
      chart: traefik
      version: "40.3.0"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    deployment:
      kind: DaemonSet
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    hostNetwork: true
    # Sized from observed usage (1m CPU, 52Mi); memory-limited for the 2vCPU/low-RAM Pis,
    # no CPU limit to avoid throttling the ingress data path.
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
      limits:
        memory: 192Mi
    # Chart v40 moved Service.type under service.spec (PR #1686, "align syntax with
    # upstream"). hostNetwork DaemonSet ingress comes in via the node, so keep ClusterIP
    # rather than the new LoadBalancer default.
    service:
      spec:
        type: ClusterIP
    ports:
      traefik:
        port: 9000
        expose:
          default: false
      web:
        port: 8000
        expose:
          default: true
      websecure:
        port: 8444
        expose:
          default: true
