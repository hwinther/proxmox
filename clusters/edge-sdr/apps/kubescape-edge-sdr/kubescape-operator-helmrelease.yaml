apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kubescape
  namespace: kubescape-edge-sdr
spec:
  interval: 30m
  # node-agent pulls eBPF-heavy image and waits for /readyz on every node; allow slow clusters.
  timeout: 30m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  dependsOn:
    - name: ceph-csi-rbd
      namespace: ceph-csi-edge-sdr
  chart:
    spec:
      chart: kubescape-operator
      version: "1.30.6"
      sourceRef:
        kind: HelmRepository
        name: kubescape
        namespace: kubescape-edge-sdr
  values:
    # hostScanner defaults include control-plane tolerations; node-agent and storage fall back to
    # customScheduling — without this, DaemonSets / storage may never schedule on k0s controllers.
    # Keep all Kubescape pods on the x86 / main node: Pi workers use role=sdr-edge (see
    # infra/k0s/raspberry-pi-worker.md). DoesNotExist OR NotIn matches the main node with or without role=*.
    customScheduling:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: DoesNotExist
              - matchExpressions:
                  - key: role
                    operator: NotIn
                    values:
                      - sdr-edge
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
    clusterName: edge-sdr
    ksNamespace: kubescape-edge-sdr
    excludeNamespaces: "kubescape,kubescape-edge-sdr,kube-system,kube-public,kube-node-lease,kubeconfig,gmp-system,gmp-public"
    capabilities:
      continuousScan: enable
      networkPolicyService: enable
    # k0s: node-agent /readyz was HTTP 500 with privileged: false (eBPF/debugfs); required for runtime/network features.
    nodeAgent:
      privileged: true

    # 2 vCPU node was ~95% CPU-requested; defaults (storage 100m + kubevuln 300m) could not schedule. Requests are
    # scheduling hints only — limits stay at chart defaults for burst (Grype scans).
    storage:
      resources:
        requests:
          cpu: 30m
          memory: 400Mi
        limits:
          cpu: 1500m
          memory: 1500Mi
    kubevuln:
      resources:
        requests:
          cpu: 50m
          memory: 1000Mi
          ephemeral-storage: 5Gi
        limits:
          cpu: 1500m
          memory: 5000Mi
          ephemeral-storage: 10Gi

    # Explicit SC (same as clusters/edge-sdr/apps/ceph-csi) — avoids ambiguous default and documents intent.
    # If PVCs were created while no provisioner existed, delete them and reconcile (see README.md).
    persistence:
      storageClass: ceph-rbd
