# Piaware / FR24 / adsbexchange / opensky — reach dump1090-fa via in-namespace Service (beast ports).
# Requires node label edge-sdr/adsb-antenna=true (hardware with ADS-B antenna/SDR).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: piaware
  namespace: adsb-edge-sdr
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: piaware
  template:
    metadata:
      labels:
        app: piaware
        app.kubernetes.io/name: piaware
        app.kubernetes.io/part-of: adsb-edge-sdr
    spec:
      tolerations:
      - key: node-type
        operator: Equal
        value: edge-sdr
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                - sdr-edge
              - key: edge-sdr/adsb-antenna
                operator: In
                values:
                - "true"
      containers:
      - name: piaware
        image: ghcr.io/hwinther/wsh-rtl-sdr/piaware:0.4.0@sha256:27976bec6f98e3c652ad95503f3e355ff795a5d32d4a1421e722ad03bd78cab8
        imagePullPolicy: IfNotPresent
        # env after envFrom so RECEIVER_* / MLAT_* override any accidental ConfigMap keys.
        envFrom:
        - configMapRef:
            name: adsb-env
        - secretRef:
            name: adsb-secret
            optional: true
        env:
        - name: RECEIVER_TYPE
          value: other
        - name: RECEIVER_HOST
          value: localhost
        - name: RECEIVER_PORT
          value: "30005"
        - name: MLAT_BEAST_HOST
          value: dump1090-fa
        - name: MLAT_BEAST_PORT
          value: "30104"
        resources:
          requests:
            cpu: 50m
            memory: 32Mi
          limits:
            cpu: 500m
            memory: 256Mi
