# Publishes dump1090-fa's decoded aircraft.json to the production Mosquitto broker (full snapshot
# per poll → topic adsb/aircraft). dump1090-fa has no native MQTT, and it serves the JSON only as a
# file on the shared hostPath (HTTP /data/aircraft.json 404s on this image), so this co-locates with
# dump1090-fa (podAffinity) and reads the same hostPath read-only — same dir tar1090 consumes.
#
# Prerequisites: (1) build the adsb-mqtt image in hwinther/wsh-rtl-sdr and pin the tag/digest below;
# (2) create the `adsb` mosquitto user + the `adsb-mqtt-secret` (MQTT_PASSWORD) — see README.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adsb-mqtt
  namespace: adsb-edge-sdr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: adsb-mqtt
  template:
    metadata:
      labels:
        app: adsb-mqtt
        app.kubernetes.io/name: adsb-mqtt
        app.kubernetes.io/part-of: adsb-edge-sdr
    spec:
      tolerations:
      - key: node-type
        operator: Equal
        value: edge-sdr
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                - sdr-edge
              - key: edge-sdr/adsb-antenna
                operator: In
                values:
                - "true"
        # Must land on the same node as dump1090-fa — aircraft.json is a node-local hostPath.
        podAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: dump1090-fa
            topologyKey: kubernetes.io/hostname
      containers:
      - name: adsb-mqtt
        image: ghcr.io/hwinther/wsh-rtl-sdr/adsb-mqtt:0.6.0@sha256:51d342d8070aa6ff2093e529600aa7e636a1351bdbf0842b6b266b0b62881947
        imagePullPolicy: IfNotPresent
        env:
        - name: MQTT_HOST
          value: "10.20.13.100"
        - name: MQTT_PORT
          value: "1883"
        - name: MQTT_USERNAME
          value: "adsb"
        - name: MQTT_TOPIC
          value: "adsb/aircraft"
        - name: AIRCRAFT_JSON
          value: "/data/aircraft.json"
        - name: POLL_INTERVAL
          value: "1"
        # MQTT_PASSWORD from the Secret; optional so the pod still starts before the Secret exists.
        envFrom:
        - secretRef:
            name: adsb-mqtt-secret
            optional: true
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: dump1090-run
          mountPath: /data
          readOnly: true
      volumes:
      - name: dump1090-run
        hostPath:
          path: /var/lib/k8s-edge-sdr/dump1090-fa
          type: DirectoryOrCreate
