# Requires node label edge-sdr/adsb-antenna=true (hardware with ADS-B antenna/SDR).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dump1090-fa
  namespace: adsb-edge-sdr
spec:
  replicas: 1
  # Edge node: avoid default maxSurge (25% → +1 pod) doubling memory during Flux/image rollouts.
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 0
      maxUnavailable: 1
  selector:
    matchLabels:
      app: dump1090-fa
  template:
    metadata:
      labels:
        app: dump1090-fa
        app.kubernetes.io/name: dump1090-fa
        app.kubernetes.io/part-of: adsb-edge-sdr
    spec:
      tolerations:
      - key: node-type
        operator: Equal
        value: edge-sdr
        effect: NoSchedule
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: role
                operator: In
                values:
                - sdr-edge
              - key: edge-sdr/adsb-antenna
                operator: In
                values:
                - "true"
      containers:
      - name: dump1090-fa
        image: ghcr.io/hwinther/wsh-rtl-sdr/dump1090-fa:0.6.0@sha256:85882cfd2c49031f8487b2ab1e7d631f6da11fcc7055f9db7db5f052577c37fa
        imagePullPolicy: IfNotPresent
        # ConfigMap then Secret: shared keys (e.g. LAT/LON) in Secret override ConfigMap.
        envFrom:
        - configMapRef:
            name: adsb-env
        - secretRef:
            name: adsb-secret
            optional: true
        securityContext:
          privileged: true
        volumeMounts:
        - name: dev-bus-usb
          mountPath: /dev/bus/usb
        - name: dump1090-run
          mountPath: /run/dump1090-fa
        readinessProbe:
          tcpSocket:
            port: 30005
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 30005
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
        startupProbe:
          tcpSocket:
            port: 30005
          failureThreshold: 36
          periodSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 64Mi
          limits:
            cpu: "1"
            memory: 384Mi
      # Prometheus exporter sidecar: reads stats.json/aircraft.json from the shared
      # dump1090-run volume and serves reception metrics (message rate, aircraft counts,
      # max range, signal levels) on :9105 — scraped by prometheus-agent-edge-sdr and
      # remote-written to production Prometheus, so history survives pod restarts.
      - name: dump1090-exporter
        image: ghcr.io/hwinther/wsh-rtl-sdr/dump1090-exporter:0.6.0@sha256:d3b24a89d73bfc143762d40cd254d1dc20a5edda9bf042ee9e69b41f46deebbe
        imagePullPolicy: IfNotPresent
        # LAT/LON for max-range calculation (Secret overrides ConfigMap with precise coords).
        envFrom:
        - configMapRef:
            name: adsb-env
        - secretRef:
            name: adsb-secret
            optional: true
        ports:
        - name: metrics
          containerPort: 9105
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 10
          periodSeconds: 15
        securityContext:
          runAsNonRoot: true
          runAsUser: 65534
          runAsGroup: 65534
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        volumeMounts:
        - name: dump1090-run
          mountPath: /run/dump1090-fa
          readOnly: true
        resources:
          requests:
            cpu: 20m
            memory: 48Mi
          limits:
            memory: 128Mi
      volumes:
      - name: dev-bus-usb
        hostPath:
          path: /dev/bus/usb
          type: Directory
      - name: dump1090-run
        hostPath:
          path: /var/lib/k8s-edge-sdr/dump1090-fa
          type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: dump1090-fa
  namespace: adsb-edge-sdr
spec:
  selector:
    app: dump1090-fa
  ports:
  - name: http
    port: 80
    targetPort: 80
  - name: raw-out
    port: 30002
    targetPort: 30002
  - name: sbs
    port: 30003
    targetPort: 30003
  - name: beast-in-a
    port: 30004
    targetPort: 30004
  - name: beast-out
    port: 30005
    targetPort: 30005
  - name: beast-in-b
    port: 30104
    targetPort: 30104
  - name: metrics
    port: 9105
    targetPort: metrics
