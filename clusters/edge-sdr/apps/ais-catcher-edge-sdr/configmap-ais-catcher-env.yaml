# Station and dongle defaults. **ais-catcher-secret** can override any key (e.g. LAT/LON,
# EXTRA_ARGS); see README.md.
apiVersion: v1
kind: ConfigMap
metadata:
  name: ais-catcher-env
  namespace: ais-catcher-edge-sdr
data:
  DEVICE_INDEX: "00000162"
  BIASTEE: "on"
  LAT: "59.000000"
  LON: "10.000000"
  STATION_NAME: "Gjonnes"
  STATION_URL: "https://ais.edge-sdr.wsh.no"
  AIS_CATCHER_PORT: "8080"
  EXTRA_ARGS: ""
