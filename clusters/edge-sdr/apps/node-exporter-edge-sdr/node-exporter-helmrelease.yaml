# Host metrics on all nodes (including tainted SDR Pis). Scraping / remote_write to production is a follow-up.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: node-exporter
  namespace: node-exporter-edge-sdr
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: prometheus-node-exporter
      version: "4.52.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: node-exporter-edge-sdr
  values:
    # Edge Traefik uses hostNetwork; avoid hostPort 9100 clashes (matches production kps pattern).
    hostNetwork: false
    dnsPolicy: ClusterFirst
    # Avoid requiring shared/slave mount propagation on host `/`.
    hostRootFsMount:
      mountPropagation: None
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
    # Chart default tolerates all NoSchedule taints (includes node-type=edge-sdr).
    tolerations:
      - effect: NoSchedule
        operator: Exists
    nodeSelector:
      kubernetes.io/os: linux
