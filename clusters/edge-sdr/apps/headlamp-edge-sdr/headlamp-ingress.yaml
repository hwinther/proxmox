apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp-edge-sdr
  annotations:
    # Homepage infers http:// when spec.tls is absent; force https since LAN nginx terminates TLS upstream.
    gethomepage.dev/href: "https://headlamp.mgmt-edge-sdr.wsh.no/"
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Same-namespace form (no `<namespace>-` prefix). Traefik's parser splits the prefixed
    # form on the LAST hyphen, which is ambiguous when the namespace itself has hyphens —
    # `headlamp-edge-sdr-authelia-forwardauth@kubernetescrd` resolves to namespace
    # `headlamp-edge-sdr-authelia`, name `forwardauth` (does not exist). The Middleware lives
    # in the same namespace as this Ingress, so the unqualified form is correct and unambiguous.
    traefik.ingress.kubernetes.io/router.middlewares: authelia-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Headlamp
    gethomepage.dev/icon: mdi-view-dashboard-variant
    gethomepage.dev/description: Kubernetes UI with Flux GitOps plugin
spec:
  rules:
  - host: headlamp.mgmt-edge-sdr.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headlamp
            port:
              number: 80
