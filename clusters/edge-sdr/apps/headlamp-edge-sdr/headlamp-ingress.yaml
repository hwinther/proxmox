apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp-edge-sdr
  annotations:
    # Homepage infers http:// when spec.tls is absent; force https since LAN nginx terminates TLS upstream.
    gethomepage.dev/href: "https://headlamp.mgmt-edge-sdr.wsh.no/"
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Format: <namespace>-<name>@kubernetescrd. Traefik's kubernetes-ingress provider registers
    # middlewares under this exact key; the bare/same-namespace shorthand is only honored on
    # IngressRoute CRDs, not standard Ingress. Matches the production Headlamp annotation style.
    traefik.ingress.kubernetes.io/router.middlewares: headlamp-edge-sdr-authelia-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Headlamp
    gethomepage.dev/icon: mdi-view-dashboard-variant
    gethomepage.dev/description: Kubernetes UI with Flux GitOps plugin
spec:
  rules:
  - host: headlamp.mgmt-edge-sdr.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headlamp
            port:
              number: 80
