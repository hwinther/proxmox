apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp-edge-sdr
spec:
  # Detect manual changes to Helm-managed resources (warn-only; flip to enabled per-release once proven quiet).
  driftDetection:
    mode: warn
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp-edge-sdr
  ## Headlamp loads OIDC discovery inside the pod (https://auth.wsh.no/...). Issuer TLS must be reachable
  ## from the pod; edge-sdr Pis don't get split-horizon DNS for auth.wsh.no so we hostAlias it to the LAN
  ## nginx box that fronts the production cluster's Authelia (mirrors clusters/production/apps/headlamp-production
  ## /headlamp-helmrelease.yaml). Egress is SNAT to the node; allow node subnet → 10.20.13.201:443.
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Deployment
          name: headlamp
          namespace: headlamp-edge-sdr
        patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: headlamp
            namespace: headlamp-edge-sdr
          spec:
            template:
              spec:
                hostAliases:
                  - ip: 10.20.13.201
                    hostnames:
                      - auth.wsh.no
  values:
    ## Flux sidebar plugin — copy baked image into shared emptyDir (see headlamp-k8s/plugins flux README).
    config:
      pluginsDir: /build/plugins
      # Without -oidc-ca-file, Headlamp passes a non-nil empty OIDC CA to the OIDC client (GetInClusterContext),
      # which logs "couldn't add custom cert to context" on every /oidc request. Point at the image CA bundle.
      extraArgs:
      - "-oidc-ca-file=/etc/ssl/certs/ca-certificates.crt"
      oidc:
        secret:
          create: true
          name: headlamp-oidc
        clientID: kube-apiserver-edge-sdr
        issuerURL: https://auth.wsh.no
        scopes: openid profile email groups
        callbackURL: https://headlamp.mgmt-edge-sdr.wsh.no/oidc-callback
        usePKCE: true
    initContainers:
    - name: headlamp-plugins
      image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build
      securityContext:
        runAsNonRoot: false
        privileged: false
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    - name: kubescape-plugin
      # Pinned to the `latest` digest (post-v0.11.2 code) to test a fix for the CVE drill-down crash
      # "Cannot read properties of undefined (reading 'imageScan')" against operator chart 1.40.2.
      # v0.11.2 is the newest *released* tag and still crashes; revert to :v0.11.2 if latest misbehaves.
      image: quay.io/kubescape/headlamp-plugin@sha256:b5bf33c9d48c4c4fca01c937e461293f18b17d0b590fa45276c063f8213779be
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build/plugins
      securityContext:
        runAsNonRoot: false
        privileged: false
        runAsUser: 0
        runAsGroup: 0
      volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    volumeMounts:
    - name: headlamp-plugins
      mountPath: /build/plugins
    volumes:
    - name: headlamp-plugins
      emptyDir: {}
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
