apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: ghcr.io/hwinther/test/frontend:0.53.0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: API_URL
          value: "http://api:8080"
        - name: VITE_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "https://otel.kt.wsh.no/v1/traces"
        - name: VITE_OTEL_SERVICE_NAME
          value: "frontend"
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: test
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: frontend
