apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutterstock-frontend
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clutterstock-frontend
  template:
    metadata:
      labels:
        app: clutterstock-frontend
    spec:
      containers:
      - name: clutterstock-frontend
        image: ghcr.io/hwinther/clutterstock/frontend:1.0.0
        imagePullPolicy: Always
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        env:
        - name: PORT
          value: "8080"
        - name: VITE_API_URL
          value: "http://clutterstock-api:8080"
        ## Browser OTLP/HTTP — must match Traefik ingress host in observability/observability-ingress.yaml
        - name: VITE_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "http://otel.kt.wsh.no/v1/traces"
        - name: VITE_OTEL_SERVICE_NAME
          value: "clutterstock-frontend"
---
apiVersion: v1
kind: Service
metadata:
  name: clutterstock-frontend
  namespace: test
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: clutterstock-frontend
