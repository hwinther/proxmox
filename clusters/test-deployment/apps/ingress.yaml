apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-frontend
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Test Frontend
    gethomepage.dev/icon: mdi-application-outline
    gethomepage.dev/description: Test project frontend
spec:
  rules:
  - host: test.kt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-frontend
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test-api
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Test API
    gethomepage.dev/icon: mdi-api
    gethomepage.dev/description: Test project API
spec:
  rules:
  - host: api.kt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-api
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clutterstock
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Clutterstock
    gethomepage.dev/icon: mdi-image-multiple-outline
    gethomepage.dev/description: Clutterstock web app (API under /api/)
    gethomepage.dev/pod-selector: app in (clutterstock-frontend, clutterstock-api)
spec:
  rules:
  - host: clutterstock.kt.wsh.no
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: clutterstock-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clutterstock-frontend
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: redisinsight
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: RedisInsight (KT test cluster)
    gethomepage.dev/icon: redis
    gethomepage.dev/description: Redis management UI — preconnected to Redis in namespace test
spec:
  rules:
  - host: redis.mgmt-kt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: redisinsight
            port:
              number: 5540
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: test
