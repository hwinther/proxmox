# Bump metadata.name (e.g. v091) when changing migrator image so applies succeed (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-migrate-v093
  namespace: test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator@sha256:b6a8642d79f2ee69afd596c79b88f6063d96b78b75cc4ebf02b64851662322fc # 0.10.0
        imagePullPolicy: Always
        env:
        - name: ConnectionStrings__ClutterStock
          value: Data Source=/data/clutterstock.db
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: clutterstock-api-sqlite
