# Bump metadata.name (e.g. v071) when changing migrator image so applies succeed (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-migrate-v070
  namespace: test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:0.7.0
        imagePullPolicy: Always
        env:
        - name: ConnectionStrings__Default
          value: Data Source=/data/clutterstock.db
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: clutterstock-api-sqlite
