# Bump metadata.name (e.g. v091) when changing migrator image so applies succeed (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-migrate-v102
  namespace: test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:0.25.0
        imagePullPolicy: Always
        env:
        - name: ConnectionStrings__ClutterStock
          valueFrom:
            secretKeyRef:
              name: clutterstock-pg-secret
              key: uri
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
