apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: kyverno
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: kyverno
  values:
    config:
      maxContextSize: 8Mi
    features:
      controllerRuntimeMetrics:
        bindAddress: "0"
      # Same as production: helps resource webhooks only; policy webhooks stay Fail in Kyverno 1.17.x.
      forceFailurePolicyIgnore:
        enabled: true
    admissionController:
      replicas: 1
      # Same as production: apiserver → webhook Service ClusterIP breaks under k0s+Cilium without kube-proxy.
      # (enable-aggregator-routing does not fix admission webhooks — only aggregated APIs.)
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      webhookServer:
        port: 10443
      metering:
        port: 28543
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      startupProbe:
        httpGet:
          path: /health/liveness
          port: 10443
          scheme: HTTPS
        failureThreshold: 20
        initialDelaySeconds: 2
        periodSeconds: 6
      livenessProbe:
        httpGet:
          path: /health/liveness
          port: 10443
          scheme: HTTPS
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 2
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /health/readiness
          port: 10443
          scheme: HTTPS
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 512Mi
    backgroundController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    cleanupController:
      replicas: 1
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
    reportsController:
      replicas: 1
      rbac:
        clusterRole:
          extraResources:
            - apiGroups: ["flowcontrol.apiserver.k8s.io"]
              resources: ["flowschemas", "prioritylevelconfigurations"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["node.k8s.io"]
              resources: ["runtimeclasses"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["storage.k8s.io"]
              resources: ["csistoragecapacities"]
              verbs: ["get", "list", "watch"]
            - apiGroups: ["traefik.io"]
              resources: ["tlsoptions"]
              verbs: ["get", "list", "watch"]
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          cpu: 500m
          memory: 512Mi
