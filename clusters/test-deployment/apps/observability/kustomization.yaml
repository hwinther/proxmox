apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: test
resources:
- namespace-test.yaml
- helmrepositories.yaml
- prometheus-helmrelease.yaml
- loki-helmrelease.yaml
- tempo-helmrelease.yaml
- grafana-helmrelease.yaml
- otel-collector-helmrelease.yaml
- observability-ingress.yaml
configMapGenerator:
- name: grafana-dashboards-custom
  files:
  - dashboards/aspnet-core-otel.json
  - dashboards/cnpg-cluster.json
  options:
    disableNameSuffixHash: true
