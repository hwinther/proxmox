apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Grafana
    gethomepage.dev/icon: grafana
    gethomepage.dev/description: Observability dashboards
spec:
  rules:
    - host: grafana.mgmt-kt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-grafana
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: otel-cors
  namespace: test
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - OPTIONS
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
    accessControlAllowOriginList:
      - https://clutterstock.kt.wsh.no
      - https://test.kt.wsh.no
    accessControlMaxAge: 3600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-otlp-http
  namespace: test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: test-otel-cors@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: OpenTelemetry Collector
    gethomepage.dev/icon: opentelemetry
    gethomepage.dev/description: OTLP HTTP endpoint
spec:
  rules:
    - host: otel.kt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-otel-collector
                port:
                  number: 4318
