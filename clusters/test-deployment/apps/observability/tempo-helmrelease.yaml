apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-tempo
  namespace: test
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: test
  values:
    replicas: 1
    tempo:
      retention: 48h
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
      ## Derive service graph + span metrics from traces and remote_write to Prometheus (see metrics-generator docs).
      metricsGenerator:
        enabled: true
        storage:
          remote_write:
          - url: http://obs-prometheus-server.test.svc.cluster.local:9090/api/v1/write
            send_exemplars: true
      overrides:
        defaults:
          metrics_generator:
            processors:
            - service-graphs
            - span-metrics
    ## No cluster StorageClass — use ephemeral storage
    persistence:
      enabled: false
