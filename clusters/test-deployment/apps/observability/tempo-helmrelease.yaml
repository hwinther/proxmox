apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-tempo
  namespace: test
spec:
  interval: 30m
  timeout: 10m
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: test
  values:
    tempo:
      retention: 48h
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
    persistence:
      enabled: true
      size: 5Gi
