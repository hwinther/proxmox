apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-prometheus
  namespace: test
spec:
  interval: 30m
  timeout: 15m
  chart:
    spec:
      chart: prometheus
      version: "28.14.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: test
  values:
    server:
      extraFlags:
        - web.enable-lifecycle
        - web.enable-otlp-receiver
      retention: 7d
      ## No StorageClass on this cluster — use emptyDir (data lost on pod delete)
      persistentVolume:
        enabled: false
      ## Scrape OpenTelemetry Collector self-metrics (port 8888) for dashboard 15983
      extraScrapeConfigs: |
        - job_name: otel-collector
          honor_timestamps: true
          scrape_interval: 15s
          static_configs:
            - targets:
                - obs-otel-collector.test.svc.cluster.local:8888
              labels:
                service: otel-collector
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 2Gi
    alertmanager:
      enabled: false
    pushgateway:
      enabled: false
    kube-state-metrics:
      enabled: true
    ## HostPort 9100 conflicts with other hostNetwork workloads (e.g. Traefik) on single-node pools
    prometheus-node-exporter:
      enabled: false
