apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-grafana
  namespace: test
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: obs-prometheus
      namespace: test
    - name: obs-loki
      namespace: test
    - name: obs-tempo
      namespace: test
  chart:
    spec:
      chart: grafana
      version: "10.5.15"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: test
  values:
    replicas: 1
    adminUser: admin
    ## Admin password is stored in a Secret created by the chart when this is unset.
    # adminPassword: ""
    testFramework:
      enabled: false
    ## No cluster StorageClass — Grafana uses emptyDir (dashboards re-import after restart)
    persistence:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            uid: prometheus
            type: prometheus
            access: proxy
            url: http://obs-prometheus-server.test.svc.cluster.local
            isDefault: true
          - name: Loki
            uid: loki
            type: loki
            access: proxy
            url: http://obs-loki-gateway.test.svc.cluster.local
            jsonData:
              httpHeaderName1: X-Scope-OrgID
            secureJsonData:
              httpHeaderValue1: foo
          - name: Tempo
            uid: tempo
            type: tempo
            access: proxy
            url: http://obs-tempo.test.svc.cluster.local:3200
            jsonData:
              httpMethod: GET
              ## Service graph uses metrics from Tempo metrics-generator → Prometheus remote_write.
              serviceMap:
                datasourceUid: prometheus
              tracesToLogs:
                datasourceUid: loki
                tags: ["service.name"]
    dashboardProviders:
      dashboardproviders.yaml:
        apiVersion: 1
        providers:
          - name: default
            orgId: 1
            folder: ""
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/default
          ## Separate path so dashboardsConfigMaps does not collide with the default provider volume (gnet downloads).
          - name: custom
            orgId: 1
            folder: Custom
            type: file
            disableDeletion: false
            editable: true
            options:
              path: /var/lib/grafana/dashboards/custom
    ## Patched ASP.NET OTEL dashboard (see kustomization configMapGenerator).
    dashboardsConfigMaps:
      custom: grafana-dashboard-aspnet-otel
    dashboards:
      default:
        opentelemetry-collector:
          gnetId: 15983
          revision: 29
          datasource: Prometheus
        opentelemetry-collector-dataflow:
          gnetId: 18309
          revision: 1
          datasource: Prometheus
        ## ASP.NET Core: grafana.com/19924 uses label_values(http_server_active_requests,…) for variables;
        ## that gauge is often missing when only histogram metrics are exported. Patched copy in ConfigMap.
