apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-loki
  namespace: test
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: test
  values:
    ## One replica per workload (gateway, caches, MinIO, Loki). MinIO uses two in-pod volumes for erasure coding, not two replicas.
    deploymentMode: SingleBinary
    gateway:
      replicas: 1
    test:
      enabled: false
    lokiCanary:
      enabled: false
    ## Off on small test nodes (saves ~8Gi default + scheduling). Loki works without chunk cache at lower perf.
    chunksCache:
      enabled: false
    resultsCache:
      replicas: 1
      allocatedMemory: 256
      allocatedCPU: 100m
    minio:
      enabled: true
      replicas: 1
      persistence:
        enabled: true
        storageClass: local-path
        storageClassName: local-path
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
    loki:
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
      ruler:
        enable_api: true
    singleBinary:
      replicas: 1
      persistence:
        enabled: false
      ## Chart only mounts /var/loki when persistence is on; without this, Loki hits read-only root FS.
      extraVolumes:
        - name: var-loki-data
          emptyDir: {}
      extraVolumeMounts:
        - name: var-loki-data
          mountPath: /var/loki
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
