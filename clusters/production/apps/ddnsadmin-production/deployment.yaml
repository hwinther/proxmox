# Production ddnsadmin deployment.
#
# Different from the QA / preview path (apps/previews/ddnsadmin/base/deployment.yaml) in three
# load-bearing ways:
#
#   1. DDNSADMIN_DEMO=false: scripts/start.sh skips the in-container BIND install, the hard-coded
#      TSIG seed, the example.com zone bootstrap, and the demo `admin` superuser. The pod runs
#      as a slim Django container that talks to an EXTERNAL BIND via TSIG (Zones / TsigKey rows
#      configured through the Django admin UI after the bootstrap superuser logs in).
#
#   2. Runs as non-root (UID 1654) — no NET_BIND_SERVICE, no chown, no named:named ownership.
#      The QA path needs runAsUser:0 because BIND binds :53 and chowns zone files; production
#      doesn't run BIND in-pod, so the strict securityContext applies.
#
#   3. PVC-backed sqlite at /data/ddnsadmin.db (RWO) — survives pod restarts. The preview path
#      keeps the DB on the writable root FS (ephemeral on purpose). Switch DATABASE_URL to a
#      postgres:// URL + drop the PVC if you ever need HA / multi-replica.
#
# Secrets contract (see secrets-bootstrap.md for the create-once values):
#   - ddnsadmin-secrets:  SECRET_KEY, DJANGO_SUPERUSER_PASSWORD (only used when bootstrap is on)
#   - ghcr-pull:          GHCR image-pull credential (private package).
#                         Either clone via a Kyverno ClusterPolicy similar to the preview path,
#                         or create directly in this namespace — see bootstrap doc.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddnsadmin
  namespace: ddnsadmin-production
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ddnsadmin
  template:
    metadata:
      labels:
        app: ddnsadmin
        app.kubernetes.io/name: ddnsadmin
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: ddnsadmin
        image: ghcr.io/hwinther/ddnsadmin/ddnsadmin:placeholder
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: DDNSADMIN_DEMO
          value: "false"
        - name: DEBUG
          value: "false"
        - name: ALLOWED_HOSTS
          value: "ddns.wsh.no"
        - name: WEB_PREFIX
          value: "https://ddns.wsh.no"
        - name: DATABASE_URL
          value: "sqlite:////data/ddnsadmin.db"
        - name: DARKMYST_MAGIC
          value: "false"
        # Production superuser is bootstrapped from the Secret on first boot. The start.sh check
        # is idempotent (no-ops if the user already exists), so leaving the flag on across
        # re-deploys is harmless.
        - name: DJANGO_SUPERUSER_BOOTSTRAP
          value: "true"
        - name: DJANGO_SUPERUSER_USERNAME
          value: "admin"
        - name: DJANGO_SUPERUSER_EMAIL
          value: "admin@wsh.no"
        envFrom:
        - secretRef:
            name: ddnsadmin-secrets
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 384Mi
        volumeMounts:
        - name: data
          mountPath: /data
        # collectstatic writes into /code/static_collected on every boot; emptyDir keeps it off
        # the read-only image layer without consuming PVC capacity.
        - name: static
          mountPath: /code/static_collected
        startupProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ddnsadmin-data
      - name: static
        emptyDir: {}
