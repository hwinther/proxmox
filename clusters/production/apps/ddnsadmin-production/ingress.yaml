# Production ingress. Matches the cluster's Traefik+web entrypoint pattern used by clutterstock
# and authelia. TLS is terminated upstream; the pod sees plain HTTP — `SECURE_PROXY_SSL_HEADER`
# in dweb/settings.py makes Django trust the X-Forwarded-Proto header so CSRF is happy.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ddnsadmin
  namespace: ddnsadmin-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: ddnsadmin
    gethomepage.dev/icon: mdi-dns-outline
    gethomepage.dev/description: Self-service DNS record administration
spec:
  rules:
  - host: ddns.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ddnsadmin
            port:
              number: 8000
