apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
# Safe here: this kustomization only holds cnpg-system resources (no foreign-namespace ones).
namespace: cnpg-system
components:
- ../../../../bases/netpol-baseline
resources:
- namespace.yaml
- helmrepository.yaml
- cnpg-helmrelease.yaml
- cilium-cnpg-operator.yaml
