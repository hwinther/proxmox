# Traefik uses hostNetwork; allow node-originated traffic to oauth2-proxy (fronts Adminer).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-nodes-to-adminer-http
  namespace: postgres-test
spec:
  endpointSelector:
    matchLabels:
      app: oauth2-proxy-adminer
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "4180"
        protocol: TCP
