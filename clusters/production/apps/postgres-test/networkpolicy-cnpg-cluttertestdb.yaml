apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cnpg-cluttertestdb
  namespace: postgres-test
spec:
  podSelector:
    matchLabels:
      cnpg.io/cluster: cluttertestdb
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: clutterstock-test
    ports:
    - port: 5432
      protocol: TCP
  # ClutterStock preview envs (per-PR namespaces labelled clutterstock.wsh.no/preview=true). Same
  # label drives the Kyverno secret-clone policy; reusing it here keeps ingress access in sync
  # with whichever namespaces are enrolled as previews.
  - from:
    - namespaceSelector:
        matchLabels:
          clutterstock.wsh.no/preview: "true"
    ports:
    - port: 5432
      protocol: TCP
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-test
      podSelector:
        matchLabels:
          app: adminer
    ports:
    - port: 5432
      protocol: TCP
  # CNPG instances of this cluster must reach each other for streaming
  # replication / failover (replica -> primary on 5432, instance mgr 8000).
  # Without this the replica can never join: it stays "Creating a new replica".
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-test
      podSelector:
        matchLabels:
          cnpg.io/cluster: cluttertestdb
    ports:
    - port: 5432
      protocol: TCP
    - port: 8000
      protocol: TCP
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cnpg-system
    ports:
    - port: 5432
      protocol: TCP
    - port: 8000
      protocol: TCP
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
    ports:
    - port: 9187
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 10.96.0.0/12
    ports:
    - port: 443
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-test
    ports:
    - port: 5432
      protocol: TCP
    - port: 8000
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - port: 443
      protocol: TCP
    - port: 6443
      protocol: TCP
