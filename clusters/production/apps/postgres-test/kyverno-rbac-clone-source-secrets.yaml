# Same as postgres-production: Kyverno labels clone source Secrets for sync tracking.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-clone-source-secrets
  namespace: postgres-test
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-clone-source-secrets
  namespace: postgres-test
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-clone-source-secrets
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
