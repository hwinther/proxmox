# Mosquitto MQTT broker for Home Assistant + DIY ESP/IoT devices.
# Single replica: one authoritative retained-message store. State (retained
# msgs + persistence DB) lives on a ceph-rbd PVC. eclipse-mosquitto runs as
# the image's built-in non-root uid/gid 1883.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mosquitto
  namespace: mosquitto-production
spec:
  serviceName: mosquitto-headless
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/component: messaging
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      # Copy the Secret-mounted passwd into an emptyDir as mosquitto:mosquitto
      # (1883) mode 0600 so the broker stops warning / future-refusing. Runs as
      # root with only CHOWN — Kyverno run-as-non-root is Audit-only here.
      - name: stage-auth
        image: busybox:1.38
        command:
        - sh
        - -c
        - install -o 1883 -g 1883 -m 0600 /secret/passwd /auth/passwd
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - FOWNER
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: auth-secret
          mountPath: /secret
          readOnly: true
        - name: auth
          mountPath: /auth
      containers:
      - name: mosquitto
        image: docker.io/library/eclipse-mosquitto:2.0.20
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - name: mqtt
          containerPort: 1883
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: mqtt
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: mqtt
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 6
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
          readOnly: true
        - name: auth
          mountPath: /mosquitto/auth
          readOnly: true
        - name: data
          mountPath: /mosquitto/data
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
      - name: auth-secret
        secret:
          secretName: mosquitto-auth
          items:
          - key: passwd
            path: passwd
      # initContainer stages passwd here as 1883:1883 0600 — mosquitto 2.x warns
      # (future versions refuse) on a root-owned / world-readable password file,
      # which is how a Secret volume always mounts.
      - name: auth
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app: mosquitto
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/component: messaging
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: ceph-rbd
      resources:
        requests:
          storage: 1Gi
---
# Headless governing Service for the StatefulSet (stable identity only).
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-headless
  namespace: mosquitto-production
spec:
  clusterIP: None
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: mqtt
    protocol: TCP
---
# LoadBalancer Service: stable LAN VIP via Cilium LB-IPAM + L2 announce.
# In-cluster clients (HA) use mosquitto.mosquitto-production.svc.cluster.local:1883;
# external ESP/IoT clients use 10.20.13.100:1883.
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: mosquitto-production
  annotations:
    lbipam.cilium.io/ips: "10.20.13.100"
spec:
  type: LoadBalancer
  # Local (not Cluster): the allow-mqtt-to-mosquitto CiliumNetworkPolicy gates ingress by source
  # CIDR (10.20.0.0/16). externalTrafficPolicy: Cluster SNATs the client to a per-node cilium IP
  # (10.244.x, identity `world`), which that policy drops — so external publishers (edge AIS-catcher,
  # LAN ESP/IoT) silently time out. Local preserves the real client IP so the CIDR rule matches.
  # With Cilium L2 announcement, Local announces the VIP only from the node running the backend, so
  # the single-replica StatefulSet and the announcing node always co-locate (no forwarding needed).
  externalTrafficPolicy: Local
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: mqtt
    protocol: TCP
