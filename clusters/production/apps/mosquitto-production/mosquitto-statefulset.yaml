# Mosquitto MQTT broker for Home Assistant + DIY ESP/IoT devices.
# Single replica: one authoritative retained-message store. State (retained
# msgs + persistence DB) lives on a ceph-rbd PVC. eclipse-mosquitto runs as
# the image's built-in non-root uid/gid 1883.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mosquitto
  namespace: mosquitto-production
spec:
  serviceName: mosquitto-headless
  replicas: 1
  selector:
    matchLabels:
      app: mosquitto
  template:
    metadata:
      labels:
        app: mosquitto
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/component: messaging
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1883
        runAsGroup: 1883
        fsGroup: 1883
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      # Copy the Secret-mounted passwd into an emptyDir as mosquitto:mosquitto
      # (1883) mode 0600 so the broker stops warning / future-refusing. Runs as
      # root with only CHOWN — Kyverno run-as-non-root is Audit-only here.
      - name: stage-auth
        image: busybox:1.38
        command:
        - sh
        - -c
        - install -o 1883 -g 1883 -m 0600 /secret/passwd /auth/passwd
        securityContext:
          runAsNonRoot: false
          runAsUser: 0
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
            add:
            - CHOWN
            - FOWNER
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: auth-secret
          mountPath: /secret
          readOnly: true
        - name: auth
          mountPath: /auth
      containers:
      - name: mosquitto
        image: docker.io/library/eclipse-mosquitto:2.0.20
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - name: mqtt
          containerPort: 1883
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: mqtt
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: mqtt
          initialDelaySeconds: 15
          periodSeconds: 20
          failureThreshold: 6
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 200m
            memory: 128Mi
        volumeMounts:
        - name: config
          mountPath: /mosquitto/config/mosquitto.conf
          subPath: mosquitto.conf
          readOnly: true
        - name: auth
          mountPath: /mosquitto/auth
          readOnly: true
        - name: data
          mountPath: /mosquitto/data
      # Prometheus exporter sidecar: subscribes to $SYS/# over loopback and exposes broker metrics
      # (broker_clients_connected, broker_uptime, broker_messages_*) on :9234. Scraped by the
      # `mosquitto` PodMonitor; alerts in observability/prometheusrule-mosquitto.yaml. Auth comes from
      # the `monitor` broker user via the mosquitto-exporter-auth Secret (see mosquitto-secrets.md);
      # the Secret is optional so the pod still starts before it exists (metrics just stay empty until
      # the broker accepts the login).
      - name: exporter
        image: docker.io/sapcc/mosquitto-exporter:0.8.0
        imagePullPolicy: IfNotPresent
        args:
        - --endpoint
        - tcp://localhost:1883
        env:
        - name: MQTT_USER
          valueFrom:
            secretKeyRef:
              name: mosquitto-exporter-auth
              key: username
              optional: true
        - name: MQTT_PASS
          valueFrom:
            secretKeyRef:
              name: mosquitto-exporter-auth
              key: password
              optional: true
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        ports:
        - name: metrics
          containerPort: 9234
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /metrics
            port: metrics
          initialDelaySeconds: 5
          periodSeconds: 15
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 64Mi
      volumes:
      - name: config
        configMap:
          name: mosquitto-config
      - name: auth-secret
        secret:
          secretName: mosquitto-auth
          items:
          - key: passwd
            path: passwd
      # initContainer stages passwd here as 1883:1883 0600 — mosquitto 2.x warns
      # (future versions refuse) on a root-owned / world-readable password file,
      # which is how a Secret volume always mounts.
      - name: auth
        emptyDir: {}
  volumeClaimTemplates:
  - metadata:
      name: data
      labels:
        app: mosquitto
        app.kubernetes.io/name: mosquitto
        app.kubernetes.io/component: messaging
    spec:
      accessModes:
      - ReadWriteOnce
      storageClassName: ceph-rbd
      resources:
        requests:
          storage: 1Gi
---
# Headless governing Service for the StatefulSet (stable identity only).
apiVersion: v1
kind: Service
metadata:
  name: mosquitto-headless
  namespace: mosquitto-production
spec:
  clusterIP: None
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: mqtt
    protocol: TCP
---
# LoadBalancer Service: stable LAN VIP via Cilium LB-IPAM + L2 announce.
# In-cluster clients (HA) use mosquitto.mosquitto-production.svc.cluster.local:1883;
# external ESP/IoT clients use 10.20.13.100:1883.
apiVersion: v1
kind: Service
metadata:
  name: mosquitto
  namespace: mosquitto-production
  annotations:
    lbipam.cilium.io/ips: "10.20.13.100"
spec:
  type: LoadBalancer
  # Cluster (not Local): the Cilium L2 announcement lease for this VIP (CiliumL2AnnouncementPolicy
  # `lan-l2`, all control-plane nodes) typically lands on a node that is NOT running this single
  # mosquitto replica. With Local the announcing node has no local backend, so external clients get
  # "connection refused". Cluster lets the announcing node forward to the backend node. Consequence:
  # the client is SNATed to the forwarding node's CiliumInternalIP (Cilium identity `world`), so the
  # allow-mqtt-to-mosquitto policy permits `world` on 1883 (CIDR rules can't match cluster-internal
  # IPs). L3 access is gated by the external firewall + MQTT auth (password_file), not this policy.
  externalTrafficPolicy: Cluster
  selector:
    app: mosquitto
  ports:
  - name: mqtt
    port: 1883
    targetPort: mqtt
    protocol: TCP
