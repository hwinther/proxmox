# ForwardAuth to in-cluster Authelia. The mqttui Ingress references
# mosquitto-production-authelia-forwardauth@kubernetescrd. With Authelia
# default_policy=two_factor (Option A), attaching this middleware is all that's
# needed to gate the UI — no per-host rule in the public proxmox repo.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: mosquitto-production
spec:
  forwardAuth:
    address: http://authelia.authelia-production.svc.cluster.local/api/authz/forward-auth
    maxResponseBodySize: 1048576
    trustForwardHeader: true
    authResponseHeaders:
    - Remote-User
    - Remote-Name
    - Remote-Email
    - Remote-Groups
