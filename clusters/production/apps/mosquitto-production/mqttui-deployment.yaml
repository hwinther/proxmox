# Web MQTT UI (terdia07/mqttui) — mgmt-only inspector for the broker. Stateless
# (no PVC) so a Deployment, not a StatefulSet. Connects to the in-cluster
# Mosquitto Service by short name (same namespace). The broker runs
# allow_anonymous=false, so MQTT_USERNAME/MQTT_PASSWORD are required (one of the
# users in the mosquitto-auth passwd file) — see mqttui-secrets.md.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqttui
  namespace: mosquitto-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqttui
  template:
    metadata:
      labels:
        app: mqttui
        app.kubernetes.io/name: mqttui
        app.kubernetes.io/component: mqtt-ui
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: mqttui
        # TODO: pin by digest once resolvable (repo convention). Verify the image's
        # exact env contract — MQTT_BROKER/MQTT_PORT are confirmed; the auth var
        # names (MQTT_USERNAME/MQTT_PASSWORD) may differ per image build.
        image: docker.io/terdia07/mqttui:latest
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: MQTT_BROKER
          value: mosquitto
        - name: MQTT_PORT
          value: "1883"
        - name: MQTT_USERNAME
          valueFrom:
            secretKeyRef:
              name: mqttui-mqtt
              key: MQTT_USERNAME
        - name: MQTT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mqttui-mqtt
              key: MQTT_PASSWORD
        # SQLite DBs (mqttui_users.db + mqtt_messages.db) — DB_PATH controls the
        # directory derived via os.path.dirname(os.path.abspath(DB_PATH)). Default
        # is relative 'mqtt_messages.db' → /app/, which is root-owned and not
        # writable as uid 1000. Pin to the writable emptyDir below.
        - name: DB_PATH
          value: /data/mqtt_messages.db
        # v2.0 Authentication for the UI login (separate from MQTT broker creds).
        # Defaults baked into the image are admin/changeme — overridden here from
        # the same Secret. Add MQTTUI_ADMIN_USER/PASSWORD/SECRET_KEY to mqttui-mqtt.
        - name: MQTTUI_ADMIN_USER
          valueFrom:
            secretKeyRef:
              name: mqttui-mqtt
              key: MQTTUI_ADMIN_USER
              optional: true
        - name: MQTTUI_ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: mqttui-mqtt
              key: MQTTUI_ADMIN_PASSWORD
              optional: true
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mqttui-mqtt
              key: SECRET_KEY
              optional: true
        ports:
        - name: http
          containerPort: 5000
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 20
          periodSeconds: 20
          failureThreshold: 6
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 250m
            memory: 256Mi
        # terdia07/mqttui derives its SQLite dir from DB_PATH (above) and writes
        # mqttui_users.db + mqtt_messages.db there. /app is root-owned, so we
        # mount a writable emptyDir at /data (DB_PATH=/data/mqtt_messages.db).
        # Ephemeral: admin DB + message history reset on pod restart. Swap for a
        # ceph-rbd PVC if persistence matters (it's just an inspector here).
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        emptyDir:
          sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mqttui
  namespace: mosquitto-production
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: mqttui
