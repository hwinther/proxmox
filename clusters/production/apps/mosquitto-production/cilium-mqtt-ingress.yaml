# Ingress to the broker on 1883 from:
#  - the Home Assistant pod (in-cluster, pod-to-pod via ClusterIP)
#  - LAN / IoT devices reaching the LoadBalancer VIP (arrive as world; the
#    LB datapath is forwarded by host/remote-node). Scoped to the 10.20.0.0/16
#    homelab range so the broker isn't open to arbitrary world identities.
# Auth (password_file) is the real gate; this just narrows the network surface.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-mqtt-to-mosquitto
  namespace: mosquitto-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: mosquitto
  ingress:
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: home-assistant-production
        app: home-assistant
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # mqttui web inspector (same namespace) -> broker on 1883.
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: mosquitto-production
        app: mqttui
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # esp-poller publishes ESP sensor readings + HA Discovery configs.
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: esp-poller-production
        app: esp-poller
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
  # host/remote-node covers node-network sources (e.g. hostNetwork Traefik). `world` is required for
  # external publishers via the LoadBalancer VIP / NodePort: with externalTrafficPolicy: Cluster the
  # client is SNATed to the forwarding node's CiliumInternalIP, which Cilium classifies as `world`
  # — and CIDR rules can't match cluster-internal IPs, so a fromCIDR rule does not work here. Network
  # reachability on 1883 is therefore open; MQTT auth (password_file) is the real access gate (see the
  # Service comment in mosquitto-statefulset.yaml). In-cluster consumers stay scoped via fromEndpoints above.
  - fromEntities:
    - host
    - remote-node
    - world
    toPorts:
    - ports:
      - port: "1883"
        protocol: TCP
