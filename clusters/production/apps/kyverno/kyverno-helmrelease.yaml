apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: kyverno
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: kyverno
  values:
    # With hostNetwork, declared container ports bind on the node. Traefik uses host port 8000 — Kyverno's
    # default metrics port 8000 then makes scheduling fail ("didn't have free ports"). Use a high port.
    features:
      controllerRuntimeMetrics:
        bindAddress: "0"
      # k0s + Cilium without kube-proxy: apiserver → Kyverno Service VIP often fails (same class as
      # "No agent available" / Konnectivity). Webhooks with failurePolicy=Fail then block Flux, Helm,
      # and Jobs. This sets ignore-on-webhook-call-failure so transport errors do not reject requests;
      # when the webhook is reachable, policies still evaluate. Prefer fixing control-plane → Service
      # CIDR + Konnectivity (8132), then set back to false — see infra/k0s/cilium-k0s-setup.md.
      forceFailurePolicyIgnore:
        enabled: true
    admissionController:
      replicas: 1
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      webhookServer:
        port: 10443
      metering:
        port: 28543
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 0
          maxUnavailable: 1
      startupProbe:
        httpGet:
          path: /health/liveness
          port: 10443
          scheme: HTTPS
        failureThreshold: 20
        initialDelaySeconds: 2
        periodSeconds: 6
      livenessProbe:
        httpGet:
          path: /health/liveness
          port: 10443
          scheme: HTTPS
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 2
        successThreshold: 1
      readinessProbe:
        httpGet:
          path: /health/readiness
          port: 10443
          scheme: HTTPS
        initialDelaySeconds: 5
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 6
        successThreshold: 1
