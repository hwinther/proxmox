apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kyverno
  namespace: kyverno
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: kyverno
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kyverno
      version: "3.7.1"
      sourceRef:
        kind: HelmRepository
        name: kyverno
        namespace: kyverno
  values:
    # k0s + Cilium kube-proxy replacement: kube-apiserver often cannot reach Service ClusterIPs, so admission
    # webhooks fail with "No agent available" (see ../../infra/k0s/cilium-k0s-setup.md). Prefer
    # spec.api.extraArgs.enable-aggregator-routing: "true" on controllers long-term; hostNetwork is the
    # Kyverno-side workaround. replicas: 1 avoids port bind clashes on small node counts.
    admissionController:
      replicas: 1
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      webhookServer:
        port: 10443
