apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kyverno
  namespace: kyverno
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # kube-apiserver calls the admission-controller webhook (10443/TCP). In k0s the apiserver runs on the
  # host, so cilium-cluster-nodes-to-webhook covers that path; kube-system ingress catches in-cluster callers.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  # In-namespace: admission-controller ↔ background-controller ↔ reports-controller.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kyverno
  # Prometheus metrics scraping.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
    ports:
    - port: 28543
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server + optional container registry egress for verifyImages policies.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-nodes-to-kyverno-webhook
  namespace: kyverno
spec:
  # Kyverno admission-controller pod; label from upstream chart.
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: admission-controller
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "10443"
        protocol: TCP
