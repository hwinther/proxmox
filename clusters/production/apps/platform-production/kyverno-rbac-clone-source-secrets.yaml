# Kyverno's clone/sync labels the *source* Secret in this namespace; background-controller needs
# patch/update on Secrets here, otherwise: "failed to add labels to the source ... cannot update
# resource \"secrets\"". Same pattern as postgres-production/kyverno-rbac-clone-source-secrets.yaml.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-clone-source-secrets
  namespace: platform-production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-clone-source-secrets
  namespace: platform-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-clone-source-secrets
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
