# Single cluster-wide PBS client-side encryption keyfile, cloned into each namespace that runs
# PBS backup/restore Jobs. Add a new rule per consuming namespace as more apps adopt PBS backups.
#
# Source Secret `pbs-encryption-keyfile` in namespace `platform-production` is created out-of-band
# (see pbs-encryption-keyfile.md) — never committed to git. When the source is missing, the clone
# rule no-ops and Job mounts (`optional: true`) stay empty so backups simply run unencrypted.
#
# ORDERING (validate-policy SAR): Kyverno's validate-policy webhook denies this whole
# ClusterPolicy if ANY generate rule targets a namespace whose Kyverno RBAC
# (kyverno-admission-controller/background-controller get,list,create on Secrets) is not
# already LIVE in the cluster. So a new consuming namespace must land in TWO pushes:
#   1. the app dir incl. its kyverno-rbac-generate-pbs-encryption-keyfile.yaml (RoleBinding),
#      reconciled so the RBAC is live;
#   2. THEN the new clone rule below.
# Adding both in one commit dry-run-fails this policy. Same reason the postgres-* clone
# policies are split into a later Flux Kustomization (see clusters/production/apps/kustomization.yaml).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-pbs-encryption-keyfile
  annotations:
    policies.kyverno.io/title: Clone pbs-encryption-keyfile to PBS-using namespaces
    policies.kyverno.io/category: PBS
    policies.kyverno.io/severity: low
spec:
  generateExisting: true
  rules:
  - name: clone-to-clutterstock-test
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - platform-production
          names:
          - pbs-encryption-keyfile
    generate:
      apiVersion: v1
      kind: Secret
      name: pbs-encryption-keyfile
      namespace: clutterstock-test
      synchronize: true
      clone:
        namespace: platform-production
        name: pbs-encryption-keyfile
  - name: clone-to-clutterstock-production
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - platform-production
          names:
          - pbs-encryption-keyfile
    generate:
      apiVersion: v1
      kind: Secret
      name: pbs-encryption-keyfile
      namespace: clutterstock-production
      synchronize: true
      clone:
        namespace: platform-production
        name: pbs-encryption-keyfile
  - name: clone-to-authelia-production
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - platform-production
          names:
          - pbs-encryption-keyfile
    generate:
      apiVersion: v1
      kind: Secret
      name: pbs-encryption-keyfile
      namespace: authelia-production
      synchronize: true
      clone:
        namespace: platform-production
        name: pbs-encryption-keyfile
  # PUSH 2 (after home-assistant-production / node-red-production kyverno RBAC is live):
  # re-add the clone-to-home-assistant-production and clone-to-node-red-production rules
  # here (same shape as clone-to-authelia-production above). See the ORDERING note in the
  # file header for why these are deliberately not in the first push.
