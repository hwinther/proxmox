# Single cluster-wide PBS client-side encryption keyfile, cloned into every namespace labeled
# `pbs.wsh.no/encryption-keyfile=true`. Each consuming app opts in by setting that label on its
# own Namespace — no edit to this policy is needed when onboarding a new app (including apps in
# the sibling private-apps repo, whose names intentionally stay out of this public repo).
#
# Source Secret `pbs-encryption-keyfile` in namespace `platform-production` is created out-of-band
# (see pbs-encryption-keyfile.md) — never committed to git. When the source is missing, the clone
# rule no-ops and Job mounts (`optional: true`) stay empty so backups simply run unencrypted.
#
# RBAC: Kyverno's admission/background controllers need cluster-wide Secret access for this
# policy to pass the validate-policy webhook — the webhook treats the templated namespace
# `{{request.object.metadata.name}}` literally during SAR, so per-namespace RoleBindings don't
# satisfy it. The ClusterRole + ClusterRoleBinding live in
# `kyverno-clusterrole-clone-pbs-encryption-keyfile.yaml` (must be present before this policy
# reconciles cleanly). Per-namespace RoleBindings in each consuming ns are now redundant.
#
# Onboarding a new PBS-using namespace is a single push: set the label
# `pbs.wsh.no/encryption-keyfile=true` on the Namespace; the keyfile is cloned automatically.
# No edit to this ClusterPolicy needed.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-pbs-encryption-keyfile
  annotations:
    policies.kyverno.io/title: Clone pbs-encryption-keyfile to PBS-using namespaces
    policies.kyverno.io/category: PBS
    policies.kyverno.io/severity: low
spec:
  generateExisting: true
  rules:
  - name: clone-to-labeled-namespaces
    match:
      any:
      - resources:
          kinds:
          - Namespace
          selector:
            matchLabels:
              pbs.wsh.no/encryption-keyfile: "true"
    generate:
      apiVersion: v1
      kind: Secret
      name: pbs-encryption-keyfile
      namespace: "{{request.object.metadata.name}}"
      synchronize: true
      clone:
        namespace: platform-production
        name: pbs-encryption-keyfile
