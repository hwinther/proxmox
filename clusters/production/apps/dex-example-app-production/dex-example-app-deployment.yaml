apiVersion: apps/v1
kind: Deployment
metadata:
  name: dex-example-app
  namespace: dex-example-app-production
  labels:
    app.kubernetes.io/name: dex-example-app
spec:
  replicas: 0
  selector:
    matchLabels:
      app: dex-example-app
  template:
    metadata:
      labels:
        app: dex-example-app
        app.kubernetes.io/name: dex-example-app
    spec:
      automountServiceAccountToken: false
      # Image runs as root; pod-level runAsNonRoot causes CreateContainerConfigError on kubelet.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: example-app
        # ghcr.io/dexidp/example-app only publishes a single moving `latest` tag; pin digest after `docker pull` / `crane digest` if you want immutability.
        image: ghcr.io/dexidp/example-app:latest
        imagePullPolicy: IfNotPresent
        # Image has CMD ["example-app"] only; Kubernetes args replace CMD, so flags must follow an explicit command.
        command:
        - /usr/local/bin/example-app
        args:
        - --issuer=https://auth.wsh.no
        # Must match Authelia OIDC client redirect_uris; default is 127.0.0.1 which breaks browser flow via ingress.
        - --redirect-uri=https://oidc-debug.mgmt.wsh.no/callback
        # ghcr.io/dexidp/example-app:latest predates --pkce; OIDC PKCE is optional here because Authelia
        # `example-app` client sets require_pkce: false.
        - --listen=http://0.0.0.0:5555
        ports:
        - name: http
          containerPort: 5555
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 15
          periodSeconds: 20
