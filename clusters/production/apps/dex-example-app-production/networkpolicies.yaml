apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: dex-example-app
  namespace: dex-example-app-production
spec:
  podSelector:
    matchLabels:
      app: dex-example-app
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Traefik: standard NP covers pod-to-pod; cilium-cluster-nodes-to-dex-example-http covers host/remote-node.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 5555
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Authelia OIDC discovery (auth.wsh.no) and any other external HTTPS.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
