# ghcr.io/dexidp/example-app only publishes `latest` on GHCR; no semver tag to pin for Dependabot.
# Image runs as root; pod intentionally omits runAsNonRoot (kubelet would reject UID 0).
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: dex-example-app-image-latest
  namespace: dex-example-app-production
spec:
  exceptions:
  - policyName: wsh-disallow-latest-require-digest
    ruleNames:
    - disallow-latest-tag
    - autogen-disallow-latest-tag
  - policyName: wsh-require-run-as-non-root
    ruleNames:
    - run-as-non-root
    - autogen-run-as-non-root
  match:
    any:
    - resources:
        kinds:
        - Pod
        namespaces:
        - dex-example-app-production
        selector:
          matchLabels:
            app: dex-example-app
