# ForwardAuth to in-cluster Authelia. Ingress must reference
# node-red-production-authelia-forwardauth@kubernetescrd (namespace-name@kubernetescrd).
# Full 2FA gate (no path carve-out) — the editor + admin API sit behind Authelia.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: node-red-production
spec:
  forwardAuth:
    address: http://authelia.authelia-production.svc.cluster.local/api/authz/forward-auth
    maxResponseBodySize: 1048576
    trustForwardHeader: true
    authResponseHeaders:
    - Remote-User
    - Remote-Name
    - Remote-Email
    - Remote-Groups
