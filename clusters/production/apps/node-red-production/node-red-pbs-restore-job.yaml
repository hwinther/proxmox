# Restore Node-RED's /data from a PBS snapshot into the ceph-rbd PVC.
# Same amd64-only PBS client image/tag as the backup CronJob.
#
# Not in kustomization.yaml: apply manually when needed.
#
# Flow:
#   1. Scale Node-RED to 0 (frees the RWO volume).
#   2. This Job mounts data-node-red-0 read-write at /data, runs
#      `proxmox-backup-client restore $PBS_RESTORE_SNAPSHOT data.pxar /data`,
#      then chowns back to 1000:1000 (Node-RED runs as uid 1000; the restore
#      runs as root so files would otherwise be root-owned and unreadable).
#   3. Scale Node-RED back to 1.
#
# proxmox-backup-client restore does NOT delete files absent from the snapshot.
# For a clean restore, empty the PVC first (seed-pod technique).
#
# Prerequisites:
#   1. Secret `node-red-pbs-backup`: PBS_REPOSITORY, PBS_PASSWORD,
#      PBS_RESTORE_SNAPSHOT (+ PBS_NAMESPACE / PBS_ENCRYPTION_PASSWORD if used).
#   2. Node-RED scaled to 0:
#        kubectl -n node-red-production scale statefulset node-red --replicas=0
#        kubectl -n node-red-production wait --for=delete pod -l app=node-red --timeout=120s
#
# WARNING: overwrites live data. Bump metadata.name (Job spec is immutable) to re-run.
apiVersion: batch/v1
kind: Job
metadata:
  name: node-red-pbs-restore-v001
  namespace: node-red-production
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: node-red-pbs-restore
        app.kubernetes.io/component: node-red-pbs-backup
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      hostname: node-red
      restartPolicy: Never
      containers:
      - name: restore
        image: ghcr.io/hwinther/proxmox/proxmox/pbs/backup-client:0.6.1
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          : "${PBS_RESTORE_SNAPSHOT:?set PBS_RESTORE_SNAPSHOT in Secret node-red-pbs-backup}"
          set -- restore
          [ -n "${PBS_NAMESPACE:-}" ] && set -- "$@" --ns "$PBS_NAMESPACE"
          [ -f /etc/pbs/keyfile ] && set -- "$@" --keyfile /etc/pbs/keyfile
          set -- "$@" "$PBS_RESTORE_SNAPSHOT" data.pxar /data
          /usr/bin/proxmox-backup-client "$@"
          chown -R 1000:1000 /data
        envFrom:
        - secretRef:
            name: node-red-pbs-backup
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: nr-data
          mountPath: /data
        - name: pbs-keyfile
          mountPath: /etc/pbs
          readOnly: true
      volumes:
      - name: nr-data
        persistentVolumeClaim:
          claimName: data-node-red-0
      - name: pbs-keyfile
        secret:
          secretName: pbs-encryption-keyfile
          optional: true
          items:
          - key: keyfile
            path: keyfile
            mode: 0400
