apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: node-red
  namespace: node-red-production
  annotations:
    # Homepage infers http:// when spec.tls is absent (see gethomepage resource-helpers getUrlFromIngress).
    gethomepage.dev/href: "https://node-red.wsh.no/"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: node-red-production-authelia-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Node-RED
    gethomepage.dev/icon: node-red
    gethomepage.dev/description: Flow-based automation editor
spec:
  rules:
  - host: node-red.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: node-red
            port:
              number: 1880
