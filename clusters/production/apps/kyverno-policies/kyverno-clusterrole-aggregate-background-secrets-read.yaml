# Generate policies that match on Secret (e.g. CNPG clone rules) require the background controller
# to list/watch secrets for the policy informer — namespace-scoped Roles are not enough
# ("cannot list resource \"secrets\" ... at the cluster scope"). Aggregates into
# ClusterRole kyverno-kyverno:background-controller (chart aggregationRule).
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kyverno-kyverno:aggregate:background-secrets-read
  labels:
    rbac.kyverno.io/aggregate-to-background-controller: "true"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
