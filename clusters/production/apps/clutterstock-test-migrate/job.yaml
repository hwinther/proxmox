# Bump metadata.name when changing template or migrator image (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-test-migrate-v107
  namespace: clutterstock-test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clutterstock-migrate
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:0.18.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: ConnectionStrings__ClutterStock
          valueFrom:
            secretKeyRef:
              name: cluttertestdb-app
              key: uri
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
