# Bump metadata.name when changing template or migrator image (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-test-migrate-v108
  namespace: clutterstock-test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clutterstock-migrate
    spec:
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:0.19.1
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        # Connection string assembled from individual fields for symmetry with production.
        - name: PG_HOST
          value: cluttertestdb-rw.postgres-test.svc.cluster.local
        - name: PG_DB
          value: clutterstock
        - name: PG_USER
          value: app
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cluttertestdb-app
              key: password
        - name: ConnectionStrings__ClutterStock
          value: "Host=$(PG_HOST);Port=5432;Database=$(PG_DB);Username=$(PG_USER);Password=$(PG_PASSWORD)"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
