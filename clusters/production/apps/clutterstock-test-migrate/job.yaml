# Bump metadata.name when changing template or migrator image (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-test-migrate-v095
  namespace: clutterstock-test
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clutterstock-migrate
    spec:
      restartPolicy: Never
      # RWO PVC: scale clutterstock-api to 0 before this Job runs, or the volume stays attached to the API pod.
      initContainers:
      - name: ensure-data-writable
        image: docker.io/library/busybox@sha256:b8d1827e38a1d49cd17217efd7b07d689e4ea1744e39c7dcbb95533d175bea65 # 1.37
        command:
        - sh
        - -c
        - mkdir -p /data && chmod 777 /data && ls -la /data
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        securityContext:
          runAsUser: 0
          allowPrivilegeEscalation: false
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator@sha256:b6a8642d79f2ee69afd596c79b88f6063d96b78b75cc4ebf02b64851662322fc # 0.10.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
        env:
        - name: ConnectionStrings__ClutterStock
          value: Data Source=/data/clutterstock.db
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: clutterstock-api-sqlite
