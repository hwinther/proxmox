# Migrator Job egress: DNS + Postgres. Required since clutterstock-test carries the
# netpol-baseline default-deny floor and the migrate pods match none of the app policies in
# clusters/production/apps/clutterstock-test/networkpolicies.yaml. Ingress side is already
# covered: postgres-test allows the whole clutterstock-test namespace on 5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clutterstock-migrate
  namespace: clutterstock-test
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: clutterstock-migrate
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-test
    ports:
    - port: 5432
      protocol: TCP
