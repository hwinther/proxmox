apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: home-assistant
  namespace: home-assistant-production
  annotations:
    # Homepage infers http:// when spec.tls is absent (see gethomepage resource-helpers getUrlFromIngress).
    gethomepage.dev/href: "https://home-assistant.wsh.no/"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: authelia-production-authelia-forwardauth@kubernetescrd
    # Auto-discovery disabled — Home Assistant is a static tile in homepage services.yaml (the widget
    # needs a long-lived token, which can't live in annotations). See homepage-secrets.md.
    gethomepage.dev/enabled: "false"
    gethomepage.dev/name: Home Assistant
spec:
  rules:
  - host: home-assistant.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: home-assistant
            port:
              number: 8123
