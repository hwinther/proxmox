# ForwardAuth to in-cluster Authelia. Ingress must reference
# home-assistant-production-authelia-forwardauth@kubernetescrd (namespace-name@kubernetescrd).
# Authelia access_control bypasses ^/api/ and ^/auth/ for this domain so the HA
# companion app + webhooks (HA's own token/secret auth) work; the UI is gated by 2FA.
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: home-assistant-production
spec:
  forwardAuth:
    address: http://authelia.authelia-production.svc.cluster.local/api/authz/forward-auth
    maxResponseBodySize: 1048576
    trustForwardHeader: true
    authResponseHeaders:
    - Remote-User
    - Remote-Name
    - Remote-Email
    - Remote-Groups
