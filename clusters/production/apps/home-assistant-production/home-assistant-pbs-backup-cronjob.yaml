# Daily backup of Home Assistant's /config PVC (config, .storage, recorder DB) to
# Proxmox Backup Server. Same PBS client image/tag as authelia-pbs-backup.
#
# Filesystem (not pg_dump) variant: the ceph-rbd PVC is ReadWriteOnce, so this Job
# can only mount it on the node where the StatefulSet pod already has it attached.
# requiredDuringScheduling podAffinity pins the backup pod to the HA pod's node
# (RWO permits multiple pods sharing the volume on the SAME node); the mount is
# readOnly so the backup never writes the live volume. Runs as root because HA
# runs as root and its config files are root-owned/0600 — a non-root reader would
# get permission denied. No restricted-PSS policy on this cluster forbids it.
#
# NOTE: this is a hot copy. The SQLite recorder DB (home-assistant_v2.db) may be
# mid-write; the snapshot is usually restorable but not transactionally consistent.
# Acceptable for a homelab daily; switch to a CSI VolumeSnapshot if you need
# point-in-time consistency.
#
# Prerequisites:
#   1. Create Secret `home-assistant-pbs-backup` (see home-assistant-pbs-backup-secrets.md).
#   2. Source Secret pbs-encryption-keyfile present in platform-production (cloned here
#      by the clone-pbs-encryption-keyfile ClusterPolicy + this ns's Kyverno RBAC).
#
# Trigger an immediate run (outside the schedule):
#   kubectl -n home-assistant-production create job --from=cronjob/home-assistant-pbs-backup home-assistant-pbs-backup-manual-$(date +%s)
apiVersion: batch/v1
kind: CronJob
metadata:
  name: home-assistant-pbs-backup
  namespace: home-assistant-production
spec:
  # 04:00 Europe/Oslo daily — clear of the 02:30-03:30 postgres/authelia window.
  schedule: "0 4 * * *"
  timeZone: Europe/Oslo
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 3600
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        metadata:
          labels:
            app.kubernetes.io/name: home-assistant-pbs-backup
            app.kubernetes.io/component: home-assistant-pbs-backup
        spec:
          nodeSelector:
            kubernetes.io/arch: amd64
          # Co-locate with the running HA pod so the RWO ceph-rbd volume is mountable.
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
              - labelSelector:
                  matchLabels:
                    app: home-assistant
                topologyKey: kubernetes.io/hostname
          hostname: home-assistant
          restartPolicy: Never
          containers:
          - name: backup
            image: ghcr.io/hwinther/proxmox/proxmox/pbs/backup-client:0.6.1
            imagePullPolicy: IfNotPresent
            command:
            - /bin/sh
            - -c
            - |
              set -eu
              set -- backup
              [ -n "${PBS_NAMESPACE:-}" ] && set -- "$@" --ns "$PBS_NAMESPACE"
              [ -f /etc/pbs/keyfile ] && set -- "$@" --keyfile /etc/pbs/keyfile
              set -- "$@" config.pxar:/config
              exec /usr/bin/proxmox-backup-client "$@"
            envFrom:
            - secretRef:
                name: home-assistant-pbs-backup
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              capabilities:
                drop:
                - ALL
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: "1"
                memory: 512Mi
            volumeMounts:
            - name: ha-config
              mountPath: /config
              readOnly: true
            - name: pbs-keyfile
              mountPath: /etc/pbs
              readOnly: true
          volumes:
          - name: ha-config
            persistentVolumeClaim:
              claimName: data-home-assistant-0
              readOnly: true
          - name: pbs-keyfile
            secret:
              secretName: pbs-encryption-keyfile
              optional: true
              items:
              - key: keyfile
                path: keyfile
                mode: 0400
