# Clone authelia-pg-secret into authelia-production for the PBS backup/restore Jobs' pg_dump
# init container (Authelia itself reads the password from the separate authelia-storage Secret).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-authelia-pg-secret-to-authelia-production
  annotations:
    policies.kyverno.io/title: Clone authelia-pg-secret to authelia-production
    policies.kyverno.io/category: CNPG
    policies.kyverno.io/severity: low
spec:
  generateExisting: true
  rules:
  - name: clone-authelia-pg-secret
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - postgres-production
          names:
          - authelia-pg-secret
    generate:
      apiVersion: v1
      kind: Secret
      name: authelia-pg-secret
      namespace: authelia-production
      synchronize: true
      clone:
        namespace: postgres-production
        name: authelia-pg-secret
