# netpol-baseline floor, inlined with explicit namespace rather than via the
# bases/netpol-baseline component. The component needs the kustomization's `namespace:` directive,
# which we cannot set here: this kustomization also carries the secret-clone RBAC/policies that
# live in authelia-production, clutterstock-production, observability-production and kyverno, so a
# blanket namespace transform would wrongly re-home them.
# Every existing pod (cnpg, adminer, oauth2-proxy) already has its own Ingress+Egress NetworkPolicy,
# so this floor is additive hardening for any future/unlabeled pod — it changes no current traffic.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: postgres-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns-egress
  namespace: postgres-production
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: postgres-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
