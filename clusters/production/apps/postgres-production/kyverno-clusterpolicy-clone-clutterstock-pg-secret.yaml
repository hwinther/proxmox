# Clone clutterstock-pg-secret into clutterstock-production for secretKeyRef on the API Deployment.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-clutterstock-pg-secret-to-clutterstock-production
  annotations:
    policies.kyverno.io/title: Clone clutterstock-pg-secret to clutterstock-production
    policies.kyverno.io/category: CNPG
    policies.kyverno.io/severity: low
spec:
  generateExisting: true
  rules:
  - name: clone-clutterstock-pg-secret
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - postgres-production
          names:
          - clutterstock-pg-secret
    generate:
      apiVersion: v1
      kind: Secret
      name: clutterstock-pg-secret
      namespace: clutterstock-production
      synchronize: true
      clone:
        namespace: postgres-production
        name: clutterstock-pg-secret
