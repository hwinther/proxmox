# Shared production PostgreSQL cluster — hosts clutterstock and authelia databases.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: postgres-prod
  namespace: postgres-production
spec:
  instances: 2
  affinity:
    enablePodAntiAffinity: true
    topologyKey: kubernetes.io/hostname
  storage:
    storageClass: ceph-rbd
    size: 5Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 512Mi
  managed:
    roles:
    - name: clutterstock
      ensure: present
      login: true
      passwordSecret:
        name: clutterstock-pg-secret
    - name: authelia
      ensure: present
      login: true
      passwordSecret:
        name: authelia-pg-secret
