# Kyverno clone/sync labels the *source* CNPG *-app Secret; background-controller needs patch/update
# (otherwise: "failed to add labels to the source ... cannot update resource \"secrets\"").
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-clone-source-secrets
  namespace: postgres-production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-clone-source-secrets
  namespace: postgres-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-clone-source-secrets
subjects:
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
