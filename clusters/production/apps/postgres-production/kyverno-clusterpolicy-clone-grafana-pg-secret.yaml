# Clone grafana-pg-secret into observability-production for envValueFrom on the Grafana pod.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: clone-grafana-pg-secret-to-observability-production
  annotations:
    policies.kyverno.io/title: Clone grafana-pg-secret to observability-production
    policies.kyverno.io/category: CNPG
    policies.kyverno.io/severity: low
spec:
  generateExisting: true
  rules:
  - name: clone-grafana-pg-secret
    match:
      any:
      - resources:
          kinds:
          - Secret
          namespaces:
          - postgres-production
          names:
          - grafana-pg-secret
    generate:
      apiVersion: v1
      kind: Secret
      name: grafana-pg-secret
      namespace: observability-production
      synchronize: true
      clone:
        namespace: postgres-production
        name: grafana-pg-secret
