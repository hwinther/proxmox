apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: adminer
  namespace: postgres-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Adminer (Postgres production)
    gethomepage.dev/icon: mdi-database-outline
    gethomepage.dev/description: Adminer for CNPG postgres-production (OIDC via oauth2-proxy + Authelia); default clutterstockdb-rw
    gethomepage.dev/weight: "11"
spec:
  rules:
  - host: adminer-pg-prod.mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: oauth2-proxy-adminer
            port:
              number: 4180
