# Ephemeral preview-env Deployment for ddnsadmin. Namespace + image tag/digest are set per-PR by
# the overlay; WEB_PREFIX is patched per-PR to the preview hostname.
#
# Runs `scripts/start.sh` in DDNSADMIN_DEMO=true mode (the default). On startup it `apk add bind`s
# (needs egress to the alpine CDN), provisions BIND on 127.0.0.1:53, seeds the example.com zone +
# tsig-key, creates the admin/5MNU6Zk4wyfhWg7n superuser, runs `manage.py axfr`, then collectstatic
# and `runserver 0.0.0.0:8000`. Everything (DNS + sqlite) lives inside the one container — data is
# ephemeral per pod. For the production-shaped deployment (no BIND, sqlite on PVC, runs as non-root)
# see `../../ddnsadmin-production/deployment.yaml` — same image, DDNSADMIN_DEMO=false.
#
# SECURITY / HARDENING — needs owner review (this tree is a draft):
#   * Runs as root and binds 127.0.0.1:53; `named -u named` then drops privileges. A "restricted"
#     PodSecurity / Kyverno admission policy will likely reject this. Either relax PSS for the
#     `ddnsadmin.wsh.no/preview=true` namespaces or rework the image to run rootless before enabling.
#   * Root filesystem must be writable (BIND config under /etc/bind, /var/bind, sqlite db, static).
#   * Startup does `apk add` from the internet — the NetworkPolicy egress allows 0.0.0.0/0:443.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddnsadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ddnsadmin
  template:
    metadata:
      labels:
        app: ddnsadmin
        app.kubernetes.io/name: ddnsadmin
    spec:
      automountServiceAccountToken: false
      # ghcr.io/hwinther/ddnsadmin is a private GHCR package — the kubelet needs this credential to
      # pull. The `ghcr-pull` Secret is cloned into each `ddnsadmin.wsh.no/preview=true` namespace by
      # the clone-ddnsadmin-preview-secrets ClusterPolicy (see ../kyverno-clusterpolicies.yaml).
      imagePullSecrets:
      - name: ghcr-pull
      securityContext:
        # QA/demo image runs as root (BIND binds :53, chowns zone files). See hardening note above.
        runAsNonRoot: false
        runAsUser: 0
      containers:
      - name: ddnsadmin
        image: ghcr.io/hwinther/ddnsadmin/ddnsadmin:placeholder
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: true
          capabilities:
            # Drop the broad set but keep what start.sh + named -u need: bind :53, chown zone
            # files, and named's setuid/setgid privilege drop.
            drop:
            - ALL
            add:
            - NET_BIND_SERVICE
            - CHOWN
            - DAC_OVERRIDE
            - FOWNER
            - SETUID
            - SETGID
        env:
        # Explicit even though it's the default — survives a future default flip and self-documents
        # the preview's reliance on the in-container BIND + demo seed path in scripts/start.sh.
        - name: DDNSADMIN_DEMO
          value: "true"
        # Don't leak tracebacks / env values from a preview. WhiteNoise (dweb/settings.py
        # MIDDLEWARE) serves /media/ static assets at the WSGI layer, so flipping DEBUG off no
        # longer breaks the webpack bundle URLs the way it did before WhiteNoise was wired in.
        - name: DEBUG
          value: "false"
        # Allow the preview Host header (settings.py defaults to localhost-only; the previous
        # DEBUG=True did not auto-allow because ALLOWED_HOSTS is non-empty). Wildcard is acceptable
        # for a short-lived preview behind the LAN TLS terminator.
        - name: ALLOWED_HOSTS
          value: "*"
        # Patched per-PR by the overlay to https://ddnsadmin-<PR>.preview.wsh.no.
        - name: WEB_PREFIX
          value: "https://ddnsadmin-preview.preview.wsh.no"
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        # Startup is slow (apk add + migrate + axfr + collectstatic); gate readiness behind a
        # generous startupProbe so the pod isn't killed mid-bootstrap.
        startupProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 5
          failureThreshold: 60
        readinessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: ddnsadmin
spec:
  type: ClusterIP
  ports:
  - port: 8000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: ddnsadmin
