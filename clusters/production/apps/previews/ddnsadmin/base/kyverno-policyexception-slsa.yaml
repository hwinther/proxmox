# Exempt this ddnsadmin PR-preview namespace from `wsh-require-github-slsa-provenance`.
#
# Why: the ddnsadmin repo (hwinther/ddnsadmin) is a user-owned private repo without GitHub Advanced
# Security, so `actions/attest-build-provenance` (the SLSA bundle producer) returns "Feature not
# available for user-owned private repositories." We therefore set `attest_build_provenance_enabled:
# false` in the consumer workflow — Cosign keyless signatures still run, but the SigstoreBundle the
# Kyverno policy looks for isn't published. Without this exception, the Deployment admission webhook
# fails with `image attestations verification failed, verifiedCount: 0, requiredCount: 1`.
#
# Namespaced PolicyException at kyverno.io/v2 (the cluster's CRD doesn't have ClusterPolicyException
# in v2 yet; switching to namespaced + base/ lets kustomize stamp the per-PR overlay namespace onto
# this resource). Each PR overlay therefore gets its own exception, scoped to its own preview ns.
#
# Production ddnsadmin (if non-preview), and every other ghcr.io/hwinther/* image, still go through
# the standard SLSA check — scope is narrow to the matched namespace only.
#
# Remove once either: (a) the ddnsadmin repo is made public and attest_build_provenance_enabled is
# flipped back to true in pr-e2e.yml / ddnsadmin-container.yml, or (b) the user upgrades to a plan
# where the Attestations API is available for private repos.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: ddnsadmin-preview-slsa-exemption
spec:
  exceptions:
  - policyName: wsh-require-github-slsa-provenance
    ruleNames:
    - slsa-provenance-github-oidc
    - autogen-slsa-provenance-github-oidc
    - autogen-v2-slsa-provenance-github-oidc
  match:
    any:
    - resources:
        kinds:
        - Pod
        - Deployment
        - ReplicaSet
