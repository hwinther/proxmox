# Exempt ddnsadmin PR-preview namespaces from `wsh-require-github-slsa-provenance`.
#
# Why: the ddnsadmin repo (hwinther/ddnsadmin) is a user-owned private repo without GitHub Advanced
# Security, so `actions/attest-build-provenance` (the SLSA bundle producer) returns "Feature not
# available for user-owned private repositories." We therefore set `attest_build_provenance_enabled:
# false` in the consumer workflow — Cosign keyless signatures still run, but the SigstoreBundle the
# Kyverno policy looks for isn't published. Without this exception, the Deployment admission webhook
# fails with `image attestations verification failed, verifiedCount: 0, requiredCount: 1`.
#
# Scope is narrow: only the per-PR preview namespaces (matched by `ddnsadmin-preview-*` wildcard).
# The production ddnsadmin namespace and any other ghcr.io/hwinther/* image still go through the
# standard SLSA check.
#
# Remove this exception once either: (a) the ddnsadmin repo is made public and
# attest_build_provenance_enabled is flipped back to true in pr-e2e.yml / ddnsadmin-container.yml,
# or (b) the user upgrades to a plan where the Attestations API is available for private repos.
apiVersion: kyverno.io/v2
kind: ClusterPolicyException
metadata:
  name: ddnsadmin-previews-slsa-exemption
spec:
  exceptions:
  - policyName: wsh-require-github-slsa-provenance
    ruleNames:
    - slsa-provenance-github-oidc
    - autogen-slsa-provenance-github-oidc
    - autogen-v2-slsa-provenance-github-oidc
  match:
    any:
    - resources:
        kinds:
        - Pod
        - Deployment
        - ReplicaSet
        namespaces:
        - ddnsadmin-preview-*
