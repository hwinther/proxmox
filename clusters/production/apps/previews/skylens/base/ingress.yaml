# Host is patched per-PR by the overlay (skylens-<N>.preview.wsh.no). The LAN nginx fronting the
# cluster terminates TLS with the *.preview.wsh.no wildcard cert (web,websecure).
#
# Authelia forward-auth IS applied here as the outer access gate for preview hosts (production has
# no forward-auth because its host is public). Since the preview backend now ALSO validates real
# OIDC JWTs in-app (see deployment.yaml), previews exercise the production auth path end to end:
# pass forward-auth (Authelia session cookie, wsh.no domain) to reach the SPA, then in-app OIDC
# sign-in issues the bearer for /api + /hubs. The per-PR redirect URI must be registered on the
# Authelia `skylens` client — see the preview window in
# ../../../authelia-production/authelia-helmrelease.yaml.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skylens
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: authelia-production-authelia-forwardauth@kubernetescrd
spec:
  rules:
  - host: skylens-preview.preview.wsh.no
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      - path: /hubs
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      - path: /swagger
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      # Root serves the Expo web SPA (wwwroot) + landing/health from the same API.
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
