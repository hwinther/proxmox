# Host is patched per-PR by the overlay (skylens-<N>.preview.wsh.no). The LAN nginx fronting the
# cluster terminates TLS with the *.preview.wsh.no wildcard cert (web,websecure).
#
# Authelia forward-auth IS applied here even though the app runs auth-less in preview: the backend's
# DevAuth affordance means anyone reaching the app is auto-authenticated, so the Ingress forward-auth
# middleware is the ONLY access gate for preview hosts. (Production does the opposite — no forward-auth
# there because the API validates real OIDC JWTs in-app.) There are deliberately no Authelia redirect
# URIs for preview hosts, so in-app OIDC sign-in is nonfunctional on previews by design.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: skylens
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: authelia-production-authelia-forwardauth@kubernetescrd
spec:
  rules:
  - host: skylens-preview.preview.wsh.no
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      - path: /hubs
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      - path: /swagger
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
      # Root serves the Expo web SPA (wwwroot) + landing/health from the same API.
      - path: /
        pathType: Prefix
        backend:
          service:
            name: skylens-api
            port:
              number: 8080
