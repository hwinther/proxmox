# Allow cluster nodes to reach the preview pod on 8080: Traefik is hostNetwork (arrives as
# host/remote-node) and kubelet probes come via node IPs. Mirrors the production app's policy
# (../../skylens-production/cilium-cluster-nodes-to-skylens-http.yaml).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-nodes-to-skylens-http
spec:
  endpointSelector:
    matchLabels:
      app: skylens-api
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
