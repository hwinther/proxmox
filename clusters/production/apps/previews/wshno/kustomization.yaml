# Parent kustomization for wshno preview environments. Maintained by the gitops-preview-upsert.yml /
# gitops-preview-teardown.yml reusable workflows in hwinther/reusable-workflows — they add/remove
# pr-<N> entries below as PRs labelled `deploy-feature` are opened/closed in wshno/wshno.
#
# No `databases` entry and no kyverno-clusterpolicies: wshno's preview is a single PUBLIC static
# image (ghcr.io/wshno/wshno/web) with no per-PR database, secret, or pull credential. Starts empty;
# the workflow's `yq` creates/extends the resources list as previews are deployed.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources: []
