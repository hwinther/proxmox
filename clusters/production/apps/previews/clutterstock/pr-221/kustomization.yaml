apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clutterstock-preview-pr-221

resources:
- ../base
- namespace.yaml

# `labels` (vs deprecated `commonLabels`) with includeSelectors: false avoids leaking the PR label
# into NetworkPolicy podSelectors that target peers in other namespaces (kube-dns, redis, etc.).
labels:
- pairs:
    clutterstock.wsh.no/pr: "221"
  includeSelectors: false
  includeTemplates: true

# Image digests pin the deploy to exactly the artifacts that just passed e2e + grype. The tag
# (newTag) is kept alongside the digest so `kubectl get deploy -o yaml | grep image:` is readable.
images:
- name: ghcr.io/hwinther/clutterstock/api
  newTag: "0.26.1-PullRequest221.11"
  digest: "sha256:72884bdf886472720bd3277592c012c9d26139bc530bbd8cee5f0e304892832c"
- name: ghcr.io/hwinther/clutterstock/frontend
  newTag: "0.26.1-PullRequest221.11"
  digest: "sha256:daa5f4802eebf6b323e2e2fbbe2ec61f1e9eb760b999fe3824e979f6d22947c9"
- name: ghcr.io/hwinther/clutterstock/migrator
  newTag: "0.26.1-PullRequest221.11"
  digest: "sha256:ff4e33915e5f9a466421457d81d769d716bab03a279f80c73423e2c5e6c551d3"

patches:
- target:
    kind: Deployment
    name: clutterstock-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-api
    spec:
      template:
        spec:
          initContainers:
          - name: migrator
            env:
            - name: PG_DB
              value: clutterstock_pr221
          containers:
          - name: clutterstock-api
            env:
            - name: PG_DB
              value: clutterstock_pr221
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=clutterstock-preview-pr-221,deployment.environment=preview"
- target:
    kind: Deployment
    name: clutterstock-frontend
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-frontend
    spec:
      template:
        spec:
          containers:
          - name: clutterstock-frontend
            env:
            - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "https://clutterstock-221.preview.wsh.no/v1/traces"
            - name: PUBLIC_ORIGIN
              value: "https://clutterstock-221.preview.wsh.no"
- target:
    kind: Ingress
    name: clutterstock
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: clutterstock-221.preview.wsh.no
