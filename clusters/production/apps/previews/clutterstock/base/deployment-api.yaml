# Ephemeral preview-env API Deployment. Namespace + image tags + PG_DB + OTEL ns are set per-PR by the
# overlay; everything else mirrors clutterstock-test. The migrator runs as an initContainer so PR pods
# don't need a separate Flux Kustomization and dodge the immutable-Job-name problem entirely.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutterstock-api
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clutterstock-api
  template:
    metadata:
      labels:
        app: clutterstock-api
        app.kubernetes.io/name: clutterstock-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      # Migrator retries automatically via Pod restart while CNPG provisions the per-PR Database.
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:placeholder
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: PG_HOST
          value: cluttertestdb-rw.postgres-test.svc.cluster.local
        - name: PG_DB
          value: clutterstock
        - name: PG_USER
          value: app
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cluttertestdb-app
              key: password
        - name: ConnectionStrings__ClutterStock
          value: "Host=$(PG_HOST);Port=5432;Database=$(PG_DB);Username=$(PG_USER);Password=$(PG_PASSWORD)"
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      containers:
      - name: clutterstock-api
        image: ghcr.io/hwinther/clutterstock/api:placeholder
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: ASPNETCORE_URLS
          value: http://+:8080
        - name: PG_HOST
          value: cluttertestdb-rw.postgres-test.svc.cluster.local
        - name: PG_DB
          value: clutterstock
        - name: PG_USER
          value: app
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: cluttertestdb-app
              key: password
        - name: ConnectionStrings__ClutterStock
          value: "postgresql://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):5432/$(PG_DB)"
        - name: OTEL_SERVICE_NAME
          value: "clutterstock-api"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://obs-otel-collector.observability-production.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.namespace=clutterstock-preview,deployment.environment=preview
        - name: RabbitMq__HostName
          value: rabbitmq.rabbitmq-production.svc.cluster.local
        - name: RabbitMq__VirtualHost
          value: test
        - name: RabbitMq__UserName
          valueFrom:
            secretKeyRef:
              name: clutterstock-test-rabbitmq
              key: username
        - name: RabbitMq__Password
          valueFrom:
            secretKeyRef:
              name: clutterstock-test-rabbitmq
              key: password
        # Shared Redis/Valkey — same connection string the preview frontend uses. The
        # clutterstock-valkey Secret is cloned into every preview namespace by
        # clone-clutterstock-preview-secrets (see ../kyverno-clusterpolicies.yaml); egress is
        # permitted by the clutterstock-api NetworkPolicy's 0.0.0.0/0 rule.
        - name: Redis__ConnectionString
          valueFrom:
            secretKeyRef:
              name: clutterstock-valkey
              key: redis-url
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: clutterstock-api
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: clutterstock-api
