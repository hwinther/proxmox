# Same shape as clutterstock-test/networkpolicies.yaml but cross-namespace selectors are unchanged
# (kube-system / observability-production / postgres-test / shared-test / traefik / rabbitmq-production
# are all stable names). The frontend->API rule omits namespaceSelector so it implicitly matches the
# preview namespace itself — works across every PR overlay without modification.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clutterstock-api
spec:
  podSelector:
    matchLabels:
      app: clutterstock-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  # Same-namespace SSR / in-cluster fetch: preview frontend pod -> preview API Service.
  - from:
    - podSelector:
        matchLabels:
          app: clutterstock-frontend
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
    ports:
    - port: 4317
      protocol: TCP
    - port: 4318
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-test
    ports:
    - port: 5432
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: rabbitmq-production
    ports:
    - port: 5672
      protocol: TCP
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clutterstock-frontend
spec:
  podSelector:
    matchLabels:
      app: clutterstock-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Same-namespace egress to the preview API.
  - to:
    - podSelector:
        matchLabels:
          app: clutterstock-api
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: shared-test
      podSelector:
        matchLabels:
          app: redis
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
