apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clutterstock-pr-226

resources:
- ../base
- namespace.yaml

# `labels` (vs deprecated `commonLabels`) with includeSelectors: false avoids leaking the PR label
# into NetworkPolicy podSelectors that target peers in other namespaces (kube-dns, redis, etc.).
labels:
- pairs:
    clutterstock.wsh.no/pr: "226"
  includeSelectors: false
  includeTemplates: true

# Image digests pin the deploy to exactly the artifacts that just passed e2e + grype. The tag
# (newTag) is kept alongside the digest so `kubectl get deploy -o yaml | grep image:` is readable.
images:
- name: ghcr.io/hwinther/clutterstock/api
  newTag: "0.26.1-PullRequest226.11"
  digest: "sha256:17f3bc90897bb011a876c313a3f9d015b37c3b7b973d6e6e9aeea3e9caf5851b"
- name: ghcr.io/hwinther/clutterstock/frontend
  newTag: "0.26.1-PullRequest226.11"
  digest: "sha256:b604725690d3b67a6a939ad513dc2b12fdf77608990d658a1409380f838d9529"
- name: ghcr.io/hwinther/clutterstock/migrator
  newTag: "0.26.1-PullRequest226.11"
  digest: "sha256:240162972b7b3b0706a519dabd81e36dc5f8931f8ebd05f63139957b1ec82311"

patches:
- target:
    kind: Deployment
    name: clutterstock-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-api
    spec:
      template:
        spec:
          initContainers:
          - name: migrator
            env:
            - name: PG_DB
              value: clutterstock_pr226
          containers:
          - name: clutterstock-api
            env:
            - name: PG_DB
              value: clutterstock_pr226
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=clutterstock-pr-226,deployment.environment=preview"
- target:
    kind: Deployment
    name: clutterstock-frontend
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-frontend
    spec:
      template:
        spec:
          containers:
          - name: clutterstock-frontend
            env:
            - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "https://clutterstock-pr-226.test.wsh.no/v1/traces"
            - name: PUBLIC_ORIGIN
              value: "https://clutterstock-pr-226.test.wsh.no"
- target:
    kind: Ingress
    name: clutterstock
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: clutterstock-pr-226.test.wsh.no
