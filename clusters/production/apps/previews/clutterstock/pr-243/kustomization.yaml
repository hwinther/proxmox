apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clutterstock-preview-pr-243

resources:
- ../base
- namespace.yaml

# `labels` (vs deprecated `commonLabels`) with includeSelectors: false avoids leaking the PR label
# into NetworkPolicy podSelectors that target peers in other namespaces (kube-dns, redis, etc.).
labels:
- pairs:
    clutterstock.wsh.no/pr: "243"
  includeSelectors: false
  includeTemplates: true

# Image digests pin the deploy to exactly the artifacts that just passed e2e + grype. The tag
# (newTag) is kept alongside the digest so `kubectl get deploy -o yaml | grep image:` is readable.
images:
- name: ghcr.io/hwinther/clutterstock/api
  newTag: "0.26.1-PullRequest243.28"
  digest: "sha256:61603ab0dba069fd5b5f117020dd5fe705c3be6539d65ad43c9a6346afcac6da"
- name: ghcr.io/hwinther/clutterstock/frontend
  newTag: "0.26.1-PullRequest243.28"
  digest: "sha256:2450867ee5d923851348fabcfaa9dc3d6a587be7c0f4134bbfb27fbda00d9c42"
- name: ghcr.io/hwinther/clutterstock/migrator
  newTag: "0.26.1-PullRequest243.28"
  digest: "sha256:b4d9dc1ab8e87c169f482cf4c709df65cb09f68b20b97fa1457babb6e86d5186"

patches:
- target:
    kind: Deployment
    name: clutterstock-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-api
    spec:
      template:
        spec:
          initContainers:
          - name: migrator
            env:
            - name: PG_DB
              value: clutterstock_pr243
          containers:
          - name: clutterstock-api
            env:
            - name: PG_DB
              value: clutterstock_pr243
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=clutterstock-preview-pr-243,deployment.environment=preview"
- target:
    kind: Deployment
    name: clutterstock-frontend
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-frontend
    spec:
      template:
        spec:
          containers:
          - name: clutterstock-frontend
            env:
            - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "https://clutterstock-243.preview.wsh.no/v1/traces"
            - name: PUBLIC_ORIGIN
              value: "https://clutterstock-243.preview.wsh.no"
- target:
    kind: Ingress
    name: clutterstock
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: clutterstock-243.preview.wsh.no
