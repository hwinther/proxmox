apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: clutterstock-preview-pr-260

resources:
- ../base
- namespace.yaml

# `labels` (vs deprecated `commonLabels`) with includeSelectors: false avoids leaking the PR label
# into NetworkPolicy podSelectors that target peers in other namespaces (kube-dns, redis, etc.).
labels:
- pairs:
    clutterstock.wsh.no/pr: "260"
  includeSelectors: false
  includeTemplates: true

# Image digests pin the deploy to exactly the artifacts that just passed e2e + grype. The tag
# (newTag) is kept alongside the digest so `kubectl get deploy -o yaml | grep image:` is readable.
images:
- name: ghcr.io/hwinther/clutterstock/api
  newTag: "0.27.1-PullRequest260.2"
  digest: "sha256:e02f6d3932ce5cc6e4f4518cd5220ab95502fbe13aebee8eacbc1f6d9c6bb03f"
- name: ghcr.io/hwinther/clutterstock/frontend
  newTag: "0.27.1-PullRequest260.2"
  digest: "sha256:155af029a814c7b4b2731009c3c098a375949fef4abc8138c86953e5a38e0873"
- name: ghcr.io/hwinther/clutterstock/migrator
  newTag: "0.27.1-PullRequest260.2"
  digest: "sha256:d6ed674ff4432bde6ea5856e007e65f68ee889b099c2165a9fc5b432ee3646d4"

patches:
- target:
    kind: Deployment
    name: clutterstock-api
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-api
    spec:
      template:
        spec:
          initContainers:
          - name: migrator
            env:
            - name: PG_DB
              value: clutterstock_pr260
          containers:
          - name: clutterstock-api
            env:
            - name: PG_DB
              value: clutterstock_pr260
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: "service.namespace=clutterstock-preview-pr-260,deployment.environment=preview"
- target:
    kind: Deployment
    name: clutterstock-frontend
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: clutterstock-frontend
    spec:
      template:
        spec:
          containers:
          - name: clutterstock-frontend
            env:
            - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
              value: "https://clutterstock-260.preview.wsh.no/v1/traces"
            - name: PUBLIC_ORIGIN
              value: "https://clutterstock-260.preview.wsh.no"
- target:
    kind: Ingress
    name: clutterstock
  patch: |-
    - op: replace
      path: /spec/rules/0/host
      value: clutterstock-260.preview.wsh.no
