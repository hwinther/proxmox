# Parent kustomization for ClutterStock preview environments. Maintained by the
# `gitops-preview-upsert.yml` / `gitops-preview-teardown.yml` reusable workflows in
# `hwinther/reusable-workflows`. The workflows add/remove `pr-<N>` entries below as PRs labelled
# `deploy-feature` are opened/closed in `hwinther/ClutterStock`.
#
# `databases` always stays in the list — it is the parent for the CNPG Database CRs created per PR.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - databases
  - kyverno-clusterpolicies.yaml
  - pr-234
