# Disk SMART health for the PVE hosts (smartctl_exporter on :9633 — see the smartctl scrape job in
# kube-prometheus-stack-helmrelease.yaml). Covers Ceph SSDs + the raw-passthrough HDDs (host-visible).
# Attributes are matched by attribute_id (vendor-neutral; names vary by model). release=obs-kps.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: smartctl
  labels:
    release: obs-kps
spec:
  groups:
  - name: smartctl
    rules:
    # Overall SMART self-assessment FAILED — strongest "replace this disk now" signal (all device types).
    - alert: SmartDeviceHealthFailed
      expr: smartctl_device_smart_status == 0
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "SMART health FAILED: {{ $labels.node }} {{ $labels.device }}"
        description: "Disk {{ $labels.device }} on {{ $labels.node }} reports SMART overall-health = FAILED. Back up / plan replacement."
    # Bad-sector alerting is trend-based, not presence-based: a disk with an old, stable
    # reallocation scar (shuttle02 sdd: 40 sectors, flat) would otherwise fire forever and
    # train us to ignore it. Three signals instead:
    # 1) Pending (197) / offline-uncorrectable (198) > 0 — sectors unreadable RIGHT NOW.
    - alert: SmartPendingOrUncorrectableSectors
      expr: smartctl_device_attribute{attribute_id=~"197|198",attribute_value_type="raw"} > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Unreadable sectors on {{ $labels.node }} {{ $labels.device }} ({{ $labels.attribute_name }}={{ $value }})"
        description: "{{ $labels.device }} on {{ $labels.node }} has {{ $labels.attribute_name }} (id {{ $labels.attribute_id }}) raw={{ $value }} — sectors the drive currently cannot read. Check what data lives there and plan replacement."
    # 2) Any bad-sector counter GROWING — the actual disk-is-dying signal.
    - alert: SmartBadSectorsGrowing
      expr: delta(smartctl_device_attribute{attribute_id=~"5|197|198",attribute_value_type="raw"}[24h]) > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Bad sectors increasing on {{ $labels.node }} {{ $labels.device }} (+{{ $value }} in 24h)"
        description: "{{ $labels.device }} on {{ $labels.node }}: {{ $labels.attribute_name }} (id {{ $labels.attribute_id }}) grew by {{ $value }} in the last 24h. An actively degrading surface — plan replacement."
    # 3) Large absolute reallocation count, even if stable — scar big enough to matter.
    - alert: SmartReallocatedSectorsHigh
      expr: smartctl_device_attribute{attribute_id="5",attribute_value_type="raw"} > 200
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "High reallocated-sector count on {{ $labels.node }} {{ $labels.device }} ({{ $value }})"
        description: "{{ $labels.device }} on {{ $labels.node }} has {{ $value }} reallocated sectors. Even if stable, a scar this size warrants planning replacement."
    # NVMe wear: percentage_used is 0–100 (≥100 = past rated endurance).
    - alert: SmartNvmeWearHigh
      expr: smartctl_device_percentage_used >= 90
      for: 1h
      labels:
        severity: warning
      annotations:
        summary: "NVMe {{ $labels.node }} {{ $labels.device }} at {{ $value }}% endurance"
        description: "NVMe {{ $labels.device }} on {{ $labels.node }} has used {{ $value }}% of its rated write endurance. Plan replacement before it hits 100%."
    # NVMe spare blocks dropped below the drive's own threshold — imminent NVMe failure.
    - alert: SmartNvmeSpareLow
      expr: smartctl_device_available_spare < smartctl_device_available_spare_threshold
      for: 30m
      labels:
        severity: critical
      annotations:
        summary: "NVMe {{ $labels.node }} {{ $labels.device }} spare below threshold"
        description: "NVMe {{ $labels.device }} on {{ $labels.node }} available_spare dropped below its threshold — the drive is failing."
    # NVMe media/integrity errors accumulating.
    - alert: SmartNvmeMediaErrors
      expr: increase(smartctl_device_media_errors[6h]) > 0
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "NVMe {{ $labels.node }} {{ $labels.device }} media errors increasing"
        description: "NVMe {{ $labels.device }} on {{ $labels.node }} logged new media/integrity errors in the last 6h ({{ $value }}). Investigate."
