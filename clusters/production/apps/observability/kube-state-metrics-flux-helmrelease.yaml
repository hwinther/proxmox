# Dedicated kube-state-metrics instance that emits ONLY Flux custom-resource state (gotk_resource_info)
# via KSM's custom-resource-state feature. Flux v2.8 controllers don't export gotk_reconcile_condition,
# so per-object Ready/suspended alerting (prometheusrule-flux.yaml) needs this.
#
# Why a separate instance and not the kube-prometheus-stack's bundled KSM: this config sets
# `collectors: []` + `--custom-resource-state-only=true`, which would disable the standard kube_* metrics
# that the bundled KSM provides (and that every default dashboard/alert depends on). Isolating it here
# means a bad CR-state config can only break gotk_resource_info, nothing load-bearing.
#
# Config is the upstream fluxcd/flux2-monitoring-example CR-state config (GVK API versions verified
# against the live CRDs). gotk_resource_info is an Info metric (value always 1); state lives in the
# `ready` ("True"/"False"/"Unknown") and `suspended` labels, plus KSM's customresource_kind label.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: ksm-flux
  namespace: observability-production
spec:
  # Detect manual changes to Helm-managed resources (warn-only; flip to enabled per-release once proven quiet).
  driftDetection:
    mode: warn
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-state-metrics
      version: "7.4.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability-production
  values:
    # Flux-CR-only: no standard collectors (the bundled obs-kps KSM owns those).
    collectors: []
    extraArgs:
    - --custom-resource-state-only=true
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
    # ServiceMonitor for the obs-kps Prometheus (selects on release=obs-kps).
    prometheus:
      monitor:
        enabled: true
        additionalLabels:
          release: obs-kps
    rbac:
      extraRules:
      - apiGroups:
        - source.toolkit.fluxcd.io
        - kustomize.toolkit.fluxcd.io
        - helm.toolkit.fluxcd.io
        - notification.toolkit.fluxcd.io
        - image.toolkit.fluxcd.io
        resources:
        - gitrepositories
        - buckets
        - helmrepositories
        - helmcharts
        - ocirepositories
        - kustomizations
        - helmreleases
        - alerts
        - providers
        - receivers
        - imagerepositories
        - imagepolicies
        - imageupdateautomations
        verbs: [ "list", "watch" ]
    customResourceState:
      enabled: true
      config:
        spec:
          resources:
          - groupVersionKind:
              group: kustomize.toolkit.fluxcd.io
              version: v1
              kind: Kustomization
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux Kustomization resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, lastAppliedRevision ]
                source_name: [ spec, sourceRef, name ]
          - groupVersionKind:
              group: helm.toolkit.fluxcd.io
              version: v2
              kind: HelmRelease
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux HelmRelease resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, history, "0", chartVersion ]
                chart_name: [ status, history, "0", chartName ]
                chart_app_version: [ status, history, "0", appVersion ]
                chart_ref_name: [ spec, chartRef, name ]
                chart_source_name: [ spec, chart, spec, sourceRef, name ]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: GitRepository
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux GitRepository resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, artifact, revision ]
                url: [ spec, url ]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: Bucket
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux Bucket resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, artifact, revision ]
                endpoint: [ spec, endpoint ]
                bucket_name: [ spec, bucketName ]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: HelmRepository
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux HelmRepository resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, artifact, revision ]
                url: [ spec, url ]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: HelmChart
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux HelmChart resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, artifact, revision ]
                chart_name: [ spec, chart ]
                chart_version: [ spec, version ]
          - groupVersionKind:
              group: source.toolkit.fluxcd.io
              version: v1
              kind: OCIRepository
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux OCIRepository resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                revision: [ status, artifact, revision ]
                url: [ spec, url ]
          - groupVersionKind:
              group: notification.toolkit.fluxcd.io
              version: v1beta3
              kind: Alert
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux Alert resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                suspended: [ spec, suspend ]
          - groupVersionKind:
              group: notification.toolkit.fluxcd.io
              version: v1beta3
              kind: Provider
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux Provider resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                suspended: [ spec, suspend ]
          - groupVersionKind:
              group: notification.toolkit.fluxcd.io
              version: v1
              kind: Receiver
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux Receiver resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                webhook_path: [ status, webhookPath ]
          - groupVersionKind:
              group: image.toolkit.fluxcd.io
              version: v1
              kind: ImageRepository
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux ImageRepository resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                image: [ spec, image ]
          - groupVersionKind:
              group: image.toolkit.fluxcd.io
              version: v1
              kind: ImagePolicy
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux ImagePolicy resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                source_name: [ spec, imageRepositoryRef, name ]
          - groupVersionKind:
              group: image.toolkit.fluxcd.io
              version: v1
              kind: ImageUpdateAutomation
            metricNamePrefix: gotk
            metrics:
            - name: "resource_info"
              help: "The current state of a Flux ImageUpdateAutomation resource."
              each:
                type: Info
                info:
                  labelsFromPath:
                    name: [ metadata, name ]
              labelsFromPath:
                exported_namespace: [ metadata, namespace ]
                ready: [ status, conditions, "[type=Ready]", status ]
                suspended: [ spec, suspend ]
                source_name: [ spec, sourceRef, name ]
