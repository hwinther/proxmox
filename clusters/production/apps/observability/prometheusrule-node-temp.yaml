# Temperature alerting from two sources:
#  - Edge SDR Raspberry Pi SoC: node-exporter (edge-sdr) exports node_thermal_zone_temp; Pis throttle
#    around 80–85°C, so warn before that. Dashboard: edge-node-temps.json.
#  - PVE host drives: smartctl_exporter (:9633) exports smartctl_device_temperature — the clean
#    per-drive temp. (The raw SMART attribute-194 value is vendor-packed and unreliable, so use this.)
#    Spinning/SATA disks lose longevity sharply above ~50°C (Backblaze/Seagate data) even though
#    IronWolf is rated to 70°C; NVMe tolerates more but throttles ~70–80°C. Dashboard: disk-health.json.
# release=obs-kps so the operator ruleSelector picks it up.
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: node-temp
  labels:
    release: obs-kps
spec:
  groups:
  - name: node-temp
    rules:
    - alert: RpiHighTemperature
      expr: node_thermal_zone_temp{instance=~"radio-pi.*"} > 75
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "Raspberry Pi {{ $labels.instance }} running hot ({{ $value | humanize }}°C)"
        description: "{{ $labels.instance }} SoC temperature has been >75°C for 10m (currently {{ $value | humanize }}°C). The Pi throttles around 80–85°C — check airflow/fan."
    # PVE host spinning/SATA disks (sd*). 50°C warn / 58°C crit: healthy hosts here sit ≤46°C, so this
    # cleanly flags an airflow/placement problem rather than normal load (e.g. shuttle02's IronWolfs ran
    # 60–65°C and started reallocating sectors while no temperature alert existed to catch it).
    - alert: SmartDriveOverheating
      expr: smartctl_device_temperature{device=~"sd.*"} > 50
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "Disk {{ $labels.node }} {{ $labels.device }} running hot ({{ $value | humanize }}°C)"
        description: "{{ $labels.device }} on {{ $labels.node }} has been >50°C for 15m (currently {{ $value | humanize }}°C). Spinning disks degrade faster when hot — check airflow/fan/placement."
    - alert: SmartDriveOverheatingCritical
      expr: smartctl_device_temperature{device=~"sd.*"} > 58
      for: 5m
      labels:
        severity: critical
      annotations:
        summary: "Disk {{ $labels.node }} {{ $labels.device }} critically hot ({{ $value | humanize }}°C)"
        description: "{{ $labels.device }} on {{ $labels.node }} is >58°C (currently {{ $value | humanize }}°C) — heading for the 70°C limit and actively shortening drive life. Improve cooling now."
    # NVMe tolerates more heat but throttles ~70–80°C.
    - alert: SmartNvmeOverheating
      expr: smartctl_device_temperature{device=~"nvme.*"} > 70
      for: 15m
      labels:
        severity: warning
      annotations:
        summary: "NVMe {{ $labels.node }} {{ $labels.device }} running hot ({{ $value | humanize }}°C)"
        description: "NVMe {{ $labels.device }} on {{ $labels.node }} has been >70°C for 15m (currently {{ $value | humanize }}°C) — at/above its throttle point. Check heatsink/airflow."
    # PVE host CPU/package temperature via node-exporter's hwmon collector (node-exporter-pve scrape
    # job). Match CPU chips through a node_hwmon_chip_names join, NOT the chip label: the chip label is
    # unreliable (Intel = "platform_coretemp_0", but AMD k10temp shows as a PCI address like
    # "pci0000:00_0000:00:18_3"), whereas chip_name is "coretemp"/"k10temp". The join also keeps the
    # NVMe sensors out (they read 80°C+ here and are covered by SmartNvmeOverheating). Verified against
    # live labels on office-pve-amd (AMD) + office-pve-i9 (Intel). Tjunction ~95–100°C; warn well below.
    - alert: NodeCpuOverheating
      expr: max by (instance, node) (node_hwmon_temp_celsius * on (instance, chip) group_left node_hwmon_chip_names{chip_name=~"coretemp|k10temp"}) > 85
      for: 10m
      labels:
        severity: warning
      annotations:
        summary: "CPU on {{ $labels.node }} running hot ({{ $value | humanize }}°C)"
        description: "CPU package temp on {{ $labels.node }} has been >85°C for 10m (currently {{ $value | humanize }}°C). Check fans/airflow; throttling starts ~95–100°C."
    - alert: NodeCpuOverheatingCritical
      expr: max by (instance, node) (node_hwmon_temp_celsius * on (instance, chip) group_left node_hwmon_chip_names{chip_name=~"coretemp|k10temp"}) > 95
      for: 2m
      labels:
        severity: critical
      annotations:
        summary: "CPU on {{ $labels.node }} critically hot ({{ $value | humanize }}°C)"
        description: "CPU package temp on {{ $labels.node }} is >95°C (currently {{ $value | humanize }}°C) — at/above throttle. Risk of thermal shutdown; fix cooling now."
