# Egress policies layered on the netpol-baseline floor (default-deny + DNS + Prometheus-scrape
# ingress come from the component). observability talks to a lot of things; rules are scoped per
# component, with Prometheus deliberately broad (it scrapes every namespace + nodes + external hosts).
#
# All pods: intra-namespace (datasource queries, Loki/Tempo->MinIO, results-cache, memberlist) and
# the Kubernetes API (operator, kube-state-metrics, Prometheus service discovery).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: observability-common-egress
  namespace: observability-production
spec:
  endpointSelector: {}
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: observability-production
  - toEntities:
    - kube-apiserver
---
# Prometheus scrapes everything. `cluster` = all in-cluster endpoints in EVERY namespace (plus
# nodes); a bare toEndpoints: [{}] only matches the policy's OWN namespace in Cilium, which silently
# blocked every cross-namespace scrape (postgres/rabbitmq/cert-manager/flux/coredns/...). host/
# remote-node cover kubelet/cadvisor/node-exporter; world covers external static targets (Ceph mgr
# 10.20.4.x:9283, smartctl_exporter :9633, Proxmox exporters :6060/:60601, blackbox VPS).
# Effectively unrestricted egress, matching Prometheus's role.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-scrape-egress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  egress:
  - toEntities:
    - cluster
    - host
    - remote-node
    - world
---
# External HTTPS for the components that call out: Grafana OIDC (auth.wsh.no — may resolve to a node
# IP, hence host/remote-node as well as world), Alertmanager -> Telegram, OTel collector -> MaxMind
# GeoLite2 download. 443 only.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: observability-https-egress
  namespace: observability-production
spec:
  endpointSelector:
    matchExpressions:
    - key: app.kubernetes.io/name
      operator: In
      values:
      - grafana
      - alertmanager
      - opentelemetry-collector
  egress:
  - toEntities:
    - world
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "443"
        protocol: TCP
---
# Grafana (relational backend) and its PBS backup Job (pg_dump) connect to the Grafana database in
# the postgres-prod CNPG cluster.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-postgres-egress
  namespace: observability-production
spec:
  podSelector:
    matchExpressions:
    - key: app.kubernetes.io/name
      operator: In
      values:
      - grafana
      - grafana-pbs-backup
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: postgres-production
    ports:
    - port: 5432
      protocol: TCP
---
# PBS backup Job: HTTPS + PBS API port to the (off-cluster) Proxmox Backup Server.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-pbs-backup-egress
  namespace: observability-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: grafana-pbs-backup
  policyTypes:
  - Egress
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - port: 443
      protocol: TCP
    - port: 8007
      protocol: TCP
---
# INGRESS from outside the namespace, which the default-deny floor otherwise drops (these paths
# previously relied on observability having no floor at all). Traefik is hostNetwork so it arrives
# as host/remote-node; NodePort traffic is SNAT'd to the receiving node (host/remote-node) with
# kube-proxy replacement, world included for any non-SNAT path. LAN-only NodePorts are the real
# exposure control.
#
# Grafana UI via Traefik (grafana.mgmt.wsh.no -> svc 80 -> pod 3000) + the homepage widget
# (platform-production), which polls Grafana's in-cluster service. Mirrors alertmanager-ingress.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: grafana-ingress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: grafana
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: platform-production
        app.kubernetes.io/name: homepage
    toPorts:
    - ports:
      - port: "3000"
        protocol: TCP
---
# Alertmanager UI via Traefik (alertmanager.mgmt.wsh.no) and the homepage widget (platform-production).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alertmanager-ingress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  ingress:
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "9093"
        protocol: TCP
  - fromEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: platform-production
        app.kubernetes.io/name: homepage
    toPorts:
    - ports:
      - port: "9093"
        protocol: TCP
---
# Prometheus remote_write + ad-hoc queries via NodePort 30081 (edge prometheus-agent, workstation).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-nodeport-ingress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: prometheus
  ingress:
  - fromEntities:
    - host
    - remote-node
    - world
    toPorts:
    - ports:
      - port: "9090"
        protocol: TCP
---
# Loki push via NodePort 30080 (edge fluent-bit). Intra-namespace readers (Grafana datasource,
# otel) are covered by the netpol-baseline allow-prometheus-scrape ingress.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: loki-gateway-nodeport-ingress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: loki
      app.kubernetes.io/component: gateway
  ingress:
  - fromEntities:
    - host
    - remote-node
    - world
    toPorts:
    - ports:
      - port: "8080"
        protocol: TCP
---
# kube-prometheus-stack admission webhook (obs-kps-kube-prometheus-st-admission): the apiserver
# calls the operator on :10250 to validate/mutate PrometheusRule + AlertmanagerConfig CRs. Under the
# floor this must be allowed or applying any PrometheusRule change fails admission. apiserver-origin
# arrives as host/remote-node (konnectivity) on k0s, not the kube-apiserver entity.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: prometheus-operator-webhook-ingress
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kube-prometheus-stack-prometheus-operator
  ingress:
  - fromEntities:
    - host
    - remote-node
    - kube-apiserver
    toPorts:
    - ports:
      - port: "10250"
        protocol: TCP
