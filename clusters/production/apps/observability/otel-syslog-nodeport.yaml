# LAN entry point for OPNsense remote syslog (NAXSI / nginx events) into the OTel collector
# (syslog receiver on 5514/udp -> Loki, service_name="opnsense"). Same pattern as
# loki-gateway-nodeport.yaml / prometheus-nodeport.yaml: point OPNsense at <any-prod-node-ip>:30514 UDP.
apiVersion: v1
kind: Service
metadata:
  name: obs-otel-syslog-nodeport
  namespace: observability-production
spec:
  type: NodePort
  selector:
    app.kubernetes.io/instance: obs-otel-collector
  ports:
  - name: syslog-udp
    port: 5514
    targetPort: 5514
    nodePort: 30514
    protocol: UDP
