apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Auto-discovery disabled — Grafana is a static tile in homepage services.yaml (the widget needs
    # credentials, which can't live in annotations). See homepage-secrets.md.
    gethomepage.dev/enabled: "false"
    gethomepage.dev/name: Grafana
spec:
  rules:
  - host: grafana.mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: obs-kps-grafana
            port:
              number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: otel-cors
  namespace: observability-production
spec:
  headers:
    accessControlAllowMethods:
    - GET
    - POST
    - OPTIONS
    accessControlAllowHeaders:
    - Accept
    - Content-Type
    - Authorization
    # W3C Trace Context — browser may send these on OTLP or preflight; avoids dropped headers vs simple allowlist
    - traceparent
    - tracestate
    - baggage
    accessControlAllowOriginList:
    - https://clutterstock.wsh.no
    - https://clutterstock.test.wsh.no
    - https://redis-prod.mgmt.wsh.no
    - https://redis-test.mgmt.wsh.no
    - https://test.test.wsh.no
    accessControlMaxAge: 3600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-otlp-http
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: observability-production-otel-cors@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: OpenTelemetry Collector
    gethomepage.dev/siteMonitor: https://otel.mgmt.wsh.no
    gethomepage.dev/icon: opentelemetry
    gethomepage.dev/description: OTLP HTTP endpoint
    # Ingress name is not a pod label; match the OTel Helm release (same as test cluster).
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=obs-otel-collector
spec:
  rules:
  - host: otel.mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318
  - host: otel.test.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318
  - host: otel.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318

# Same-host OTLP HTTP traces: browser POSTs to https://<app-host>/v1/traces → collector :4318 (no CORS).
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-otlp-http-app-host-traces
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
  - host: test.test.wsh.no
    http:
      paths:
      - path: /v1/traces
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318
  - host: clutterstock.test.wsh.no
    http:
      paths:
      - path: /v1/traces
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318
  - host: clutterstock.wsh.no
    http:
      paths:
      - path: /v1/traces
        pathType: Prefix
        backend:
          service:
            name: obs-otel-collector
            port:
              number: 4318
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: headlamp-production-authelia-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Observability
    gethomepage.dev/name: Alertmanager
    gethomepage.dev/siteMonitor: https://alertmanager.mgmt.wsh.no
    gethomepage.dev/icon: mdi-bell-alert
    gethomepage.dev/description: Prometheus alerts
    # Live firing-alert counts. No credential (in-cluster AM has no auth) so the widget can live on the
    # annotation; URL is the in-cluster service. Reachability via allow-homepage-to-widget-targets.
    gethomepage.dev/widget.type: alertmanager
    gethomepage.dev/widget.url: http://obs-kps-kube-prometheus-st-alertmanager.observability-production.svc.cluster.local:9093
spec:
  rules:
  - host: alertmanager.mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: obs-kps-kube-prometheus-st-alertmanager
            port:
              number: 9093
