apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Grafana
    gethomepage.dev/icon: grafana
    gethomepage.dev/description: Observability dashboards
spec:
  rules:
    - host: grafana.mgmt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-kps-grafana
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: otel-cors
  namespace: observability-production
spec:
  headers:
    accessControlAllowMethods:
      - GET
      - POST
      - OPTIONS
    accessControlAllowHeaders:
      - Content-Type
      - Authorization
      # W3C Trace Context — browser may send these on OTLP or preflight; avoids dropped headers vs simple allowlist
      - traceparent
      - tracestate
      - baggage
    accessControlAllowOriginList:
      - https://clutterstock.wsh.no
    accessControlMaxAge: 3600
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: otel-collector-otlp-http
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    traefik.ingress.kubernetes.io/router.middlewares: observability-production-otel-cors@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: OpenTelemetry Collector
    gethomepage.dev/icon: opentelemetry
    gethomepage.dev/description: OTLP HTTP endpoint
    # Ingress name is not a pod label; match the OTel Helm release (same as test cluster).
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=obs-otel-collector
spec:
  rules:
    - host: otel.mgmt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-otel-collector
                port:
                  number: 4318
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: alertmanager
  namespace: observability-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Alertmanager
    gethomepage.dev/icon: mdi-bell-alert
    gethomepage.dev/description: Prometheus alerts
spec:
  rules:
    - host: alertmanager.mgmt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: obs-kps-kube-prometheus-st-alertmanager
                port:
                  number: 9093
