# One-shot bootstrap: create the `chunks` and `ruler` buckets the Loki chart used to
# create automatically via its built-in MinIO subchart. `mc mb -p` is idempotent so
# this Job is safe to re-run; bump the name suffix if you ever need to force a re-run.
apiVersion: batch/v1
kind: Job
metadata:
  name: obs-minio-init-buckets-v001
  namespace: observability-production
  labels:
    app.kubernetes.io/name: obs-minio
    app.kubernetes.io/component: bucket-bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obs-minio
        app.kubernetes.io/component: bucket-bootstrap
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: mc
        image: docker.io/pgsty/mc:RELEASE.2026-03-13T08-57-32Z
        imagePullPolicy: IfNotPresent
        env:
        - name: MC_HOST_obs
          # mc consumes MC_HOST_<alias>=http://<user>:<pw>@host:port to set up an alias
          # without writing to ~/.mcconfig. Using the alias `obs` below.
          value: "http://$(ROOT_USER):$(ROOT_PASSWORD)@obs-minio:9000"
        - name: ROOT_USER
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootUser
        - name: ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootPassword
        command:
        - /bin/sh
        - -ec
        - |
          # Wait until the MinIO API responds (Deployment may still be starting).
          for i in $(seq 1 30); do
            mc ready obs && break
            echo "waiting for obs-minio... ($i/30)"
            sleep 3
          done
          mc mb -p obs/chunks
          mc mb -p obs/ruler
          mc ls obs
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
