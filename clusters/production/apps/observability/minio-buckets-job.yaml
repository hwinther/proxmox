# One-shot bootstrap: create the `chunks` and `ruler` buckets the Loki chart used to
# create automatically via its built-in MinIO subchart. `mc mb -p` is idempotent so
# this Job is safe to re-run; bump the name suffix (v00N) to force a re-run, since a
# Job's pod template is immutable.
apiVersion: batch/v1
kind: Job
metadata:
  name: obs-minio-init-buckets-v002
  namespace: observability-production
  labels:
    app.kubernetes.io/name: obs-minio
    app.kubernetes.io/component: bucket-bootstrap
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obs-minio
        app.kubernetes.io/component: bucket-bootstrap
    spec:
      restartPolicy: OnFailure
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
      - name: mc
        image: docker.io/pgsty/mc:RELEASE.2026-03-13T08-57-32Z
        imagePullPolicy: IfNotPresent
        env:
        # mc writes its config to $HOME/.mc; the container runs as uid 1000 which can't
        # write to the default HOME=/. Point HOME at the world-writable /tmp.
        - name: HOME
          value: /tmp
        - name: ROOT_USER
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootUser
        - name: ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootPassword
        command:
        - /bin/sh
        - -ec
        - |
          # Set the alias inside the script (not via MC_HOST env) so we don't depend on
          # Kubernetes $(VAR) interpolation ordering. `mc alias set` validates connectivity,
          # so retry it until MinIO is up — that doubles as the readiness wait.
          for i in $(seq 1 30); do
            mc alias set obs "http://obs-minio:9000" "$ROOT_USER" "$ROOT_PASSWORD" && break
            echo "waiting for obs-minio... ($i/30)"
            sleep 3
          done
          mc mb -p obs/chunks
          mc mb -p obs/ruler
          mc ls obs
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
