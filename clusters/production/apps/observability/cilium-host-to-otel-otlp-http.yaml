apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-nodes-to-otel-otlp-http
  namespace: observability-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: obs-otel-collector
  ingress:
  # Traefik (hostNetwork) forwards browser OTLP HTTP to the collector.
  - fromEntities:
    - host
    - remote-node
    toPorts:
    - ports:
      - port: "4318"
        protocol: TCP
  # Pod-to-pod OTLP from instrumented workloads in any namespace (gRPC + HTTP).
  - fromEndpoints:
    - matchExpressions:
      - key: k8s:io.kubernetes.pod.namespace
        operator: Exists
    toPorts:
    - ports:
      - port: "4317"
        protocol: TCP
      - port: "4318"
        protocol: TCP
  # OPNsense remote syslog via NodePort 30514 (otel-syslog-nodeport.yaml). NodePort traffic is
  # SNAT'd to the receiving node with kube-proxy replacement (identity host/remote-node); world
  # is included in case a direct (non-SNAT) path ever applies. Exposure control is the LAN-only
  # NodePort + OPNsense being the only sender, not this policy.
  - fromEntities:
    - host
    - remote-node
    - world
    toPorts:
    - ports:
      - port: "5514"
        protocol: UDP
  # Prometheus metrics scrape (ServiceMonitor obs-otel-collector).
  - fromEndpoints:
    - matchLabels:
        app.kubernetes.io/name: prometheus
    toPorts:
    - ports:
      - port: "8888"
        protocol: TCP
