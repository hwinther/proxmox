# Kyverno's validate-policy admission webhook checks SAR on the generate target namespace.
# Background controller applies the clone/sync (see postgres-production
# clone-grafana-pg-secret-to-observability-production). Rules cover all secrets in this
# namespace despite the secret-specific role name — same as authelia-production's
# kyverno-rbac-generate-authelia-pg-secret.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-generate-secret-grafana-pg-secret
  namespace: observability-production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-generate-secret-grafana-pg-secret
  namespace: observability-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-generate-secret-grafana-pg-secret
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
