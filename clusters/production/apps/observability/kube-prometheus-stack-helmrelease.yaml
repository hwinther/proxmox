# Prometheus + Grafana (bundled) + Alertmanager + node-exporter + kube-state-metrics.
# Release name obs-kps → Prometheus Service obs-kps-kube-prometheus-st-prometheus:9090
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-kps
  namespace: observability-production
spec:
  # Detect manual changes to Helm-managed resources (warn-only; flip to enabled per-release once proven quiet).
  driftDetection:
    mode: warn
  interval: 30m
  timeout: 20m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "86.2.0"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability-production
  values:
    defaultRules:
      create: true
      # k0s false-positives: kube-proxy is replaced by Cilium (eBPF), and k0s doesn't expose the
      # controller-manager/scheduler on a scrapeable endpoint, so these `absent()`-based rules fire
      # permanently even though the control plane is healthy. Disable them to stop noise pages.
      disabled:
        KubeProxyDown: true
        KubeControllerManagerDown: true
        KubeSchedulerDown: true

    alertmanager:
      enabled: true
      # Telegram delivery. The bot token is mounted from the `alertmanager-telegram` Secret via
      # alertmanagerSpec.secrets below (referenced as bot_token_file) — never committed. Before alerts
      # actually deliver you must (1) create that Secret and (2) replace chat_id below with yours.
      # See alertmanager-telegram-secrets.md. Providing `config` here overrides the chart's default
      # Alertmanager config entirely, so the Watchdog route + null receiver are re-declared.
      config:
        global:
          resolve_timeout: 5m
        route:
          group_by: [ 'alertname', 'namespace' ]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h
          receiver: telegram
          routes:
          # Watchdog always fires by design (dead-man's switch) — never notify on it.
          - matchers:
            - alertname="Watchdog"
            receiver: "null"
          # Non-actionable severities (e.g. InfoInhibitor, severity=none) shouldn't page Telegram.
          - matchers:
            - severity=~"info|none"
            receiver: "null"
        receivers:
        - name: "null"
        - name: telegram
          telegram_configs:
          - bot_token_file: /etc/alertmanager/secrets/alertmanager-telegram/bot-token
            chat_id: 6729302334
            send_resolved: true
            # Plain text (no MarkdownV2/HTML) so alert descriptions with . - ( ) % > don't break parsing.
            parse_mode: ""
            message: |-
              {{ if eq .Status "firing" }}🔥 FIRING{{ else }}✅ RESOLVED{{ end }} ({{ .Alerts | len }}) {{ .CommonLabels.alertname }}
              {{ range .Alerts -}}
              • [{{ .Labels.severity }}] {{ .Annotations.summary }}
              {{ .Annotations.description }}
              {{ end }}
        inhibit_rules:
        # A firing critical silences the matching warning for the same alertname + namespace.
        - source_matchers:
          - severity="critical"
          target_matchers:
          - severity="warning"
          equal: [ 'alertname', 'namespace' ]
      alertmanagerSpec:
        replicas: 1
        # Mounts Secret keys at /etc/alertmanager/secrets/<name>/<key> — here the Telegram bot token.
        secrets:
        - alertmanager-telegram
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi

    grafana:
      enabled: true
      adminUser: admin
      # RWO Ceph RBD PVC can't be attached twice; default RollingUpdate strategy stalls every rollout
      # with "Multi-Attach error". Recreate tears down the old pod before starting the new one.
      deploymentStrategy:
        type: Recreate
      persistence:
        enabled: true
        type: pvc
        storageClassName: ceph-rbd
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        # Bumped 512Mi -> 768Mi: the pod was OOMKilled (exit 137) hovering at ~507Mi of the
        # old 512Mi limit, causing intermittent Traefik 503 "no available server" while it
        # restarted. Geomap/heavier dashboards push it over. Recreate strategy (RWO PVC).
        limits:
          memory: 768Mi
      testFramework:
        enabled: false
      # Postgres storage for Grafana's internal DB (users, dashboards, alerts, sessions, secure values).
      # Password is cloned into observability-production by Kyverno from postgres-production
      # (see ../postgres-production/kyverno-clusterpolicy-clone-grafana-pg-secret.yaml).
      envValueFrom:
        GF_DATABASE_PASSWORD:
          secretKeyRef:
            name: grafana-pg-secret
            key: password
      additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://obs-loki-gateway.observability-production.svc.cluster.local
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: foo
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://obs-tempo.observability-production.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          tracesToLogs:
            datasourceUid: loki
            tags: [ "service.name" ]
      grafana.ini:
        # Postgres on the production CNPG cluster — see ../postgres-production/database-grafana.yaml.
        # The PVC at /var/lib/grafana stays mounted for plugins and the unified-storage bleve index;
        # only the relational store moves to Postgres.
        database:
          type: postgres
          host: postgres-prod-rw.postgres-production.svc.cluster.local:5432
          name: grafana
          user: grafana
          ssl_mode: disable
        server:
          root_url: https://grafana.mgmt.wsh.no/
        auth:
          disable_login_form: true
          disable_signout_menu: false
          oauth_auto_login: true
          # Allow OAuth to link to existing users created by other auth modules (e.g. authproxy from old setup).
          oauth_allow_insecure_email_lookup: true
        auth.generic_oauth:
          enabled: true
          name: Authelia
          icon: signin
          client_id: grafana
          use_pkce: true
          use_id_token: true
          scopes: openid profile email groups offline_access
          auth_url: https://auth.wsh.no/api/oidc/authorization
          token_url: https://auth.wsh.no/api/oidc/token
          api_url: https://auth.wsh.no/api/oidc/userinfo
          # k8s-admins → GrafanaAdmin (server-level); everyone else → Viewer.
          role_attribute_path: "contains(groups[*], 'k8s-admins') && 'GrafanaAdmin' || 'Viewer'"
          role_attribute_strict: false
          allow_sign_up: true
        users:
          auto_assign_org_role: Viewer

    prometheus:
      enabled: true
      additionalServiceMonitors:
      - name: obs-otel-collector
        selector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
        namespaceSelector:
          matchNames:
          - observability-production
        endpoints:
        - port: metrics
          interval: 15s
          scrapeTimeout: 10s
      # DIY ESP devices: esp-poller exports each numeric sensor reading as a
      # gauge labeled by device (metric name `esp_<sensor_key>`).
      - name: esp-poller
        selector:
          matchLabels:
            app.kubernetes.io/name: esp-poller
        namespaceSelector:
          matchNames:
          - esp-poller-production
        endpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      # RabbitMQ Cluster Operator: with spec.tls the metrics listener is HTTPS on 15691 (port name prometheus-tls).
      # PodMonitor scrapes each StatefulSet replica; a Service-only scrape would round-robin one node per interval.
      additionalPodMonitors:
      - name: rabbitmq
        selector:
          matchLabels:
            app.kubernetes.io/name: rabbitmq
            app.kubernetes.io/component: rabbitmq
        namespaceSelector:
          matchNames:
          - rabbitmq-production
        podMetricsEndpoints:
        - port: prometheus-tls
          scheme: https
          path: /metrics
          interval: 15s
          scrapeTimeout: 10s
          tlsConfig:
            insecureSkipVerify: true
      # CloudNative-PG instance pods expose postgres_exporter on port name `metrics` (9187).
      - name: cnpg-postgres-test-testdb
        selector:
          matchLabels:
            cnpg.io/cluster: testdb
        namespaceSelector:
          matchNames:
          - postgres-test
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      - name: cnpg-postgres-test-cluttertestdb
        selector:
          matchLabels:
            cnpg.io/cluster: cluttertestdb
        namespaceSelector:
          matchNames:
          - postgres-test
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      - name: cnpg-postgres-production-postgres-prod
        selector:
          matchLabels:
            cnpg.io/cluster: postgres-prod
        namespaceSelector:
          matchNames:
          - postgres-production
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      prometheusSpec:
        replicas: 1
        retention: 15d
        # Soft size cap below the 20Gi PVC so a cardinality spike trips retention before filling disk
        # (time-based retention alone offers no protection against runaway series volume).
        retentionSize: 18GB
        enableOTLPReceiver: true
        enableRemoteWriteReceiver: true
        # Proxmox-managed Ceph cluster: scrape ceph-mgr Prometheus module on all three mons.
        # Standby mgrs return an empty 200; only the active mgr returns metrics, and failover is automatic.
        additionalScrapeConfigs:
        - job_name: ceph
          metrics_path: /metrics
          static_configs:
          - targets:
            - 10.20.4.18:9283
            - 10.20.4.20:9283
            - 10.20.4.34:9283
        # smartctl_exporter on each PVE host (systemd, :9633) — disk SMART/wear for the Ceph SSDs and the
        # raw-passthrough HDDs (host sees them; virtio guests can't). `node` label = host name. Alerts:
        # prometheusrule-smartctl.yaml; dashboard: dashboards/disk-health.json. Hosts must allow
        # 10.20.13.0/24 -> :9633 (same as the :9283 ceph rule).
        - job_name: smartctl
          static_configs:
          - targets: [ '10.20.4.18:9633' ]
            labels: { node: office-pve-amd }
          - targets: [ '10.20.4.20:9633' ]
            labels: { node: office-pve-i9 }
          - targets: [ '10.20.4.34:9633' ]
            labels: { node: shuttle01 }
          - targets: [ '10.20.4.35:9633' ]
            labels: { node: shuttle02 }
          # Standalone PBS at the KS site (10.30.0.6, reached over the site link) — not a PVE cluster node.
          - targets: [ '10.30.0.6:9633' ]
            labels: { node: pbs-ks }
        # CrowdSec attack/ban telemetry for the edge-security dashboard (alerts:
        # prometheusrule-crowdsec.yaml). Host-side setup and topology: private-apps repo
        # infra/crowdsec-vps/.
        - job_name: crowdsec
          static_configs:
          - targets: [ '10.31.0.2:6060' ]
            labels: { host: abyss, role: agent }
          - targets: [ '10.20.13.1:6060' ]
            labels: { host: opnsense, role: lapi }
        # crowdsec-firewall-bouncer on abyss (banned IP count, dropped packets/bytes at the edge).
        - job_name: crowdsec-firewall-bouncer
          static_configs:
          - targets: [ '10.31.0.2:60601' ]
            labels: { host: abyss }
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    # Traefik uses hostNetwork + hostPort 9100 for metrics; node-exporter defaults to hostNetwork
    # and requests the same host port → all pods Pending. Pod-network mode still scrapes via ServiceMonitor.
    # With hostNetwork=false the scrape target is the (ephemeral Cilium pod IP):9100, so the default
    # `instance` label is unreadable in stock Grafana dashboards and rotates on reschedule. Relabel
    # rewrites it to the node hostname; mirrors the edge-sdr agent's relabel in
    # prometheus-agent-helmrelease.yaml.
    prometheus-node-exporter:
      enabled: true
      hostNetwork: false
      dnsPolicy: ClusterFirst
      prometheus:
        monitor:
          relabelings:
          - sourceLabels: [ __meta_kubernetes_pod_node_name ]
            targetLabel: instance

    kube-state-metrics:
      enabled: true
