# Prometheus + Grafana (bundled) + Alertmanager + node-exporter + kube-state-metrics.
# Release name obs-kps → Prometheus Service obs-kps-kube-prometheus-st-prometheus:9090
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-kps
  namespace: observability-production
spec:
  interval: 30m
  timeout: 20m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.16.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability-production
  values:
    defaultRules:
      create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi

    grafana:
      enabled: true
      adminUser: admin
      persistence:
        enabled: true
        type: pvc
        storageClassName: ceph-rbd
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      testFramework:
        enabled: false
      additionalDataSources:
        - name: Loki
          uid: loki
          type: loki
          access: proxy
          url: http://obs-loki-gateway.observability-production.svc.cluster.local
          jsonData:
            httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: foo
        - name: Tempo
          uid: tempo
          type: tempo
          access: proxy
          url: http://obs-tempo.observability-production.svc.cluster.local:3200
          jsonData:
            httpMethod: GET
            serviceMap:
              datasourceUid: prometheus
            tracesToLogs:
              datasourceUid: loki
              tags: ["service.name"]

    prometheus:
      enabled: true
      additionalServiceMonitors:
        - name: obs-otel-collector
          selector:
            matchLabels:
              app.kubernetes.io/name: opentelemetry-collector
          namespaceSelector:
            matchNames:
              - observability-production
          endpoints:
            - port: metrics
              interval: 15s
              scrapeTimeout: 10s
      prometheusSpec:
        replicas: 1
        retention: 15d
        enableOTLPReceiver: true
        enableRemoteWriteReceiver: true
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              accessModes:
                - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    prometheus-node-exporter:
      enabled: true

    kube-state-metrics:
      enabled: true
