# Prometheus + Grafana (bundled) + Alertmanager + node-exporter + kube-state-metrics.
# Release name obs-kps → Prometheus Service obs-kps-kube-prometheus-st-prometheus:9090
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-kps
  namespace: observability-production
spec:
  interval: 30m
  timeout: 20m
  install:
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: kube-prometheus-stack
      version: "82.16.2"
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: observability-production
  values:
    defaultRules:
      create: true

    alertmanager:
      enabled: true
      alertmanagerSpec:
        replicas: 1
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi

    grafana:
      enabled: true
      adminUser: admin
      # RWO Ceph RBD PVC can't be attached twice; default RollingUpdate strategy stalls every rollout
      # with "Multi-Attach error". Recreate tears down the old pod before starting the new one.
      deploymentStrategy:
        type: Recreate
      persistence:
        enabled: true
        type: pvc
        storageClassName: ceph-rbd
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
      testFramework:
        enabled: false
      additionalDataSources:
      - name: Loki
        uid: loki
        type: loki
        access: proxy
        url: http://obs-loki-gateway.observability-production.svc.cluster.local
        jsonData:
          httpHeaderName1: X-Scope-OrgID
        secureJsonData:
          httpHeaderValue1: foo
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://obs-tempo.observability-production.svc.cluster.local:3200
        jsonData:
          httpMethod: GET
          serviceMap:
            datasourceUid: prometheus
          tracesToLogs:
            datasourceUid: loki
            tags: [ "service.name" ]
      # Traefik ForwardAuth (Authelia) sets Remote-User / Remote-Email / Remote-Groups on requests that reach Grafana.
      grafana.ini:
        server:
          root_url: https://grafana.mgmt.wsh.no/
        auth.proxy:
          enabled: true
          header_name: Remote-User
          header_property: username
          auto_sign_up: true
          sync_ttl: 60
          headers: "Email:Remote-Email,Name:Remote-Name,Groups:Remote-Groups"
          enable_login_token: false
        users:
          auto_assign_org_role: Viewer
        auth:
          disable_login_form: true
          disable_signout_menu: false
          role_attribute_path: contains(groups[*], 'k8s-admins') && 'Admin' || 'Viewer'
          role_attribute_strict: true

    prometheus:
      enabled: true
      additionalServiceMonitors:
      - name: obs-otel-collector
        selector:
          matchLabels:
            app.kubernetes.io/name: opentelemetry-collector
        namespaceSelector:
          matchNames:
          - observability-production
        endpoints:
        - port: metrics
          interval: 15s
          scrapeTimeout: 10s
      # RabbitMQ Cluster Operator: with spec.tls the metrics listener is HTTPS on 15691 (port name prometheus-tls).
      # PodMonitor scrapes each StatefulSet replica; a Service-only scrape would round-robin one node per interval.
      additionalPodMonitors:
      - name: rabbitmq
        selector:
          matchLabels:
            app.kubernetes.io/name: rabbitmq
            app.kubernetes.io/component: rabbitmq
        namespaceSelector:
          matchNames:
          - rabbitmq-production
        podMetricsEndpoints:
        - port: prometheus-tls
          scheme: https
          path: /metrics
          interval: 15s
          scrapeTimeout: 10s
          tlsConfig:
            insecureSkipVerify: true
      # CloudNative-PG instance pods expose postgres_exporter on port name `metrics` (9187).
      - name: cnpg-postgres-test-testdb
        selector:
          matchLabels:
            cnpg.io/cluster: testdb
        namespaceSelector:
          matchNames:
          - postgres-test
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      - name: cnpg-postgres-test-cluttertestdb
        selector:
          matchLabels:
            cnpg.io/cluster: cluttertestdb
        namespaceSelector:
          matchNames:
          - postgres-test
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      - name: cnpg-postgres-production-clutterstockdb
        selector:
          matchLabels:
            cnpg.io/cluster: clutterstockdb
        namespaceSelector:
          matchNames:
          - postgres-production
        podMetricsEndpoints:
        - port: metrics
          interval: 30s
          scrapeTimeout: 10s
      prometheusSpec:
        replicas: 1
        retention: 15d
        enableOTLPReceiver: true
        enableRemoteWriteReceiver: true
        resources:
          requests:
            cpu: 200m
            memory: 1Gi
          limits:
            memory: 4Gi
        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: ceph-rbd
              accessModes:
              - ReadWriteOnce
              resources:
                requests:
                  storage: 20Gi

    # Traefik uses hostNetwork + hostPort 9100 for metrics; node-exporter defaults to hostNetwork
    # and requests the same host port → all pods Pending. Pod-network mode still scrapes via ServiceMonitor.
    prometheus-node-exporter:
      enabled: true
      hostNetwork: false
      dnsPolicy: ClusterFirst

    kube-state-metrics:
      enabled: true
