apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-production
resources:
- namespace-observability-production.yaml
- helmrepositories.yaml
- kube-prometheus-stack-helmrelease.yaml
- loki-helmrelease.yaml
- loki-gateway-nodeport.yaml
- prometheus-nodeport.yaml
- tempo-helmrelease.yaml
- otel-collector-helmrelease.yaml
- observability-ingress.yaml
- cilium-host-to-otel-otlp-http.yaml
configMapGenerator:
# Picked up by kube-prometheus-stack Grafana sidecar (label grafana_dashboard=1).
# Same JSON as test-deployment ASP.NET Core OTEL dashboard (patched gnet 19924).
- name: grafana-dashboard-aspnet-otel
  files:
  - dashboards/aspnet-core-otel.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# CloudNative-PG cluster metrics (grafana.com/dashboards/20417, revision 4).
- name: grafana-dashboard-cnpg-cluster
  files:
  - dashboards/cnpg-cluster.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Proxmox VE via native OpenTelemetry metric server (grafana.com/dashboards/23855).
- name: grafana-dashboard-proxmox-ve
  files:
  - dashboards/proxmox-ve.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Cross-service web performance: HTTP rate/latency from Prometheus + slow HTTP/SQL trace tables from Tempo.
- name: grafana-dashboard-web-performance
  files:
  - dashboards/web-performance.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
