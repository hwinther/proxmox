apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: observability-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace-observability-production.yaml
- networkpolicies.yaml
- helmrepositories.yaml
- kube-prometheus-stack-helmrelease.yaml
- loki-helmrelease.yaml
- loki-gateway-nodeport.yaml
- prometheus-nodeport.yaml
- tempo-helmrelease.yaml
- otel-collector-helmrelease.yaml
- observability-ingress.yaml
- cilium-host-to-otel-otlp-http.yaml
- kyverno-rbac-generate-grafana-pg-secret.yaml
- kyverno-rbac-generate-pbs-encryption-keyfile.yaml
- grafana-pbs-backup-cronjob.yaml
# Tier-1 custom alerting (gaps not covered by kube-prometheus-stack defaults): Ceph, CNPG Postgres,
# RabbitMQ. Labeled release=obs-kps so the operator ruleSelector picks them up.
- prometheusrule-ceph.yaml
- prometheusrule-postgres-cnpg.yaml
- prometheusrule-rabbitmq.yaml
# Tier-2 custom alerting: Flux GitOps health (controllers are otherwise unscraped — flux-podmonitor.yaml;
# per-object Ready/suspended via the dedicated Flux kube-state-metrics instance), cert-manager TLS
# expiry/renewal (scrape enabled via the cert-manager HelmRelease values), and Mosquitto (metrics from
# the exporter sidecar + PodMonitor in mosquitto-production).
- flux-podmonitor.yaml
# Cilium agent/operator + Hubble metrics (hubble_drop_total backs netpol-rollout drop visibility;
# requires prometheus.enabled + hubble.metrics.enabled in the k0s Cilium values on each controller).
- cilium-podmonitors.yaml
- kube-state-metrics-flux-helmrelease.yaml
- prometheusrule-flux.yaml
- prometheusrule-cert-manager.yaml
- prometheusrule-mosquitto.yaml
# External endpoint probing via the off-cluster VPS blackbox-exporter (infra/blackbox-vps/), scraped
# over the tunnel. Set the prober.url tunnel IP in blackbox-probes.yaml before pushing.
- blackbox-probes.yaml
- prometheusrule-blackbox.yaml
# Edge Pi SoC temperature alert (metric already shipped by edge node-exporter). Dashboard below.
- prometheusrule-node-temp.yaml
# Disk SMART health/wear from smartctl_exporter on the PVE hosts (scrape job in the helmrelease).
- prometheusrule-smartctl.yaml
# Edge security: CrowdSec (scrape jobs in the helmrelease, logs via fluent-bit -> Loki;
# host setup in the private-apps repo infra/crowdsec-vps/) + NAXSI via remote syslog into
# the OTel collector (NodePort 30514/udp). Dashboard below (edge-security.json).
- otel-syslog-nodeport.yaml
- prometheusrule-crowdsec.yaml
- minio-deployment.yaml
- minio-buckets-job.yaml

configMapGenerator:
# Picked up by kube-prometheus-stack Grafana sidecar (label grafana_dashboard=1).
# ASP.NET Core OTEL dashboard (patched gnet 19924).
- name: grafana-dashboard-aspnet-otel
  files:
  - dashboards/aspnet-core-otel.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# CloudNative-PG cluster metrics (grafana.com/dashboards/20417, revision 4).
- name: grafana-dashboard-cnpg-cluster
  files:
  - dashboards/cnpg-cluster.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Proxmox VE via native OpenTelemetry metric server (grafana.com/dashboards/23855).
- name: grafana-dashboard-proxmox-ve
  files:
  - dashboards/proxmox-ve.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Cross-service web performance: HTTP rate/latency from Prometheus + slow HTTP/SQL trace tables from Tempo.
- name: grafana-dashboard-web-performance
  files:
  - dashboards/web-performance.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Ceph cluster (grafana.com/dashboards/2842, revision 18) — requires ceph-mgr prometheus module enabled
# and the static `ceph` scrape job in kube-prometheus-stack-helmrelease.yaml.
- name: grafana-dashboard-ceph-cluster
  files:
  - dashboards/ceph-cluster.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# ESP DIY sensors (DHT11 temp/humidity, DS18B20 temp, light ADC) scraped from esp-poller-production.
- name: grafana-dashboard-esp-sensors
  files:
  - dashboards/esp-sensors.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Edge SDR Raspberry Pi SoC temperatures (node_thermal_zone_temp from edge node-exporter).
- name: grafana-dashboard-edge-node-temps
  files:
  - dashboards/edge-node-temps.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Disk SMART health/wear (smartctl_exporter on the PVE hosts).
- name: grafana-dashboard-disk-health
  files:
  - dashboards/disk-health.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
# Edge attack history: CrowdSec (Prometheus + Loki) and OPNsense NAXSI (Loki via syslog).
- name: grafana-dashboard-edge-security
  files:
  - dashboards/edge-security.json
  options:
    disableNameSuffixHash: true
    labels:
      grafana_dashboard: "1"
