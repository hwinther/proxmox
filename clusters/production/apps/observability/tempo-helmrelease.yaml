apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-tempo
  namespace: observability-production
spec:
  interval: 30m
  timeout: 10m
  dependsOn:
    - name: obs-kps
      namespace: observability-production
  chart:
    spec:
      chart: tempo
      version: "1.24.4"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability-production
  values:
    replicas: 1
    tempo:
      retention: 48h
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 1Gi
      metricsGenerator:
        enabled: true
        storage:
          remote_write:
            - url: http://obs-kps-kube-prometheus-st-prometheus.observability-production.svc.cluster.local:9090/api/v1/write
              send_exemplars: true
      overrides:
        defaults:
          metrics_generator:
            processors:
              - service-graphs
              - span-metrics
    persistence:
      enabled: true
      storageClassName: ceph-rbd
      size: 10Gi
