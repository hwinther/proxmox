# Migrated 2026-05-28 from chart loki@6.55.0 (grafana/helm-charts) to loki@17.1.1
# (grafana-community/helm-charts) because Grafana repointed the original chart at GEL
# starting at 7.0.0 (see helmrepositories.yaml comment on grafana-community).
#
# At the same time, the built-in MinIO subchart was removed from 17.x — Loki now writes
# to an external standalone MinIO Deployment in this namespace (see minio-deployment.yaml).
# The old `obs-loki-minio-0` StatefulSet + PVC are no longer managed by this chart and
# can be deleted after rollout: `kubectl -n observability-production delete pvc data-obs-loki-minio-0`.
# Previous log data is intentionally not migrated (14-day retention; throwaway).
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-loki
  namespace: observability-production
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: loki
      version: "17.2.0"
      sourceRef:
        kind: HelmRepository
        name: grafana-community
        namespace: observability-production
  values:
    deploymentMode: SingleBinary
    gateway:
      replicas: 1
    test:
      enabled: false
    lokiCanary:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      replicas: 1
      allocatedMemory: 256
      allocatedCPU: 100m
    # Built-in MinIO is removed by default in chart 17.x — we point at the standalone
    # `obs-minio` Deployment instead. ignoreMinioDeprecation silences the chart's
    # deprecation warning that fires even when minio.enabled=false.
    minio:
      enabled: false
    ignoreMinioDeprecation: true
    loki:
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 336h
        # Security streams keep 90d so the edge-security dashboard has real attack history
        # (default 14d stays for everything else, incl. job="nginx-edge" access logs — bulkier
        # and only needed for recent forensics). Volume is tiny next to pod logs.
        retention_stream:
        - selector: '{job="crowdsec"}'
          priority: 1
          period: 2160h
        - selector: '{job="fail2ban"}'
          priority: 1
          period: 2160h
        - selector: '{service_name="opnsense"}'
          priority: 1
          period: 2160h
      compactor:
        compaction_interval: 10m
        delete_request_cancel_period: 0s
        delete_request_store: s3
        retention_enabled: true
      ruler:
        enable_api: true
      # External MinIO: in-cluster Service obs-minio:9000, path-style URLs, plain HTTP
      # (intra-cluster). accessKeyId / secretAccessKey deliberately omitted from values —
      # the Loki S3 client reads them from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env
      # vars injected via singleBinary.extraEnv below, so creds never end up in the
      # rendered HelmRelease values or in Helm release storage.
      storage:
        type: s3
        bucketNames:
          chunks: chunks
          ruler: ruler
        s3:
          endpoint: obs-minio.observability-production.svc.cluster.local:9000
          region: us-east-1
          s3ForcePathStyle: true
          insecure: true
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-rbd
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi
      extraEnv:
      - name: AWS_ACCESS_KEY_ID
        valueFrom:
          secretKeyRef:
            name: obs-minio-root
            key: rootUser
      - name: AWS_SECRET_ACCESS_KEY
        valueFrom:
          secretKeyRef:
            name: obs-minio-root
            key: rootPassword
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
