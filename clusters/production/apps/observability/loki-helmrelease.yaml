apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: obs-loki
  namespace: observability-production
spec:
  interval: 30m
  timeout: 20m
  chart:
    spec:
      chart: loki
      version: "6.55.0"
      sourceRef:
        kind: HelmRepository
        name: grafana
        namespace: observability-production
  values:
    deploymentMode: SingleBinary
    gateway:
      replicas: 1
    test:
      enabled: false
    lokiCanary:
      enabled: false
    chunksCache:
      enabled: false
    resultsCache:
      replicas: 1
      allocatedMemory: 256
      allocatedCPU: 100m
    minio:
      enabled: true
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-rbd
        storageClassName: ceph-rbd
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
    loki:
      commonConfig:
        replication_factor: 1
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 336h
      compactor:
        compaction_interval: 10m
        delete_request_cancel_period: 0s
        delete_request_store: s3
        retention_enabled: true
      ruler:
        enable_api: true
    singleBinary:
      replicas: 1
      persistence:
        enabled: true
        storageClass: ceph-rbd
        size: 10Gi
      resources:
        requests:
          cpu: 100m
          memory: 512Mi
        limits:
          memory: 1536Mi
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    ingester:
      replicas: 0
    querier:
      replicas: 0
    queryFrontend:
      replicas: 0
    queryScheduler:
      replicas: 0
    distributor:
      replicas: 0
    compactor:
      replicas: 0
    indexGateway:
      replicas: 0
    bloomCompactor:
      replicas: 0
    bloomGateway:
      replicas: 0
