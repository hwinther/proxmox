# LAN / cross-cluster access to Loki push (e.g. edge-sdr Fluent Bit, abyss CrowdSec logs).
# In-cluster clients keep using ClusterIP obs-loki-gateway.
# targetPort must be `http` (nginx :8080): since chart 17.x the gateway pod has an exporter
# sidecar that owns the name `http-metrics` (:4040, Go) — pointing there returns
# "404 page not found" on every push and silently drops all external log shipping.
apiVersion: v1
kind: Service
metadata:
  name: obs-loki-gateway-nodeport
  namespace: observability-production
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: loki
    app.kubernetes.io/component: gateway
  ports:
  - port: 80
    targetPort: http
    nodePort: 30080
