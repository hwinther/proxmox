# Standalone MinIO providing S3 object storage for Loki chunks/ruler.
# Replaces the built-in MinIO subchart that the Loki helm chart removed at 17.0.0.
# Single replica + single PVC (homelab; not HA). pgsty fork pinned to avoid the
# unresolved upstream minio/minio CVE that the Loki chart 17.x release notes call out.
apiVersion: v1
kind: Service
metadata:
  name: obs-minio
  namespace: observability-production
  labels:
    app.kubernetes.io/name: obs-minio
    app.kubernetes.io/component: object-storage
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: obs-minio
  ports:
  - name: api
    port: 9000
    targetPort: api
    protocol: TCP
  - name: console
    port: 9001
    targetPort: console
    protocol: TCP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: obs-minio-data
  namespace: observability-production
  labels:
    app.kubernetes.io/name: obs-minio
    app.kubernetes.io/component: object-storage
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: ceph-rbd
  resources:
    requests:
      # Matches the size of the old subchart's PVC. Loki retention_period is 336h (14d),
      # so this caps the active log volume.
      storage: 20Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: obs-minio
  namespace: observability-production
  labels:
    app.kubernetes.io/name: obs-minio
    app.kubernetes.io/component: object-storage
spec:
  replicas: 1
  # Recreate: two MinIO pods bound to the same RWO PVC would deadlock attach.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: obs-minio
  template:
    metadata:
      labels:
        app.kubernetes.io/name: obs-minio
        app.kubernetes.io/component: object-storage
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: minio
        # pgsty fork (also used by the Loki chart's subchart) — pinned to dodge the upstream
        # minio/minio CVE that's still unresolved as of chart 17.x release notes.
        image: docker.io/pgsty/minio:RELEASE.2026-03-14T12-00-00Z
        imagePullPolicy: IfNotPresent
        args:
        - server
        - /data
        - --console-address
        - :9001
        env:
        - name: MINIO_ROOT_USER
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootUser
        - name: MINIO_ROOT_PASSWORD
          valueFrom:
            secretKeyRef:
              name: obs-minio-root
              key: rootPassword
        - name: MINIO_PROMETHEUS_AUTH_TYPE
          value: public
        ports:
        - name: api
          containerPort: 9000
          protocol: TCP
        - name: console
          containerPort: 9001
          protocol: TCP
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        readinessProbe:
          httpGet:
            path: /minio/health/ready
            port: api
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /minio/health/live
            port: api
          initialDelaySeconds: 15
          periodSeconds: 30
          failureThreshold: 6
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 1Gi
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: obs-minio-data
