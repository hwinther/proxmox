# Snapshot service backing the public wsh.no Valheim widget. Two tiny containers sharing an emptyDir:
#   - refresher: queries in-cluster Prometheus on a timer, writes /data/status.json (stdlib python)
#   - web:       nginx serving ONLY that file at /api/valheim/ (no proxy, no live query path)
# Neither Prometheus nor Grafana is exposed — the browser only ever sees the curated JSON.
# Lives in wshno-production alongside the site; fronted by Traefik via the wsh.no Ingress.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: valheim-status
  namespace: wshno-production
  labels:
    app: valheim-status
    app.kubernetes.io/name: valheim-status
spec:
  replicas: 1
  selector:
    matchLabels:
      app: valheim-status
  template:
    metadata:
      labels:
        app: valheim-status
        app.kubernetes.io/name: valheim-status
    spec:
      automountServiceAccountToken: false
      securityContext:
        # Both containers run as the unprivileged nginx uid (101); fsGroup makes the shared
        # emptyDir group-writable so the refresher (101) can write and nginx (101) can read.
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
      containers:
      - name: refresher
        image: python:3.12-alpine
        command: ["python3", "/app/refresh.py"]
        env:
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        # Query Prometheus via its NodePort on this pod's own node (already allowed by
        # prometheus-nodeport-ingress -> no observability netpol change needed).
        - name: PROM_URL
          value: "http://$(HOST_IP):30081"
        - name: INTERVAL_SECONDS
          value: "60"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        volumeMounts:
        - name: scripts
          mountPath: /app/refresh.py
          subPath: refresh.py
          readOnly: true
        - name: data
          mountPath: /data
      - name: web
        image: nginxinc/nginx-unprivileged:alpine
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          failureThreshold: 6
        resources:
          requests:
            cpu: 10m
            memory: 16Mi
          limits:
            cpu: 100m
            memory: 32Mi
        volumeMounts:
        - name: scripts
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: web.conf
          readOnly: true
        - name: data
          mountPath: /data
          readOnly: true
      volumes:
      - name: scripts
        configMap:
          name: valheim-status
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: valheim-status
  namespace: wshno-production
  labels:
    app: valheim-status
spec:
  type: ClusterIP
  selector:
    app: valheim-status
  ports:
  - name: http
    port: 8080
    targetPort: http
    protocol: TCP
