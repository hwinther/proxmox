# nginx (unprivileged, :8080) that serves ONLY the snapshot JSON the refresher writes to /data.
# Traefik routes wsh.no/api/valheim/* here (see ingress.yaml), forwarding the full path; the alias
# maps /api/valheim/ -> /data so /api/valheim/status.json returns /data/status.json. No upstream, no
# proxying, no query passthrough — it can only ever hand back the curated snapshot file.
server {
    listen 8080;
    server_name _;

    location /api/valheim/ {
        alias /data/;
        default_type application/json;
        add_header Cache-Control "public, max-age=30";
        # Read-only public data; same-origin in practice, ACAO kept permissive for flexibility.
        add_header Access-Control-Allow-Origin "*";
        try_files $uri =404;
    }

    location = /healthz {
        default_type text/plain;
        return 200 "ok\n";
    }
}
