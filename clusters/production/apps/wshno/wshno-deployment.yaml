apiVersion: apps/v1
kind: Deployment
metadata:
  name: wshno
  namespace: wshno-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wshno
  template:
    metadata:
      labels:
        app: wshno
        app.kubernetes.io/name: wshno
    spec:
      automountServiceAccountToken: false
      securityContext:
        # No runAsUser/fsGroup — the upstream image (nginxinc/nginx-unprivileged:alpine)
        # already declares `USER nginx` (UID 101) and chowns its writable dirs accordingly.
        # runAsNonRoot is enough to satisfy the Kyverno wsh-require-run-as-non-root policy.
        runAsNonRoot: true
      containers:
      - name: wshno
        image: ghcr.io/wshno/wshno/web:0.10.0@sha256:820366e2e334301cce4a3f10ef30f0798aaf65c903ffe06a627ad0451cecbf2c
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 25m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 6
---
apiVersion: v1
kind: Service
metadata:
  name: wshno
  namespace: wshno-production
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: wshno
