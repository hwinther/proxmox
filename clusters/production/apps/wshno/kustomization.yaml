apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
namespace: wshno-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace.yaml
- wshno-deployment.yaml
- cilium-cluster-nodes-to-http.yaml
# Snapshot services for the public game-server widgets (query Prometheus, serve curated JSON only).
# One Deployment + netpol per game; all share game-status/refresh.py (selected via the GAME env).
- valheim-status-deployment.yaml
- valheim-status-networkpolicies.yaml
- enshrouded-status-deployment.yaml
- enshrouded-status-networkpolicies.yaml
- satisfactory-status-deployment.yaml
- satisfactory-status-networkpolicies.yaml
- spaceengineers-status-deployment.yaml
- spaceengineers-status-networkpolicies.yaml

configMapGenerator:
# Shared game-agnostic refresher script + per-game nginx config. Hashed names (no
# disableNameSuffixHash) so each Deployment rolls automatically when its files change; kustomize
# rewrites the volume references. `key=path` keeps the in-pod filenames (refresh.py / web.conf)
# stable while the source files live under game-status/.
- name: valheim-status
  files:
  - refresh.py=game-status/refresh.py
  - web.conf=game-status/valheim.web.conf
- name: enshrouded-status
  files:
  - refresh.py=game-status/refresh.py
  - web.conf=game-status/enshrouded.web.conf
- name: satisfactory-status
  files:
  - refresh.py=game-status/refresh.py
  - web.conf=game-status/satisfactory.web.conf
- name: spaceengineers-status
  files:
  - refresh.py=game-status/refresh.py
  - web.conf=game-status/spaceengineers.web.conf
