apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
namespace: policy-reporter-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace-policy-reporter-production.yaml
- helmrepository.yaml
- policy-reporter-helmrelease.yaml
- policy-reporter-ingress.yaml
- networkpolicies.yaml
- cilium-cluster-nodes-to-http.yaml
