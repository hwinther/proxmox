apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-reporter-ui
  namespace: policy-reporter-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: ui
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Traefik: standard NP covers pod-to-pod; cilium-cluster-nodes-to-http covers host/remote-node (Traefik hostNetwork).
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # policy-reporter core API + kyverno-plugin (both in-namespace on 8080).
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: policy-reporter-production
    ports:
    - port: 8080
      protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-reporter
  namespace: policy-reporter-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: policy-reporter
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # UI queries the core reporter API.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: policy-reporter-production
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server (reads PolicyReport, ClusterPolicyReport CRs).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: policy-reporter-kyverno-plugin
  namespace: policy-reporter-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: kyverno-plugin
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # UI queries the kyverno plugin.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: policy-reporter-production
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server (reads Kyverno CRs: ClusterPolicy, PolicyReport).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-policy-reporter-to-apiserver
  namespace: policy-reporter-production
spec:
  endpointSelector:
    matchExpressions:
    - key: app.kubernetes.io/name
      operator: In
      values:
      - policy-reporter
      - kyverno-plugin
  egress:
  - toEntities:
    - kube-apiserver
