apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
# Safe here: this kustomization only holds ceph-csi-production resources.
namespace: ceph-csi-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace.yaml
- ceph-csi-rbd-helmrelease.yaml
- cilium-ceph-csi-provisioner.yaml
