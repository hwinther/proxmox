namespace: headlamp-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace-headlamp-production.yaml
- helmrepository.yaml
- headlamp-helmrelease.yaml
- headlamp-ingress.yaml
- kyverno-policyexception-headlamp-inits.yaml
- kyverno-policyexception-headlamp-plugin-images.yaml
- networkpolicies.yaml
- cilium-cluster-nodes-to-http.yaml
