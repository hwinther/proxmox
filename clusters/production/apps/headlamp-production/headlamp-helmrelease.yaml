apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp-production
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp-production
  ## Headlamp loads OIDC discovery inside the pod (https://auth.wsh.no/...). Issuer TLS must be reachable
  ## from the pod (public DNS, split-horizon, or hostAliases to your TLS front-end LAN IP — not Traefik :8000).
  ## hostAliases pin auth.wsh.no to the IP where HTTPS for that hostname terminates (adjust if yours differs).
  ## Egress is usually SNAT to the node running the pod; allow node subnet(s) → that:443 (and replies).
  postRenderers:
  - kustomize:
      patches:
      - target:
          kind: Deployment
          name: headlamp
          namespace: headlamp-production
        patch: |
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: headlamp
            namespace: headlamp-production
          spec:
            template:
              spec:
                hostAliases:
                  - ip: 10.20.13.201
                    hostnames:
                      - auth.wsh.no
  values:
    ## Flux sidebar plugin — copy baked image into shared emptyDir (see headlamp-k8s/plugins flux README).
    config:
      pluginsDir: /build/plugins
      oidc:
        secret:
          create: true
          name: headlamp-oidc
        clientID: headlamp
        issuerURL: https://auth.wsh.no
        scopes: openid profile email groups
        callbackURL: https://headlamp.mgmt.wsh.no/oidc-callback
        usePKCE: true
    initContainers:
    - name: headlamp-plugins
      image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build
      securityContext:
        runAsNonRoot: false
        privileged: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: false
      volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    - name: kubescape-plugin
      image: quay.io/kubescape/headlamp-plugin:v0.10.6
      imagePullPolicy: IfNotPresent
      command:
      - /bin/sh
      - -c
      - cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build/plugins
      securityContext:
        runAsNonRoot: false
        privileged: false
        runAsUser: 0
        runAsGroup: 0
        allowPrivilegeEscalation: false
      volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    volumeMounts:
    - name: headlamp-plugins
      mountPath: /build/plugins
    volumes:
    - name: headlamp-plugins
      emptyDir: {}
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
