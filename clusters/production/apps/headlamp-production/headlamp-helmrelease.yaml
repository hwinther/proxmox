apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp-production
spec:
  interval: 30m
  timeout: 10m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: headlamp
      version: "0.41.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp-production
  values:
    ## Flux sidebar plugin — copy baked image into shared emptyDir (see headlamp-k8s/plugins flux README).
    config:
      pluginsDir: /build/plugins
      oidc:
        secret:
          create: false
    initContainers:
      - name: headlamp-plugins
        image: ghcr.io/headlamp-k8s/headlamp-plugin-flux:v0.6.0
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - mkdir -p /build/plugins && cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build
        securityContext:
          runAsNonRoot: false
          privileged: false
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /build/plugins
      - name: kubescape-plugin
        image: quay.io/kubescape/headlamp-plugin@sha256:0f27541713d06763928edecb0db7acac4ebad033ba2cff1dee14b2a0cd320c80 # v0.10.6
        imagePullPolicy: IfNotPresent
        command:
          - /bin/sh
          - -c
          - cp -r /plugins/* /build/plugins/ && chown -R 100:101 /build/plugins
        securityContext:
          runAsNonRoot: false
          privileged: false
          runAsUser: 0
          runAsGroup: 0
          allowPrivilegeEscalation: false
        volumeMounts:
          - name: headlamp-plugins
            mountPath: /build/plugins
    volumeMounts:
      - name: headlamp-plugins
        mountPath: /build/plugins
    volumes:
      - name: headlamp-plugins
        emptyDir: {}
    ingress:
      enabled: false
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
      limits:
        memory: 512Mi
