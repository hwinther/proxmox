apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp-production
  annotations:
    # Homepage infers http:// when spec.tls is absent (see gethomepage resource-helpers getUrlFromIngress).
    gethomepage.dev/href: "https://headlamp.mgmt.wsh.no/"
    traefik.ingress.kubernetes.io/router.entrypoints: web,websecure
    traefik.ingress.kubernetes.io/router.middlewares: headlamp-production-authelia-forwardauth@kubernetescrd
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Headlamp
    gethomepage.dev/icon: mdi-view-dashboard-variant
    gethomepage.dev/description: Kubernetes UI with Flux GitOps plugin
spec:
  rules:
  - host: headlamp.mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headlamp
            port:
              number: 80
