# Headlamp Helm chart / plugin init images may use tags that tripped policy checks; scoped to this namespace.
apiVersion: kyverno.io/v2
kind: PolicyException
metadata:
  name: headlamp-plugin-flux-image
  namespace: headlamp-production
spec:
  exceptions:
    - policyName: wsh-disallow-latest-require-digest
      ruleNames:
        - disallow-latest-tag
        - autogen-disallow-latest-tag
  match:
    any:
      - resources:
          kinds:
            - Pod
          namespaces:
            - headlamp-production
