# ForwardAuth to in-cluster Authelia. Ingress must reference
# headlamp-production-authelia-forwardauth@kubernetescrd (namespace-name@kubernetescrd).
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: headlamp-production
spec:
  forwardAuth:
    address: http://authelia.authelia-production.svc.cluster.local/api/authz/forward-auth
    maxResponseBodySize: 1048576
    trustForwardHeader: true
    authResponseHeaders:
    - Remote-User
    - Remote-Name
    - Remote-Email
    - Remote-Groups
