apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clutterstock
  namespace: clutterstock-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Homepage otherwise derives the link from the first Ingress path (/api); pin the frontend root.
    gethomepage.dev/href: "https://clutterstock.wsh.no/"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Apps
    gethomepage.dev/name: Clutterstock
    gethomepage.dev/siteMonitor: https://clutterstock.wsh.no
    gethomepage.dev/icon: mdi-image-multiple-outline
    gethomepage.dev/description: Clutterstock web app (API under /api/; Swagger under /swagger)
    # Ingress name ≠ single Deployment; both pods back this host (see gethomepage kubernetes.md)
    gethomepage.dev/pod-selector: app in (clutterstock-frontend, clutterstock-api)
spec:
  rules:
  - host: clutterstock.wsh.no
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: clutterstock-api
            port:
              number: 8080
      - path: /swagger
        pathType: Prefix
        backend:
          service:
            name: clutterstock-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: clutterstock-frontend
            port:
              number: 8080
---
