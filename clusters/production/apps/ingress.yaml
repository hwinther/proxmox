apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wshno
  namespace: wshno-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Homepage otherwise derives the link from the first Ingress rule host (wsh.no);
    # pin it to the www form explicitly.
    gethomepage.dev/href: "https://www.wsh.no/"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Apps
    gethomepage.dev/name: wsh.no
    gethomepage.dev/siteMonitor: https://www.wsh.no
    gethomepage.dev/icon: mdi-web
    gethomepage.dev/description: Personal homepage (root domain)
spec:
  rules:
  - host: wsh.no
    http:
      paths:
      # Curated game-server snapshot JSON, same-origin (Traefik longest-prefix routes these before /).
      # Backed by the <game>-status services, NOT the site image. Keeps Grafana/Prometheus private.
      - path: /api/valheim
        pathType: Prefix
        backend:
          service:
            name: valheim-status
            port:
              number: 8080
      - path: /api/enshrouded
        pathType: Prefix
        backend:
          service:
            name: enshrouded-status
            port:
              number: 8080
      - path: /api/satisfactory
        pathType: Prefix
        backend:
          service:
            name: satisfactory-status
            port:
              number: 8080
      - path: /api/spaceengineers
        pathType: Prefix
        backend:
          service:
            name: spaceengineers-status
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wshno
            port:
              number: 8080
  # www serves the same backend. LAN nginx already routes www.wsh.no via the
  # *.wsh.no server_name → wsh_general (production Traefik); no nginx change needed.
  - host: www.wsh.no
    http:
      paths:
      - path: /api/valheim
        pathType: Prefix
        backend:
          service:
            name: valheim-status
            port:
              number: 8080
      - path: /api/enshrouded
        pathType: Prefix
        backend:
          service:
            name: enshrouded-status
            port:
              number: 8080
      - path: /api/satisfactory
        pathType: Prefix
        backend:
          service:
            name: satisfactory-status
            port:
              number: 8080
      - path: /api/spaceengineers
        pathType: Prefix
        backend:
          service:
            name: spaceengineers-status
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: wshno
            port:
              number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: platform-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Platform
    gethomepage.dev/name: Homepage
    gethomepage.dev/siteMonitor: https://mgmt.wsh.no
    gethomepage.dev/icon: homepage
    gethomepage.dev/description: Service dashboard
spec:
  rules:
  - host: mgmt.wsh.no
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: homepage
            port:
              number: 3000
