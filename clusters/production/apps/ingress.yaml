apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clutterstock
  namespace: clutterstock-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Clutterstock
    gethomepage.dev/icon: mdi-image-multiple-outline
    gethomepage.dev/description: Clutterstock web app (API under /api/)
    # Ingress name ≠ single Deployment; both pods back this host (see gethomepage kubernetes.md)
    gethomepage.dev/pod-selector: app in (clutterstock-frontend, clutterstock-api)
spec:
  rules:
    - host: clutterstock.wsh.no
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: clutterstock-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clutterstock-frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: clutterstock-test
  namespace: clutterstock-test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Clutterstock (test)
    gethomepage.dev/icon: mdi-image-multiple-outline
    gethomepage.dev/description: Playwright / release checks — isolated SQLite + shared-test Redis; not production data
    gethomepage.dev/pod-selector: app in (clutterstock-frontend, clutterstock-api)
spec:
  rules:
    - host: clutterstock.test.wsh.no
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: clutterstock-api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: clutterstock-frontend
                port:
                  number: 8080
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: homepage
  namespace: platform-production
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/name: Homepage
    gethomepage.dev/icon: homepage
    gethomepage.dev/description: Service dashboard
spec:
  rules:
    - host: mgmt.wsh.no
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: homepage
                port:
                  number: 3000
