apiVersion: apps/v1
kind: Deployment
metadata:
  name: redisinsight
  namespace: shared-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redisinsight
  template:
    metadata:
      labels:
        app: redisinsight
        app.kubernetes.io/name: redisinsight
    spec:
      initContainers:
      - name: wait-for-valkey-auth
        image: valkey/valkey:9-alpine
        env:
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey-auth
              key: password
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          runAsGroup: 1000
        command:
        - /bin/sh
        - -c
        - |
          i=1
          while [ "$i" -le 90 ]; do
            valkey-cli -h redis -a "$VALKEY_PASSWORD" ping 2>/dev/null | grep -q PONG && exit 0
            sleep 1
            i=$((i + 1))
          done
          exit 1
      containers:
      - name: redisinsight
        image: redis/redisinsight:3.2.0
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - name: http
          containerPort: 5540
          protocol: TCP
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 15
        env:
        - name: RI_PROXY_PATH
          value: "/"
        - name: RI_REDIS_HOST
          value: "redis"
        - name: RI_REDIS_PORT
          value: "6379"
        - name: RI_REDIS_ALIAS
          value: "Default-Valkey"
        - name: RI_REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey-auth
              key: password
---
apiVersion: v1
kind: Service
metadata:
  name: redisinsight
  namespace: shared-test
spec:
  type: ClusterIP
  ports:
  - port: 5540
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: redisinsight
