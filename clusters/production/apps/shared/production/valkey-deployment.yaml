apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: shared-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
        app.kubernetes.io/component: cache
        app.kubernetes.io/name: valkey
    spec:
      securityContext:
        fsGroup: 1000
      containers:
      - name: redis
        image: docker.io/valkey/valkey:8-alpine
        command:
        - /bin/sh
        - -c
        - exec valkey-server --appendonly yes --dir /data --requirepass "$VALKEY_PASSWORD"
        env:
        - name: VALKEY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: valkey-auth
              key: password
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 999
          runAsGroup: 1000
        ports:
        - name: redis
          containerPort: 6379
        readinessProbe:
          tcpSocket:
            port: redis
          initialDelaySeconds: 2
          periodSeconds: 10
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        volumeMounts:
        - name: data
          mountPath: /data
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: valkey-data
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: shared-production
spec:
  type: ClusterIP
  ports:
  - port: 6379
    targetPort: redis
    protocol: TCP
    name: redis
  selector:
    app: redis
