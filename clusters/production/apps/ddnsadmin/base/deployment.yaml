# Shared production-shape Deployment for any ddnsadmin instance. Overlays under ../<instance>/
# inject `metadata.namespace`, pin the image (`images:` block), and patch the env values flagged
# REPLACE-IN-OVERLAY below. The base alone is intentionally non-runnable; rendering it directly
# (e.g. `kustomize build base`) is for diff inspection only.
#
# Shape vs. the preview / demo image (apps/previews/ddnsadmin/base/deployment.yaml):
#   1. DDNSADMIN_DEMO=false: scripts/start.sh skips the in-pod BIND install, the hard-coded TSIG
#      seed, the example.com zone bootstrap, and the demo `admin` superuser. The pod is a slim
#      Django container that talks to an EXTERNAL BIND via TSIG (configure Zone + TsigKey rows in
#      the Django admin once the bootstrap superuser logs in).
#   2. Runs as non-root (UID 1654), no NET_BIND_SERVICE, all caps dropped.
#   3. PVC-backed sqlite at /data/ddnsadmin.db (RWO). Switch DATABASE_URL to a postgres:// URL +
#      drop the PVC if HA / multi-replica is ever wanted.
#
# Secrets contract (see secrets-bootstrap.md; both must exist in the overlay's namespace):
#   - ddnsadmin-secrets:  SECRET_KEY, DJANGO_SUPERUSER_PASSWORD
#   - ghcr-pull:          GHCR image-pull credential (private package).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ddnsadmin
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ddnsadmin
  template:
    metadata:
      labels:
        app: ddnsadmin
        app.kubernetes.io/name: ddnsadmin
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
      - name: ghcr-pull
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: ddnsadmin
        image: ghcr.io/hwinther/ddnsadmin/ddnsadmin:placeholder
        imagePullPolicy: IfNotPresent
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        # --- Same across every instance ---
        - name: DDNSADMIN_DEMO
          value: "false"
        - name: DEBUG
          value: "false"
        - name: DATABASE_URL
          value: "sqlite:////data/ddnsadmin.db"
        - name: DARKMYST_MAGIC
          value: "false"
        # Idempotent — scripts/start.sh no-ops if the user already exists.
        - name: DJANGO_SUPERUSER_BOOTSTRAP
          value: "true"
        - name: DJANGO_SUPERUSER_USERNAME
          value: "admin"
        # --- REPLACE-IN-OVERLAY (overlay must merge-patch these) ---
        - name: WEB_PREFIX
          value: "https://REPLACE.ME"
        - name: ALLOWED_HOSTS
          value: "REPLACE.ME"
        - name: DJANGO_SUPERUSER_EMAIL
          value: "REPLACE@REPLACE.ME"
        envFrom:
        - secretRef:
            name: ddnsadmin-secrets
        ports:
        - name: http
          containerPort: 8000
          protocol: TCP
        resources:
          requests:
            cpu: 50m
            memory: 192Mi
          limits:
            cpu: 500m
            memory: 384Mi
        volumeMounts:
        - name: data
          mountPath: /data
        # collectstatic writes into /code/static_collected on every boot; emptyDir keeps it off
        # the read-only image layer without consuming PVC capacity.
        - name: static
          mountPath: /code/static_collected
        startupProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 5
          failureThreshold: 30
        readinessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /ddnsadmin/login/
            port: http
          periodSeconds: 30
          failureThreshold: 3
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ddnsadmin-data
      - name: static
        emptyDir: {}
