apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # kube-apiserver calls the webhook pod (10250/TCP). In k0s the apiserver runs on the host, so
  # cilium-cluster-nodes-to-webhook covers that path; kube-system ingress catches any in-cluster callers.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
  # In-namespace: controller ↔ webhook ↔ cainjector.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: cert-manager
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server + ACME (Let's Encrypt / DNS provider APIs).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-cluster-nodes-to-cert-manager-webhooks
  namespace: cert-manager
spec:
  # Covers all pods in the namespace. kube-apiserver (webhooks) and kubelet (readiness probes) both
  # run on the host in k0s — no port restriction here since probe ports vary by component.
  endpointSelector: {}
  ingress:
  - fromEntities:
    - host
    - remote-node
