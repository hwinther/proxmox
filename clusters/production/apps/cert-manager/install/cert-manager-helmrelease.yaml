# cert-manager: TLS certificates for RabbitMQ, Traefik, and other in-cluster consumers.
# Chart: https://github.com/cert-manager/cert-manager/tree/master/deploy/charts/cert-manager
# Installed via Flux Kustomization cert-manager-install so CRDs exist before ./clusters/production applies Certificates.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cert-manager
  namespace: cert-manager
spec:
  interval: 30m
  timeout: 15m
  targetNamespace: cert-manager
  install:
    createNamespace: false
    crds: CreateReplace
    remediation:
      retries: 3
  upgrade:
    crds: CreateReplace
    remediation:
      retries: 3
  chart:
    spec:
      chart: cert-manager
      version: "v1.20.2"
      sourceRef:
        kind: HelmRepository
        name: jetstack
        namespace: cert-manager
  values:
    crds:
      enabled: true
    global:
      commonLabels:
        app.kubernetes.io/part-of: cert-manager-production
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 256Mi
    webhook:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          memory: 128Mi
    cainjector:
      resources:
        requests:
          cpu: 25m
          memory: 64Mi
        limits:
          memory: 256Mi
    startupapicheck:
      resources:
        requests:
          cpu: 25m
          memory: 32Mi
        limits:
          memory: 128Mi
