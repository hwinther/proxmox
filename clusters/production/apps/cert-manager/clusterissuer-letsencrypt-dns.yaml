# ACME DNS-01 via RFC2136 (TSIG dynamic updates), same operational model as nginx / Proxmox ACME.
# TSIG secret `rfc2136-tsig-wsh-no` must exist in namespace cert-manager (see cert-manager-secrets.md).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    email: acme-notify@wsh.no
    privateKeySecretRef:
      name: clusterissuer-letsencrypt-dns-account-key
    server: https://acme-v02.api.letsencrypt.org/directory
    solvers:
    - selector:
        dnsZones:
        - wsh.no
      dns01:
        rfc2136:
          nameserver: 10.31.0.3:53
          tsigAlgorithm: HMACSHA512
          tsigKeyName: cert-manager-wsh-no
          tsigSecretSecretRef:
            name: rfc2136-tsig-wsh-no
            key: tsig-secret
