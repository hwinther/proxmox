# Kyverno's validate-policy admission webhook checks that its ServiceAccounts can access
# the generate rule's target namespace before accepting a ClusterPolicy. The background
# controller applies clone/sync for generate rules (see postgres-production policy
# clone-clutterstockdb-app-secret-to-clutterstock-production).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-generate-secret-clutterstockdb-app
  namespace: clutterstock-production
rules:
# No resourceNames: list/watch apply to the Secret collection; Kyverno's policy check uses list.
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-generate-secret-clutterstockdb-app
  namespace: clutterstock-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-generate-secret-clutterstockdb-app
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
