# RabbitMQ: create Secret clutterstock-production-rabbitmq before rollout (see ../rabbitmq-production/rabbitmq-secrets.md).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutterstock-api
  namespace: clutterstock-production
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: clutterstock-api
  template:
    metadata:
      labels:
        app: clutterstock-api
        app.kubernetes.io/name: clutterstock-api
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: clutterstock-api
        image: ghcr.io/hwinther/clutterstock/api:0.22.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: ASPNETCORE_URLS
          value: http://+:8080
        # Connects as the CNPG-managed `clutterstock` role via cloned clutterstock-pg-secret.
        - name: PG_HOST
          value: postgres-prod-rw.postgres-production.svc.cluster.local
        - name: PG_DB
          value: clutterstock
        - name: PG_USER
          value: clutterstock
        - name: PG_PASSWORD
          valueFrom:
            secretKeyRef:
              name: clutterstock-pg-secret
              key: password
        # URI form — API has a PostgresUrlParser that converts to ADO.NET key=value.
        # Config key must match Program.cs `GetConnectionString("ClutterStock")`.
        - name: ConnectionStrings__ClutterStock
          value: "postgresql://$(PG_USER):$(PG_PASSWORD)@$(PG_HOST):5432/$(PG_DB)"
        - name: OTEL_SERVICE_NAME
          value: "clutterstock-api"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://obs-otel-collector.observability-production.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: grpc
        - name: OTEL_TRACES_EXPORTER
          value: otlp
        - name: OTEL_RESOURCE_ATTRIBUTES
          value: service.namespace=clutterstock-production,deployment.environment=production
        - name: Authentication__Authority
          value: "https://auth.wsh.no"
        - name: Authentication__Audience
          value: "clutterstock-api"
        - name: RabbitMq__HostName
          value: rabbitmq.rabbitmq-production.svc.cluster.local
        - name: RabbitMq__VirtualHost
          value: prod
        - name: RabbitMq__UserName
          valueFrom:
            secretKeyRef:
              name: clutterstock-production-rabbitmq
              key: username
        - name: RabbitMq__Password
          valueFrom:
            secretKeyRef:
              name: clutterstock-production-rabbitmq
              key: password
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: clutterstock-api
  namespace: clutterstock-production
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: clutterstock-api
