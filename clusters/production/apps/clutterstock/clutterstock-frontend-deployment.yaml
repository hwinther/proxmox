apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutterstock-frontend
  namespace: clutterstock-production
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clutterstock-frontend
  template:
    metadata:
      labels:
        app: clutterstock-frontend
        app.kubernetes.io/name: clutterstock-frontend
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: clutterstock-frontend
        image: ghcr.io/hwinther/clutterstock/frontend:0.22.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        env:
        - name: PORT
          value: "8080"
        - name: SERVER_API_URL
          value: "http://clutterstock-api:8080"
        - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "https://clutterstock.wsh.no/v1/traces"
        - name: PUBLIC_OTEL_SERVICE_NAME
          value: "clutterstock-frontend"
        # Read at runtime by oidc.server.ts via process.env (not inlined at build time
        # because the SSR code uses process.env.VITE_*, not import.meta.env).
        - name: VITE_OIDC_AUTHORITY
          value: "https://auth.wsh.no"
        - name: VITE_OIDC_CLIENT_ID
          value: "clutterstock"
        # Public origin used by oidc.server.ts to build redirect_uri / post_logout_redirect_uri.
        # Required because Traefik terminates TLS and the pod sees http on inbound requests.
        - name: PUBLIC_ORIGIN
          value: "https://clutterstock.wsh.no"
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: clutterstock-valkey
              key: redis-url
---
apiVersion: v1
kind: Service
metadata:
  name: clutterstock-frontend
  namespace: clutterstock-production
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: clutterstock-frontend
