apiVersion: v1
kind: ServiceAccount
metadata:
  name: homepage
  namespace: platform-production
  labels:
    app.kubernetes.io/name: homepage
secrets:
- name: homepage
---
apiVersion: v1
kind: Secret
type: kubernetes.io/service-account-token
metadata:
  name: homepage
  namespace: platform-production
  labels:
    app.kubernetes.io/name: homepage
  annotations:
    kubernetes.io/service-account.name: homepage
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage
  namespace: platform-production
  labels:
    app.kubernetes.io/name: homepage
data:
  kubernetes.yaml: |
    mode: cluster
    ingress: true
  settings.yaml: |
    title: Production Management
    favicon: https://gethomepage.dev/favicon.ico
    headerStyle: clean
    # Group order + per-group layout. Groups are populated from the ingress gethomepage.dev/group
    # annotations (Apps/Observability/Data/Platform) plus the static Infrastructure tiles in
    # services.yaml. Any group not listed here still renders, appended after these.
    layout:
      Apps:
        style: row
        columns: 4
      Observability:
        style: row
        columns: 4
      Data:
        style: row
        columns: 4
      Platform:
        style: row
        columns: 4
      Infrastructure:
        style: row
        columns: 4
  custom.css: ""
  custom.js: ""
  bookmarks.yaml: ""
  # Static tiles that have no in-cluster Ingress to auto-discover from. The Proxmox VE / PBS hosts are
  # on the LAN, reachable over the homepage pod's existing egress (no netpol). Secrets are injected as
  # {{HOMEPAGE_VAR_*}} from the `homepage-secrets` Secret (envFrom in the Deployment) — substitution
  # works in this file but NOT in ingress annotations. See homepage-secrets.md.
  # The proxmox widget `password` is the API-token SECRET; `username` is user@realm!tokenid.
  services.yaml: |
    # In-cluster widgets: defined statically (not via Ingress annotations) because their credentials
    # come from {{HOMEPAGE_VAR_*}}, which only substitutes in this file. Auto-discovery is disabled on
    # the matching Ingresses (gethomepage.dev/enabled:"false") to avoid duplicate tiles. Reachability
    # is granted by the allow-homepage-to-widget-targets CiliumNetworkPolicy. Alertmanager stays
    # auto-discovered (no credential) with its widget set via annotations.
    - Apps:
        - Home Assistant:
            icon: mdi-home-assistant
            href: https://home-assistant.wsh.no/
            description: Home automation
            siteMonitor: https://home-assistant.wsh.no
            widget:
              type: homeassistant
              url: http://home-assistant.home-assistant-production.svc.cluster.local:8123
              key: "{{HOMEPAGE_VAR_HASS_TOKEN}}"
    - Observability:
        - Grafana:
            icon: grafana
            href: https://grafana.mgmt.wsh.no/
            description: Observability dashboards
            siteMonitor: https://grafana.mgmt.wsh.no
            widget:
              type: grafana
              url: http://obs-kps-grafana.observability-production.svc.cluster.local:80
              username: "{{HOMEPAGE_VAR_GRAFANA_USER}}"
              password: "{{HOMEPAGE_VAR_GRAFANA_PASSWORD}}"
        - Alertmanager:
            icon: mdi-bell-alert
            href: https://alertmanager.mgmt.wsh.no/
            description: Prometheus alerts
            siteMonitor: https://alertmanager.mgmt.wsh.no
            # homepage has no native alertmanager widget — customapi counts active (firing, non-silenced)
            # alerts via the v2 API. No credential (in-cluster AM has no auth). Note: the Watchdog alert
            # always fires by design, so the count's floor is 1.
            widget:
              type: customapi
              url: http://obs-kps-kube-prometheus-st-alertmanager.observability-production.svc.cluster.local:9093/api/v2/alerts?active=true&silenced=false&inhibited=false
              refreshInterval: 30000
              mappings:
                - label: Firing
                  format: size
    - Data:
        - RabbitMQ:
            icon: mdi-rabbit
            href: https://rabbitmq.mgmt.wsh.no/
            description: HA broker management
            siteMonitor: https://rabbitmq.mgmt.wsh.no
            # homepage has no native rabbitmq widget type — use customapi against the management
            # /api/overview. The homepage user needs the `monitoring` tag (read-only).
            widget:
              type: customapi
              url: http://rabbitmq.rabbitmq-production.svc.cluster.local:15672/api/overview
              username: "{{HOMEPAGE_VAR_RABBITMQ_USER}}"
              password: "{{HOMEPAGE_VAR_RABBITMQ_PASSWORD}}"
              refreshInterval: 30000
              mappings:
                - field: object_totals.queues
                  label: Queues
                  format: number
                - field: queue_totals.messages
                  label: Messages
                  format: number
                - field: object_totals.connections
                  label: Connections
                  format: number
    - Infrastructure:
        - Proxmox VE:
            icon: proxmox
            href: "{{HOMEPAGE_VAR_PROXMOX_URL}}"
            description: Virtualization + Ceph cluster
            siteMonitor: "{{HOMEPAGE_VAR_PROXMOX_URL}}"
            widget:
              type: proxmox
              url: "{{HOMEPAGE_VAR_PROXMOX_URL}}"
              username: "{{HOMEPAGE_VAR_PROXMOX_USER}}"
              password: "{{HOMEPAGE_VAR_PROXMOX_TOKEN}}"
        - PBS (OSL):
            icon: proxmox
            href: "{{HOMEPAGE_VAR_PBS_OSL_URL}}"
            description: Backup server — OSL
            siteMonitor: "{{HOMEPAGE_VAR_PBS_OSL_URL}}"
            widget:
              type: proxmoxbackupserver
              url: "{{HOMEPAGE_VAR_PBS_OSL_URL}}"
              username: "{{HOMEPAGE_VAR_PBS_OSL_USER}}"
              password: "{{HOMEPAGE_VAR_PBS_OSL_TOKEN}}"
        - PBS (KS):
            icon: proxmox
            href: "{{HOMEPAGE_VAR_PBS_KS_URL}}"
            description: Backup server — KS
            siteMonitor: "{{HOMEPAGE_VAR_PBS_KS_URL}}"
            widget:
              type: proxmoxbackupserver
              url: "{{HOMEPAGE_VAR_PBS_KS_URL}}"
              username: "{{HOMEPAGE_VAR_PBS_KS_USER}}"
              password: "{{HOMEPAGE_VAR_PBS_KS_TOKEN}}"
  widgets.yaml: |
    - greeting:
        text_size: xl
        text: Production
    - datetime:
        text_size: xl
        format:
          dateStyle: short
          timeStyle: short
          hourCycle: h23
    - kubernetes:
        cluster:
          show: true
          cpu: true
          memory: true
          showLabel: true
          label: "production"
        nodes:
          show: true
          cpu: true
          memory: true
          showLabel: true
    - search:
        provider: duckduckgo
        target: _blank
  docker.yaml: ""
  # Legacy file kept only to satisfy the Deployment subPath mount; the Proxmox widget is configured
  # inline in services.yaml (Phase B), not here.
  proxmox.yaml: ""
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: homepage-production
  labels:
    app.kubernetes.io/name: homepage
rules:
- apiGroups:
  - ""
  resources:
  - namespaces
  - pods
  - nodes
  verbs:
  - get
  - list
- apiGroups:
  - extensions
  - networking.k8s.io
  resources:
  - ingresses
  verbs:
  - get
  - list
- apiGroups:
  - traefik.io
  resources:
  - ingressroutes
  verbs:
  - get
  - list
- apiGroups:
  - metrics.k8s.io
  resources:
  - nodes
  - pods
  verbs:
  - get
  - list
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: homepage-production
  labels:
    app.kubernetes.io/name: homepage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: homepage-production
subjects:
- kind: ServiceAccount
  name: homepage
  namespace: platform-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: platform-production
  labels:
    app.kubernetes.io/name: homepage
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      containers:
      - name: homepage
        image: ghcr.io/gethomepage/homepage:v1.13.1
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        env:
        - name: MY_POD_IP
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        - name: HOMEPAGE_ALLOWED_HOSTS
          value: "$(MY_POD_IP):3000,mgmt.wsh.no"
        # HOMEPAGE_VAR_* values for services.yaml widget credentials (Proxmox/PBS). Optional so the pod
        # still starts before the Secret exists; widgets just stay empty until it's created. See
        # homepage-secrets.md.
        envFrom:
        - secretRef:
            name: homepage-secrets
            optional: true
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /api/healthcheck
            port: http
          initialDelaySeconds: 5
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /api/healthcheck
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        volumeMounts:
        - mountPath: /app/config/custom.js
          name: homepage-config
          subPath: custom.js
        - mountPath: /app/config/custom.css
          name: homepage-config
          subPath: custom.css
        - mountPath: /app/config/bookmarks.yaml
          name: homepage-config
          subPath: bookmarks.yaml
        - mountPath: /app/config/docker.yaml
          name: homepage-config
          subPath: docker.yaml
        - mountPath: /app/config/proxmox.yaml
          name: homepage-config
          subPath: proxmox.yaml
        - mountPath: /app/config/kubernetes.yaml
          name: homepage-config
          subPath: kubernetes.yaml
        - mountPath: /app/config/services.yaml
          name: homepage-config
          subPath: services.yaml
        - mountPath: /app/config/settings.yaml
          name: homepage-config
          subPath: settings.yaml
        - mountPath: /app/config/widgets.yaml
          name: homepage-config
          subPath: widgets.yaml
        - mountPath: /app/config/logs
          name: logs
      volumes:
      - name: homepage-config
        configMap:
          name: homepage
      - name: logs
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: homepage
  namespace: platform-production
  labels:
    app.kubernetes.io/name: homepage
spec:
  type: ClusterIP
  ports:
  - port: 3000
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: homepage
