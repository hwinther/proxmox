apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: homepage
  namespace: platform-production
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Traefik: standard NP covers pod-to-pod; cilium-cluster-nodes-to-http covers host/remote-node (Traefik hostNetwork).
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 3000
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server (namespaces, pods, nodes, ingresses, metrics.k8s.io).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-homepage-to-apiserver
  namespace: platform-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
  egress:
  - toEntities:
    - kube-apiserver
---
# Egress for the in-cluster service widgets (homepage.yaml services.yaml). The k8s NP's 0.0.0.0/0 egress
# does NOT cover cluster-internal pods (Cilium can't match cluster identities by CIDR), so each target
# needs an explicit toEndpoints rule. Targets also allow homepage on their ingress side (Grafana/
# Alertmanager are unrestricted in observability-production; RabbitMQ + Home Assistant get matching
# allow-homepage-* CNPs in their namespaces).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-homepage-to-widget-targets
  namespace: platform-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: homepage
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: observability-production
        app.kubernetes.io/name: grafana
    toPorts:
    # Grafana's Service is 80 → targetPort 3000. Cilium socket-LB rewrites the ClusterIP connection to
    # the backend pod port BEFORE egress policy is enforced, so the rule must allow 3000 (the pod port),
    # not 80 (the service port). The other targets work because their service and pod ports match.
    - ports:
      - port: "3000"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: observability-production
        app.kubernetes.io/name: alertmanager
    toPorts:
    - ports:
      - port: "9093"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: rabbitmq-production
        app.kubernetes.io/name: rabbitmq
    toPorts:
    - ports:
      - port: "15672"
        protocol: TCP
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: home-assistant-production
        app.kubernetes.io/name: home-assistant
    toPorts:
    - ports:
      - port: "8123"
        protocol: TCP
