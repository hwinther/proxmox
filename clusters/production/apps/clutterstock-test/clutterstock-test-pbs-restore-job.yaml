# Restore clutterstock-test postgres database from a PBS snapshot into the CNPG cluster.
# Same amd64-only PBS client image and tag as the backup Job (see clutterstock-test-pbs-backup-job.yaml).
#
# Not in kustomization.yaml: apply manually when needed, e.g.
#   kubectl apply -f clusters/production/apps/clutterstock-test/clutterstock-test-pbs-restore-job.yaml
#
# Flow:
#   1. initContainer pbs-restore pulls db.pxar from PBS_RESTORE_SNAPSHOT into an emptyDir.
#   2. Main container runs pg_restore against the CNPG cluster (creds from cluttertestdb-app/uri).
#
# Prerequisites:
#   1. Secret `clutterstock-test-pbs-backup`: PBS_REPOSITORY, PBS_PASSWORD, and PBS_RESTORE_SNAPSHOT
#      (see pbs-backup-secrets.md). List snapshots via a debug pod or
#      `proxmox-backup-client list` with the same credentials.
#   2. CNPG cluster `cluttertestdb` Ready.
#
# WARNING: `pg_restore --clean --if-exists` drops and recreates objects owned by the `app` user
#          inside the target database. Verify on a clone first.
#
# Re-runs: `spec.template` is immutable — delete the Job or bump `metadata.name` when the pod spec changes.
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-test-pbs-restore-v005
  namespace: clutterstock-test
spec:
  backoffLimit: 1
  # Job object (and finished Pods) are deleted this many seconds after Complete/Failed — expect `kubectl get jobs` to be empty afterward.
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clutterstock-pbs-restore
        app.kubernetes.io/component: clutterstock-pbs-backup
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      hostname: clutterstock-test-postgres
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      - name: pbs-restore
        image: ghcr.io/hwinther/proxmox/proxmox/pbs/backup-client:0.6.1
        imagePullPolicy: IfNotPresent
        # Match backup Job: append --ns / --keyfile only when configured. Encrypted backups
        # require both --keyfile and PBS_ENCRYPTION_PASSWORD (read from env by the client).
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          : "${PBS_RESTORE_SNAPSHOT:?set PBS_RESTORE_SNAPSHOT in Secret clutterstock-test-pbs-backup}"
          set -- restore
          [ -n "${PBS_NAMESPACE:-}" ] && set -- "$@" --ns "$PBS_NAMESPACE"
          [ -f /etc/pbs/keyfile ] && set -- "$@" --keyfile /etc/pbs/keyfile
          set -- "$@" "$PBS_RESTORE_SNAPSHOT" db.pxar /dump/
          exec /usr/bin/proxmox-backup-client "$@"
        envFrom:
        - secretRef:
            name: clutterstock-test-pbs-backup
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: dump
          mountPath: /dump
        - name: pbs-keyfile
          mountPath: /etc/pbs
          readOnly: true
      containers:
      - name: pgrestore
        image: postgres:18-alpine
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - 'pg_restore --clean --if-exists --no-owner --no-acl -d "$PGURI" /dump/clutterstock.pgdump'
        env:
        - name: PGURI
          valueFrom:
            secretKeyRef:
              name: cluttertestdb-app
              key: uri
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: dump
          mountPath: /dump
      volumes:
      - name: dump
        emptyDir: {}
      # Cluster-wide PBS encryption keyfile, cloned by Kyverno from platform-production.
      - name: pbs-keyfile
        secret:
          secretName: pbs-encryption-keyfile
          optional: true
          items:
          - key: keyfile
            path: keyfile
            mode: 0400
