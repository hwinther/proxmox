apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
namespace: clutterstock-test
components:
- ../../../../bases/netpol-baseline
resources:
- namespace.yaml
- kyverno-rbac-generate-cluttertestdb-app-secret.yaml
- clutterstock-api-deployment.yaml
- clutterstock-frontend-deployment.yaml
- clutterstock-test-pbs-backup-job.yaml
# Restore is clutterstock-test-pbs-restore-job.yaml — apply manually so Flux does not keep a failed/duplicate restore Job.
- networkpolicies.yaml
- cilium-cluster-nodes-to-http.yaml
