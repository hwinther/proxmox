apiVersion: apps/v1
kind: Deployment
metadata:
  name: clutterstock-frontend
  namespace: clutterstock-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: clutterstock-frontend
  template:
    metadata:
      labels:
        app: clutterstock-frontend
        app.kubernetes.io/name: clutterstock-frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: clutterstock-frontend
        image: ghcr.io/hwinther/clutterstock/frontend:0.14.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        readinessProbe:
          tcpSocket:
            port: http
          initialDelaySeconds: 3
          periodSeconds: 10
        env:
        - name: PORT
          value: "8080"
        - name: SERVER_API_URL
          value: "http://clutterstock-api:8080"
        - name: PUBLIC_OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
          value: "https://otel.mgmt.wsh.no/v1/traces"
        - name: PUBLIC_OTEL_SERVICE_NAME
          value: "clutterstock-frontend"
        - name: REDIS_URL
          value: "redis://redis.shared-test.svc.cluster.local:6379"
---
apiVersion: v1
kind: Service
metadata:
  name: clutterstock-frontend
  namespace: clutterstock-test
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: clutterstock-frontend
