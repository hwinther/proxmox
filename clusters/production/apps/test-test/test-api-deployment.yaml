apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-api
  namespace: test-test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: test-api
  template:
    metadata:
      labels:
        app: test-api
        app.kubernetes.io/name: test-api
    spec:
      # Grace period must exceed preStop sleep (20s) + longest expected SignalR reconnect window.
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        runAsGroup: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      containers:
      - name: test-api
        image: ghcr.io/hwinther/test/api:0.68.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        env:
        - name: ASPNETCORE_URLS
          value: "http://+:8080"
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        # Npgsql URI from CNPG Secret (see ../postgres-test/postgres-test-secrets.md); Kyverno clones testdb-app into test-test.
        - name: ConnectionStrings__Blogging
          valueFrom:
            secretKeyRef:
              name: testdb-app
              key: uri
        # Shared Valkey (redis.shared-test); test-frontend-valkey Secret holds a full redis:// URL with password + db=0.
        - name: ConnectionStrings__Redis
          valueFrom:
            secretKeyRef:
              name: test-frontend-valkey
              key: redis-url
        - name: OTEL_SERVICE_NAME
          value: "test-api"
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "http://obs-otel-collector.observability-production.svc.cluster.local:4317"
        - name: OTEL_EXPORTER_OTLP_PROTOCOL
          value: "grpc"
        - name: OTEL_TRACES_EXPORTER
          value: "otlp"
        - name: RabbitMq__HostName
          value: "rabbitmq.rabbitmq-production.svc.cluster.local"
        - name: RabbitMq__Port
          value: "5672"
        - name: RabbitMq__VirtualHost
          value: "test"
        - name: RabbitMq__UserName
          valueFrom:
            secretKeyRef:
              name: test-api-rabbitmq
              key: username
        - name: RabbitMq__Password
          valueFrom:
            secretKeyRef:
              name: test-api-rabbitmq
              key: password
        # OIDC bearer validation: Authelia issues RFC 9068 JWTs with aud=pxce-api for the pxce client (see
        # ../authelia-production/authelia-helmrelease.yaml `requested_audience_mode: implicit`).
        - name: Oidc__Authority
          value: "https://auth.wsh.no"
        - name: Oidc__Audience
          value: "pxce-api"
        # CORS: only the public production origin here; localhost/:5173 stays in Development appsettings.
        - name: Cors__AllowedOrigins__0
          value: "https://test.test.wsh.no"
        # Point OpenSSL (and by extension .NET 8+ SslStream / RabbitMQ.Client AMQPS) at the wsh-internal-ca
        # bundle so the broker's self-signed management/AMQPS cert verifies. ConfigMap wsh-internal-ca is
        # rendered into this namespace by trust-manager Bundle wsh-internal-ca (see
        # ../cert-manager/bundle-wsh-internal-ca.yaml + the wsh.no/trust-bundle label on namespace.yaml).
        - name: SSL_CERT_FILE
          value: /etc/ssl/wsh/ca-bundle.crt
        - name: SSL_CERT_DIR
          value: /etc/ssl/wsh
        ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        # SignalR hubs keep long-lived WebSockets; drain connections on rollout instead of flipping
        # pods mid-flight. preStop sleep keeps the pod in Terminating long enough for Traefik to stop
        # routing new traffic here (Traefik re-reads Endpoints on node-local cache invalidation),
        # and readiness on /healthz waits for DI + Redis backplane before accepting traffic.
        readinessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
        lifecycle:
          preStop:
            exec:
              command: [ "sh", "-c", "sleep 20" ]
        volumeMounts:
        - name: wsh-ca-bundle
          mountPath: /etc/ssl/wsh
          readOnly: true
      volumes:
      - name: wsh-ca-bundle
        configMap:
          name: wsh-internal-ca
          items:
          - key: ca-bundle.crt
            path: ca-bundle.crt
---
apiVersion: v1
kind: Service
metadata:
  name: test-api
  namespace: test-test
spec:
  type: ClusterIP
  ports:
  - port: 8080
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: test-api
