apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: test
  namespace: test-test
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Applications
    gethomepage.dev/name: Test (repo sample)
    gethomepage.dev/icon: mdi-application-outline
    gethomepage.dev/description: Sample test app — API under /api/; Swagger under /swagger
    gethomepage.dev/pod-selector: app in (test-frontend, test-api)
spec:
  rules:
  - host: test.test.wsh.no
    http:
      paths:
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: test-api
            port:
              number: 8080
      - path: /swagger
        pathType: Prefix
        backend:
          service:
            name: test-api
            port:
              number: 8080
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-frontend
            port:
              number: 8080
