apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-api
  namespace: test-test
spec:
  podSelector:
    matchLabels:
      app: test-api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: test-test
    - podSelector:
        matchLabels:
          app: test-frontend
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
      except:
      - 169.254.169.254/32
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: test-frontend
  namespace: test-test
spec:
  podSelector:
    matchLabels:
      app: test-frontend
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: test-test
    - podSelector:
        matchLabels:
          app: test-api
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: shared-test
    - podSelector:
        matchLabels:
          app: redis
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
      except:
      - 169.254.169.254/32
