# Import credentials from Secret clutterstock-prod-rabbitmq-credentials (not in git).
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: clutterstock-prod
  namespace: rabbitmq-production
spec:
  rabbitmqClusterReference:
    name: rabbitmq
  importCredentialsSecret:
    name: clutterstock-prod-rabbitmq-credentials
