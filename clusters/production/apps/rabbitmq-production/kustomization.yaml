apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
- https://github.com/rabbitmq/cluster-operator/releases/download/v2.20.1/cluster-operator.yml
- messaging-topology-operator-no-namespace.yaml
- namespace.yaml
- certificate-rabbitmq-tls.yaml
- rabbitmq-cluster.yaml
- topology-vhost-prod.yaml
- topology-vhost-test.yaml
- topology-user-test-api.yaml
- topology-permission-test-api.yaml
- topology-user-clutterstock-test.yaml
- topology-user-clutterstock-prod.yaml
- topology-permission-clutterstock-test.yaml
- topology-permission-clutterstock-prod.yaml
- networkpolicy-rabbitmq.yaml
- cilium-cluster-nodes-to-rabbitmq-management.yaml
- rabbitmq-management-ingress.yaml
# Patches: label rabbitmq-system so trust-manager's wsh-internal-ca Bundle renders the ConfigMap
# there, then mount it into the topology operator Pod so Go's x509 trust includes our self-signed
# CA. Without this, User/Permission/Vhost CRs fail with "x509: certificate signed by unknown authority".
patches:
- path: patch-rabbitmq-system-trust-bundle.yaml
  target:
    kind: Namespace
    name: rabbitmq-system
- path: patch-topology-operator-ca-mount.yaml
  target:
    kind: Deployment
    name: messaging-topology-operator
    namespace: rabbitmq-system
