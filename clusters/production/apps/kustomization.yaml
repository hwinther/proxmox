apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
# platform-production also hosts the cluster-wide pbs-encryption-keyfile clone policy + RBAC.
- platform-production
- ceph-csi
# Cilium LB-IPAM pool + L2 announcement policy (VIP for type=LoadBalancer svcs).
- cilium-lb
# Pointer to a second (private) Flux Git source. See private-apps/.
- private-apps
# cnpg-system + postgres-* Cluster CRs: separate Flux Kustomizations (gotk-sync) so Helm installs CRDs before dry-run.
- cert-manager
- traefik
- authelia-production
- headlamp-production
- oidc-k8s-admins-rbac
- policy-reporter-production
- kubescape-production
- observability
- homepage
- shared/production
- shared/test
- rabbitmq-production
# App namespaces + Kyverno RoleBindings before postgres-* Kyverno clone ClusterPolicies (validate-policy SAR).
- test-test
- clutterstock-test
- clutterstock
- ddnsadmin
- home-assistant-production
- mosquitto-production
- node-red-production
- esp-poller-production
- wshno
# Chaos toy: cluster-wide pod-killer (DOOM), dormant by default (replicas: 0). See kubedoom/README.md.
- kubedoom
- ingress.yaml
- hubble-ui-ingress.yaml
