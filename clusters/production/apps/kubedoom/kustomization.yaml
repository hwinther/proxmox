apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
# Cluster-scoped resources in rbac.yaml (ClusterRole/ClusterRoleBinding) are left untouched by the
# namespace transformer; the ServiceAccount + its binding subject stay in kubedoom.
namespace: kubedoom
components:
- ../../../../bases/netpol-baseline
resources:
- namespace-kubedoom.yaml
- rbac.yaml
- kubedoom-deployment.yaml
- kubedoom-ingress.yaml
- networkpolicies.yaml
- cilium-cluster-nodes-to-http.yaml
- kyverno-policyexception-kubedoom.yaml
