apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubescape
  namespace: kubescape-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # In-namespace: operator ↔ controller ↔ storage ↔ kubevuln coordination.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubescape-production
  # Prometheus metrics scraping.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # Kubernetes API server + container registries (image vulnerability scanning).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kubescape-to-apiserver
  namespace: kubescape-production
spec:
  endpointSelector: {}
  egress:
  - toEntities:
    - kube-apiserver
