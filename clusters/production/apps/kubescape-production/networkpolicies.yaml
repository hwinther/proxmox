apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: kubescape
  namespace: kubescape-production
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # In-namespace: operator ↔ controller ↔ storage ↔ kubevuln coordination.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubescape-production
  # Prometheus metrics scraping.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # In-namespace coordination: operator ↔ kubescape ↔ kubevuln ↔ storage ↔ node-agent ↔ scheduler Jobs.
  # Required as a discrete rule because Cilium treats `ipBlock: 0.0.0.0/0` as the `world` entity and
  # does NOT include identity-routed cluster-internal pod IPs — see CNP semantics for Cilium NetworkPolicy.
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kubescape-production
  # Kubernetes API server + container registries (image vulnerability scanning).
  # `world` entity in Cilium terms — covers external IPs only; in-cluster pod-to-pod uses identities.
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-kubescape-to-apiserver
  namespace: kubescape-production
spec:
  endpointSelector: {}
  egress:
  - toEntities:
    - kube-apiserver
---
# Admission webhook: apiserver → kubescape-operator:8443. With Cilium kube-proxy replacement
# the apiserver-originated traffic arrives with `host` / `remote-node` identity (per-node
# CiliumInternalIP), not the `kube-apiserver` entity — same pattern as cnpg-to-kubernetes-apiserver.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-to-kubescape-webhook
  namespace: kubescape-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: kubescape-operator
      app.kubernetes.io/component: operator
  ingress:
  - fromEntities:
    - host
    - remote-node
    - kube-apiserver
    toPorts:
    - ports:
      - port: "8443"
        protocol: TCP
---
# Aggregated API (v1beta1.spdx/v1beta1.softwarecomposition): apiserver → storage pod :8443
# (Service storage 443→8443). Same identity caveat as the webhook CNP above: apiserver-originated
# traffic arrives as host/remote-node, not the kube-apiserver entity. Without this the namespace
# NetworkPolicy's ingress rules (kubescape-production + observability-production only) drop the
# calls — seen as a steady (non-pod)→kubescape-production hubble_drop_total and intermittent
# KubeAggregatedAPIDown (~80% available) alerts.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-apiserver-to-kubescape-storage
  namespace: kubescape-production
spec:
  endpointSelector:
    matchLabels:
      app: storage
  ingress:
  - fromEntities:
    - host
    - remote-node
    - kube-apiserver
    toPorts:
    - ports:
      - port: "8443"
        protocol: TCP
