apiVersion: v1
kind: Namespace
metadata:
  name: traefik
  labels:
    app.kubernetes.io/part-of: production
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 1h
  url: https://traefik.github.io/charts
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: traefik
  namespace: traefik
spec:
  interval: 30m
  ## CRDs applied from traefik-crds.yaml (same chart version); avoid Helm/Flux ordering issues.
  install:
    crds: Skip
  upgrade:
    crds: Skip
  chart:
    spec:
      chart: traefik
      version: "39.0.7"
      sourceRef:
        kind: HelmRepository
        name: traefik
        namespace: traefik
  values:
    deployment:
      kind: DaemonSet
    updateStrategy:
      type: RollingUpdate
      rollingUpdate:
        maxUnavailable: 1
        maxSurge: 0
    hostNetwork: true
    service:
      type: ClusterIP
    ports:
      traefik:
        port: 9000
        expose:
          default: false
      web:
        port: 8000
        expose:
          default: true
      websecure:
        port: 8444
        expose:
          default: true
