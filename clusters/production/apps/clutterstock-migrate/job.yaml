# Bump metadata.name when changing template or migrator image (Job spec is immutable).
apiVersion: batch/v1
kind: Job
metadata:
  name: clutterstock-migrate-v100
  namespace: clutterstock-production
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/component: clutterstock-migrate
    spec:
      restartPolicy: Never
      # Same UID/fsGroup as clutterstock-api so SQLite files and /data stay readable/writable by the API.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      # RWO PVC: scale clutterstock-api to 0 before this Job runs, or the volume stays attached to the API pod.
      initContainers:
      - name: ensure-data-writable
        image: docker.io/library/busybox:1.37
        command:
        - sh
        - -c
        - mkdir -p /data && ls -la /data
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      containers:
      - name: migrator
        image: ghcr.io/hwinther/clutterstock/migrator:0.16.0
        imagePullPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        env:
        - name: ConnectionStrings__ClutterStock
          value: Data Source=/data/clutterstock.db
        volumeMounts:
        - name: sqlite-data
          mountPath: /data
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
      volumes:
      - name: sqlite-data
        persistentVolumeClaim:
          claimName: clutterstock-api-sqlite
