apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia-production
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: authelia
      version: "0.10.50"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: authelia-production
  values:
    rbac:
      enabled: true
    pod:
      kind: Deployment
      replicas: 1
      labels:
        app.kubernetes.io/name: authelia
      extraVolumeMounts:
        - name: authelia-data
          mountPath: /config
        - name: users-database
          mountPath: /config/users.yml
          subPath: users.yml
          readOnly: true
      extraVolumes:
        - name: authelia-data
          emptyDir:
            sizeLimit: 256Mi
        - name: users-database
          configMap:
            name: authelia-users
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    secret:
      additionalSecrets:
        authelia-oidc-jwks:
          items:
            - key: oidc-jwk-rsa.pem
              path: oidc-jwk-rsa.pem
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Management
        gethomepage.dev/name: Authelia
        gethomepage.dev/icon: mdi-shield-account
        gethomepage.dev/description: SSO login portal (Headlamp OIDC + Traefik forward auth)
      rulesOverride:
        - host: auth.mgmt.wsh.no
          path: /
    configMap:
      theme: auto
      session:
        name: authelia_session
        same_site: lax
        expiration: 12 hours
        inactivity: 45 minutes
        remember_me: 1 month
        cookies:
          - domain: wsh.no
            authelia_url: http://auth.mgmt.wsh.no
            default_redirection_url: http://headlamp.mgmt.wsh.no/
      access_control:
        default_policy: deny
        rules:
          - domain: auth.mgmt.wsh.no
            policy: bypass
          - domain: headlamp.mgmt.wsh.no
            policy: one_factor
      authentication_backend:
        file:
          enabled: true
          path: /config/users.yml
          watch: false
      storage:
        local:
          enabled: true
          path: /config/db.sqlite3
      notifier:
        disable_startup_check: true
        filesystem:
          enabled: true
          filename: /config/notification.txt
      identity_providers:
        oidc:
          enabled: true
          jwks:
            - key_id: authelia-headlamp
              algorithm: RS256
              use: sig
              key:
                path: authelia-oidc-jwks/oidc-jwk-rsa.pem
          clients:
            - client_id: headlamp
              client_name: Headlamp
              public: true
              require_pkce: true
              pkce_challenge_method: S256
              authorization_policy: one_factor
              consent_mode: pre-configured
              pre_configured_consent_duration: 1 year
              redirect_uris:
                - http://headlamp.mgmt.wsh.no/oidc-callback
              scopes:
                - openid
                - profile
                - email
                - groups
