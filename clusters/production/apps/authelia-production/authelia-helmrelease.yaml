apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authelia
  namespace: authelia-production
spec:
  interval: 30m
  timeout: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  chart:
    spec:
      chart: authelia
      version: "0.10.50"
      sourceRef:
        kind: HelmRepository
        name: authelia
        namespace: authelia-production
  values:
    rbac:
      enabled: true
    pod:
      kind: Deployment
      replicas: 1
      # Satisfy Kyverno (wsh-require-run-as-non-root, wsh-disallow-privilege-escalation) so Helm upgrades
      # can roll the Deployment; chart defaults omit securityContext and admission warns / blocks rollout.
      securityContext:
        pod:
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          fsGroup: 1000
          seccompProfile:
            type: RuntimeDefault
        container:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
      extraVolumeMounts:
      - name: authelia-data
        mountPath: /config
      extraVolumes:
      - name: authelia-data
        emptyDir:
          sizeLimit: 256Mi
      resources:
        requests:
          cpu: 50m
          memory: 256Mi
        limits:
          memory: 512Mi
    secret:
      additionalSecrets:
        authelia-oidc-jwks:
          items:
          - key: oidc-jwk-rsa.pem
            path: oidc-jwk-rsa.pem
        authelia-ldap-bind:
          items:
          - key: authentication.ldap.password.txt
            path: authentication.ldap.password.txt
        authelia-session-valkey:
          items:
          - key: session.redis.password.txt
            path: session.redis.password.txt
    ingress:
      enabled: true
      annotations:
        traefik.ingress.kubernetes.io/router.entrypoints: web
        gethomepage.dev/enabled: "true"
        gethomepage.dev/group: Management
        gethomepage.dev/name: Authelia
        gethomepage.dev/icon: mdi-shield-account
        gethomepage.dev/description: SSO / OIDC issuer at auth.wsh.no (Headlamp + Traefik forward auth)
      rulesOverride:
      - host: auth.wsh.no
        path: /
    configMap:
      theme: auto
      ntp:
        address: udp://10.20.13.1:123
      session:
        name: authelia_session
        same_site: lax
        expiration: 12 hours
        inactivity: 45 minutes
        remember_me: 1 month
        redis:
          enabled: true
          host: redis.shared-production.svc.cluster.local
          port: 6379
          database_index: 15
          tls:
            enabled: false
          high_availability:
            enabled: false
          password:
            disabled: false
            secret_name: authelia-session-valkey
            path: session.redis.password.txt
        cookies:
        - domain: wsh.no
          subdomain: auth
          default_redirection_url: https://headlamp.mgmt.wsh.no/
      access_control:
        default_policy: deny
        rules:
        - domain: auth.wsh.no
          policy: bypass
        # Forward-auth applies to all Headlamp paths; probes hit healthz without a session — bypass avoids 302 noise
        # and keeps readiness/liveness working. First matching rule wins (see Authelia access control docs).
        - domain: headlamp.mgmt.wsh.no
          policy: bypass
          resources:
          - "^/clusters/[^/]+/healthz$"
        # OIDC redirect lands on headlamp before a portal session exists; ForwardAuth + two_factor would 302 forever.
        # Callback is still protected by OAuth state + PKCE; bypass only this path (see Traefik + Authelia OIDC notes).
        - domain: headlamp.mgmt.wsh.no
          policy: bypass
          resources:
          - "^/oidc-callback([?].*)?$"
        - domain: headlamp.mgmt.wsh.no
          policy: two_factor
        - domain: redis-prod.mgmt.wsh.no
          policy: two_factor
        - domain: redis-test.mgmt.wsh.no
          policy: two_factor
      authentication_backend:
        password_change:
          disable: true
        ldap:
          enabled: true
          implementation: custom
          address: ldap://auth.oh.wsh.no:389
          start_tls: true
          timeout: 5 seconds
          permit_referrals: false
          permit_unauthenticated_bind: false
          permit_feature_detection_failure: false
          base_dn: dc=oh,dc=wsh,dc=no
          additional_users_dn: ou=People
          # Authelia 4.39+: users_filter must include {username_attribute} (see attributes.username → uid).
          users_filter: (&(objectClass=inetOrgPerson)({username_attribute}={input}))
          # 4.39+ requires groups_filter. Covers: posixGroup+memberUid, groupOfNames+member,
          # groupOfUniqueNames+uniqueMember (slapd uniqueMember holds full user DN, as in ou=Groups k8s-admins).
          groups_filter: (|(&(objectClass=posixGroup)(memberUid={username}))(&(objectClass=groupOfNames)(member={dn}))(&(objectClass=groupOfUniqueNames)(uniqueMember={dn})))
          user: uid=authelia,ou=services,dc=oh,dc=wsh,dc=no
          password:
            secret_name: authelia-ldap-bind
            disabled: false
          # LDAP TLS option 1: rely on the container image CA bundle (no chart `certificates` / extra PEM mounts).
          # If slapd uses a private CA and Authelia logs x509 unknown authority, add Helm `certificates.existingSecret`.
          tls:
            server_name: auth.oh.wsh.no
            skip_verify: false
            minimum_version: TLS1.2
            maximum_version: TLS1.3
          attributes:
            distinguished_name: dn
            username: uid
            display_name: displayName
            mail: mail
            member_of: ""
            group_name: cn
        file:
          enabled: false
      storage:
        local:
          enabled: true
          path: /config/db.sqlite3
      notifier:
        # Internal relay may reject Authelia's default startup probe recipient (test@authelia.com).
        disable_startup_check: true
        filesystem:
          enabled: false
        smtp:
          enabled: true
          # Postfix: 587 submission (STARTTLS), 465 implicit TLS (submissions://…:465), 25 relay (smtp://…:25).
          address: submission://postfix.oh.wsh.no:587
          sender: "Authelia <noreply@wsh.no>"
          identifier: authelia.auth.wsh.no
          subject: "[Authelia] {title}"
          timeout: 10 seconds
          disable_require_tls: false
          tls:
            server_name: postfix.oh.wsh.no
            skip_verify: false
          username: ""
          password:
            disabled: true
      identity_providers:
        oidc:
          enabled: true
          cors:
            endpoints:
            - authorization
            - token
            - userinfo
            allowed_origins:
            - https://rabbitmq.mgmt.wsh.no
            - https://headlamp.mgmt.wsh.no
            - https://adminer-pg-test.mgmt.wsh.no
            - https://adminer-pg-prod.mgmt.wsh.no
            - https://test.test.wsh.no
            # Local OIDC (browser Origin must match exactly; add more ports/hosts as needed).
            - http://localhost:5173
            - http://127.0.0.1:5173
            - https://localhost:5173
            - https://127.0.0.1:5173
            - http://localhost:3000
            - http://127.0.0.1:3000
            - http://localhost:4200
            - http://127.0.0.1:4200
            - http://localhost:15672
            - http://127.0.0.1:15672
            # RabbitMQ management HTTPS listener (default TLS port); Origin uses https when UI is opened on 15671.
            - https://localhost:15671
            - https://127.0.0.1:15671
            # ASP.NET Swashbuckle local dev (OAuth2 + PKCE from /swagger).
            - https://localhost:7156
            - https://127.0.0.1:7156
          authorization_policies:
            rabbitmq-management-admins:
              default_policy: deny
              rules:
              - policy: one_factor
                subject: "group:k8s-admins"
          jwks:
          - key_id: authelia-headlamp
            algorithm: RS256
            use: sig
            key:
              path: /secrets/authelia-oidc-jwks/oidc-jwk-rsa.pem
          # kube-apiserver reads group membership from the ID token JWT (--oidc-groups-claim), not UserInfo.
          claims_policies:
            headlamp-kube-apiserver:
              id_token:
              - groups
              - preferred_username
              - name
              - email
              - email_verified
            rabbitmq-management:
              id_token:
              - groups
              - preferred_username
              - name
              - email
              access_token:
              # Broker reads only the access token for the management UI username (not the id_token).
              # `sub` is a standard OIDC claim and must not appear in claims_policy (Authelia 4.39+); it is
              # still emitted on the access token. RabbitMQ auth_oauth2.preferred_username_claims lists sub first.
              - groups
              - preferred_username
              - name
              - email
          clients:
          - client_id: headlamp
            client_name: Headlamp
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            claims_policy: headlamp-kube-apiserver
            authorization_policy: two_factor
            consent_mode: pre-configured
            pre_configured_consent_duration: 1 year
            redirect_uris:
            - https://headlamp.mgmt.wsh.no/oidc-callback
            scopes:
            - openid
            - profile
            - email
            - groups
          # RabbitMQ management UI — OIDC auth code + PKCE. redirect_uri is the current browser origin +
          # /js/oidc-oauth/login-callback.html (or /). Local dev: plain HTTP on 15672 or HTTPS on 15671 if TLS
          # is enabled; port-forward may use 127.0.0.1 vs localhost — register both if needed.
          - client_id: rabbitmq-management
            client_name: RabbitMQ management
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            claims_policy: rabbitmq-management
            authorization_policy: rabbitmq-management-admins
            # Management UI sends audience = auth_oauth2.resource_server_id (RFC 8707).
            audience:
            - rabbitmq
            # implicit: RabbitMQ management JS uses prompt=none for silent session checks; pre-configured consent
            # requires a consent UI and breaks that flow (Authelia error: prompt type 'none' ... require consent).
            consent_mode: implicit
            access_token_signed_response_alg: RS256
            access_token_signed_response_key_id: authelia-headlamp
            redirect_uris:
            - https://rabbitmq.mgmt.wsh.no/js/oidc-oauth/login-callback.html
            - https://rabbitmq.mgmt.wsh.no/
            - http://localhost:15672/js/oidc-oauth/login-callback.html
            - http://127.0.0.1:15672/js/oidc-oauth/login-callback.html
            - http://localhost:15672/
            - http://127.0.0.1:15672/
            - https://localhost:15671/js/oidc-oauth/login-callback.html
            - https://127.0.0.1:15671/js/oidc-oauth/login-callback.html
            - https://localhost:15671/
            - https://127.0.0.1:15671/
            scopes:
            - openid
            - profile
            - email
            - groups
          # Adminer (Postgres) — oauth2-proxy in postgres-test / postgres-production; public client + PKCE.
          - client_id: adminer-pg-test
            client_name: Adminer Postgres test tier
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            authorization_policy: two_factor
            consent_mode: pre-configured
            pre_configured_consent_duration: 1 year
            redirect_uris:
            - https://adminer-pg-test.mgmt.wsh.no/oauth2/callback
            scopes:
            - openid
            - profile
            - email
            - groups
          - client_id: adminer-pg-prod
            client_name: Adminer Postgres production
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            authorization_policy: two_factor
            consent_mode: pre-configured
            pre_configured_consent_duration: 1 year
            redirect_uris:
            - https://adminer-pg-prod.mgmt.wsh.no/oauth2/callback
            scopes:
            - openid
            - profile
            - email
            - groups
          # Test tier sample app (test.test.wsh.no) — SPA + API + local Swashbuckle; public client + PKCE, refresh via offline_access.
          # Swashbuckle OAuth redirect: {origin}/swagger/oauth2-redirect.html (add other ports if launchSettings differ).
          - client_id: pxce
            client_name: Test app (test.test.wsh.no)
            public: true
            require_pkce: true
            pkce_challenge_method: S256
            claims_policy: headlamp-kube-apiserver
            authorization_policy: two_factor
            consent_mode: pre-configured
            pre_configured_consent_duration: 1 year
            grant_types:
            - authorization_code
            - refresh_token
            response_types:
            - code
            redirect_uris:
            - https://test.test.wsh.no/auth/callback
            - http://localhost:5173/auth/callback
            - http://127.0.0.1:5173/auth/callback
            - https://localhost:5173/auth/callback
            - https://127.0.0.1:5173/auth/callback
            - http://localhost:3000/auth/callback
            - http://127.0.0.1:3000/auth/callback
            - https://localhost:7156/swagger/oauth2-redirect.html
            - https://127.0.0.1:7156/swagger/oauth2-redirect.html
            scopes:
            - openid
            - profile
            - email
            - groups
            - offline_access
          # Dex example-app (ghcr.io/dexidp/example-app): local OIDC debugger only. Redirect is loopback.
          # Secret must match Dex's default flag value exactly (opaque string ZXhhbXBsZS1hcHAtc2VjcmV0, not decoded).
          # Do not reuse this client_id/secret for anything reachable from untrusted hosts.
          - client_id: example-app
            client_name: Dex example-app (local OIDC debug)
            client_secret:
              value: "$plaintext$ZXhhbXBsZS1hcHAtc2VjcmV0"
            authorization_policy: one_factor
            consent_mode: pre-configured
            pre_configured_consent_duration: 1 year
            redirect_uris:
            - https://oidc-debug.mgmt.wsh.no/callback
            scopes:
            - openid
            - profile
            - email
            - groups
            # Confidential client; PKCE optional. Authelia can emit invalid_request (missing
            # code_challenge) after consent if PKCE session is not preserved across login hops.
            require_pkce: false
