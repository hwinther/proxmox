# Kyverno's validate-policy admission webhook checks SAR on the generate target namespace.
# Background controller applies clone/sync (see postgres-production
# clone-authelia-pg-secret-to-authelia-production). Rules cover all secrets in this namespace
# despite the secret-specific role name — same as e.g. clutterstock-test's RBAC.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: kyverno-generate-secret-authelia-pg-secret
  namespace: authelia-production
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: kyverno-generate-secret-authelia-pg-secret
  namespace: authelia-production
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: kyverno-generate-secret-authelia-pg-secret
subjects:
- kind: ServiceAccount
  name: kyverno-admission-controller
  namespace: kyverno
- kind: ServiceAccount
  name: kyverno-background-controller
  namespace: kyverno
