# Restore Authelia's postgres database from a PBS snapshot into the CNPG cluster.
# Same amd64-only PBS client image and tag as the backup Job.
#
# Not in kustomization.yaml: apply manually when needed.
#
# Flow:
#   1. initContainer pbs-restore pulls db.pxar from PBS_RESTORE_SNAPSHOT into an emptyDir.
#   2. Main container runs pg_restore against the CNPG cluster (libpq env vars).
#
# Prerequisites:
#   1. Secret `authelia-pbs-backup`: PBS_REPOSITORY, PBS_PASSWORD, PBS_RESTORE_SNAPSHOT
#      (and PBS_NAMESPACE / PBS_ENCRYPTION_PASSWORD if used).
#   2. CNPG cluster `postgres-prod` Ready, `authelia-pg-secret` cloned to authelia-production.
#   3. Stop Authelia before restoring (active sessions/consent writes would conflict with --clean):
#        kubectl -n authelia-production scale deployment authelia --replicas=0
#      The `storage.encryption.key` in `authelia-storage` Secret MUST match the key used at the time
#      of the backup — restoring a backup with a different encryption key leaves rows unreadable.
#
# WARNING: `pg_restore --clean --if-exists` drops and recreates objects owned by the `authelia` user.
apiVersion: batch/v1
kind: Job
metadata:
  name: authelia-pbs-restore-v001
  namespace: authelia-production
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: authelia-pbs-restore
        app.kubernetes.io/component: authelia-pbs-backup
    spec:
      nodeSelector:
        kubernetes.io/arch: amd64
      hostname: authelia-postgres
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1654
        fsGroup: 1654
        fsGroupChangePolicy: OnRootMismatch
      initContainers:
      - name: pbs-restore
        image: ghcr.io/hwinther/proxmox/proxmox/pbs/backup-client:0.6.1
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          : "${PBS_RESTORE_SNAPSHOT:?set PBS_RESTORE_SNAPSHOT in Secret authelia-pbs-backup}"
          set -- restore
          [ -n "${PBS_NAMESPACE:-}" ] && set -- "$@" --ns "$PBS_NAMESPACE"
          [ -f /etc/pbs/keyfile ] && set -- "$@" --keyfile /etc/pbs/keyfile
          set -- "$@" "$PBS_RESTORE_SNAPSHOT" db.pxar /dump/
          exec /usr/bin/proxmox-backup-client "$@"
        envFrom:
        - secretRef:
            name: authelia-pbs-backup
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: dump
          mountPath: /dump
        - name: pbs-keyfile
          mountPath: /etc/pbs
          readOnly: true
      containers:
      - name: pgrestore
        image: postgres:18-alpine
        imagePullPolicy: IfNotPresent
        command:
        - /bin/sh
        - -c
        - 'pg_restore --clean --if-exists --no-owner --no-acl -d "$PGDATABASE" /dump/authelia.pgdump'
        env:
        - name: PGHOST
          value: postgres-prod-rw.postgres-production.svc.cluster.local
        - name: PGUSER
          value: authelia
        - name: PGDATABASE
          value: authelia
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: authelia-pg-secret
              key: password
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: "1"
            memory: 512Mi
        volumeMounts:
        - name: dump
          mountPath: /dump
      volumes:
      - name: dump
        emptyDir: {}
      - name: pbs-keyfile
        secret:
          secretName: pbs-encryption-keyfile
          optional: true
          items:
          - key: keyfile
            path: keyfile
            mode: 0400
