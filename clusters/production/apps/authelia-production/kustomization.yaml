apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# namespace: is required by the netpol-baseline component (its policies carry no namespace).
# authelia pod egress is fully covered by allow-authelia-egress-to-ldap.yaml (CNP, unioned with
# the NP floor); ingress by the authelia NP + cilium-cluster-nodes-to-authelia-http.
namespace: authelia-production
components:
- ../../../../bases/netpol-baseline
resources:
- namespace-authelia-production.yaml
- helmrepository.yaml
- authelia-helmrelease.yaml
- networkpolicies.yaml
- cilium-cluster-nodes-to-authelia-http.yaml
- cilium-authelia-egress-ldap.yaml
- traefik-middleware-authelia-forwardauth.yaml
- kyverno-rbac-generate-authelia-pg-secret.yaml
- authelia-pbs-backup-job.yaml
# Restore is authelia-pbs-restore-job.yaml — apply manually so Flux does not keep a failed/duplicate restore Job.
