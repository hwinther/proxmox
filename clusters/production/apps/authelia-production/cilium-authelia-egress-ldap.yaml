# Egress for Authelia: cluster DNS, internal NTP (Authelia startup clock check), LDAP.
# LDAP CIDR must match the A/AAAA for auth.oh.wsh.no; NTP is Authelia `configMap.ntp.address` (lan gateway / ntpd).
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-authelia-egress-to-ldap
  namespace: authelia-production
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: authelia
  egress:
  - toEndpoints:
    - matchLabels:
        k8s:io.kubernetes.pod.namespace: kube-system
        k8s:k8s-app: kube-dns
    toPorts:
    - ports:
      - port: "53"
        protocol: UDP
      - port: "53"
        protocol: TCP
  - toCIDR:
    - 10.20.13.1/32
    toPorts:
    - ports:
      - port: "123"
        protocol: UDP
  - toCIDR:
    - 10.20.1.11/32
    toPorts:
    - ports:
      - port: "389"
        protocol: TCP
      - port: "636"
        protocol: TCP
