apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: pbs-browser
  namespace: pbs-browser-production
spec:
  podSelector:
    matchLabels:
      app: pbs-browser
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Traefik (host-network) is the only allowed source. Because Traefik runs host-network, the
  # effective allow under Cilium comes from cilium-cluster-nodes-to-http.yaml (host/remote-node);
  # this k8s rule is kept for parity/portability.
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: traefik
    ports:
    - port: 8080
      protocol: TCP
  egress:
  # DNS (also covered by the netpol-baseline component; duplicated here to be self-contained).
  - to:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
      podSelector:
        matchLabels:
          k8s-app: kube-dns
    ports:
    - port: 53
      protocol: UDP
    - port: 53
      protocol: TCP
  # PBS API (8007) + HTTPS (443) to the PBS host(s). PBS endpoints live in the Secret, not in git,
  # so this allows the external CIDR on those ports only (mirrors the *-pbs-backup egress pattern).
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0
        except:
        - 169.254.169.254/32
    ports:
    - port: 8007
      protocol: TCP
    - port: 443
      protocol: TCP
