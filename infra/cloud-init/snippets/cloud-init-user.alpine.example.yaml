#cloud-config
# Copy to cloud-init-user.yaml for **Alpine** k0s templates (create-k0s-alpine-template.sh).
#
# Alpine’s default login shell is **ash** (/bin/bash is optional and installed later by the
# vendor `packages:` list). Cloud-init typically runs **users_groups** before **packages**, so
# if `shell: /bin/bash` you can log in on the serial console before bash exists and see:
#   login: can't execute '/bin/bash': No such file or directory
# Use /bin/ash here; vendor still installs `bash` for scripts and `#!/bin/bash` if needed.
chpasswd:
  expire: false
users:
- default
- name: user
  gecos: k0s node admin
  groups: adm, users, wheel
  lock_passwd: true
  sudo: ALL=(ALL) NOPASSWD:ALL
  shell: /bin/ash
  ssh_authorized_keys:
  - ssh-ed25519 AAAA...your-key-here
