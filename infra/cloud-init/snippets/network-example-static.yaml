# Cloud-init network config v1 (no #cloud-config header).
# Edit this file (or a copy under snippets/), then run create-k0s-debian-template.sh with
#   NETWORK_SOURCE=/path/to/this/file
# The script symlinks it into /var/lib/vz/snippets/ like user/vendor snippets.
#
# Interface name: Debian cloud images on Proxmox often show ens18, not eth0 — use
#   `ip link` from a one-off DHCP boot or `qm config <vmid>` to confirm.
# MAC: optional but helps when multiple NICs exist; take from Proxmox VM hardware.
#
# Reference dump shape: scripts/cloud-init/proxmox-9.0-default-cloud-init-values.txt

version: 1
config:
- type: physical
  name: eth0
  mac_address: "bc:24:11:00:00:01"
  subnets:
  - type: static
    address: 10.10.20.101/24
    gateway: 10.10.20.1
    # If you use a dedicated NIC for ceph-public, prefer the dual-NIC example instead:
    #   network-example-static-dual-nic.yaml
    # IPv6: either keep SLAAC, add static6, or omit entirely.
    # - type: ipv6_slaac
    # - type: static6
    #   address: 2001:db8::101/64
    #   gateway: 2001:db8::1

- type: nameserver
  address:
  - "10.10.10.1"
  - "10.10.10.2"
  search:
  - "wsh.no"
