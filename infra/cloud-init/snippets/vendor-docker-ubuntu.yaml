#cloud-config
# Docker CE on Ubuntu cloud images (noble / 24.04 minimal works).
# Do NOT use this vendor file on Debian — use vendor-docker-debian.yaml.
hostname: ubuntu-docker
manage_etc_hosts: true
package_upgrade: true
package_reboot_if_required: true
locale: en_US.UTF-8
timezone: Europe/Oslo

apt:
  sources:
    docker.list:
      source: deb [arch=amd64] https://download.docker.com/linux/ubuntu $RELEASE stable
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

packages:
- ssh
- qemu-guest-agent
- docker-ce
- docker-ce-cli
- containerd.io
- git
- fail2ban
- ufw
- apt-transport-https
- ca-certificates
- curl
- gnupg-agent
- software-properties-common
- openssh-server

write_files:
- path: /etc/sysctl.d/99-ipv4-forward.conf
  content: |
    net.ipv4.ip_forward = 1

runcmd:
- ufw default deny incoming
- ufw default allow outgoing
- ufw allow 22/tcp
- ufw --force enable
- systemctl enable --now qemu-guest-agent
- systemctl enable --now ssh
# Pin if you hit a bad Docker release; adjust versions for your Ubuntu codename.
# - apt-get install -y --allow-downgrades docker-ce=... docker-ce-cli=... containerd.io docker-buildx-plugin docker-compose-plugin
# - apt-mark hold docker-ce docker-ce-cli

groups:
- docker

system_info:
  default_user:
    groups: [ docker ]
