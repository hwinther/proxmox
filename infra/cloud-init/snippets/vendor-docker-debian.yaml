#cloud-config
# Docker CE on Debian (trixie) generic cloud image.
# Use with: debian-13-genericcloud-amd64 (or similar), NOT ubuntu repos.
hostname: debian-docker
manage_etc_hosts: true
package_upgrade: true
package_reboot_if_required: true
locale: en_US.UTF-8
timezone: Europe/Oslo

apt:
  sources:
    docker.list:
      source: deb [arch=amd64] https://download.docker.com/linux/debian trixie stable
      keyid: 9DC858229FC7DD38854AE2D88D81803C0EBFCD88

packages:
  - ssh
  - qemu-guest-agent
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin
  - git
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - openssh-server

write_files:
  - path: /etc/sysctl.d/99-ipv4-forward.conf
    content: |
      net.ipv4.ip_forward = 1

runcmd:
  - systemctl enable --now qemu-guest-agent
  - systemctl enable --now ssh

groups:
  - docker

system_info:
  default_user:
    groups: [docker]
