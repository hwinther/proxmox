#cloud-config
# Copy to cloud-init-user.yaml (see snippets/.gitignore) and replace SSH keys / users.
#
# **Shell:** use `/bin/bash` on Debian generic cloud (bash is preinstalled). On **Alpine**,
# `/bin/bash` is not in the minroot and cloud-init usually creates users **before** the
# `packages` phase installs `bash`, so the first console login can fail with
# `can't execute '/bin/bash'`. For Alpine k0s nodes, start from
# `cloud-init-user.alpine.example.yaml` or set `shell: /bin/ash` here.
chpasswd:
  expire: false
users:
- default
- name: user
  gecos: k0s node admin
  groups: adm, users, sudo
  lock_passwd: true
  sudo: ALL=(ALL) NOPASSWD:ALL
  shell: /bin/bash
  ssh_authorized_keys:
  - ssh-ed25519 AAAA...your-key-here
