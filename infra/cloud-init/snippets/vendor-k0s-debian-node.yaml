#cloud-config
# Debian 13 (trixie) k0s **node** baseline: OS prep + k0s binary only.
#
# Does NOT:
#   - join the cluster (use a per-clone vendor snippet, cloud-init merge, or SSH after boot)
#   - install Cilium (Helm/Flux after API is up — see infra/k0s/cilium-k0s-setup.md)
#   - install Ceph CSI (in-cluster Helm/Flux; ensure ceph-public routing from this VLAN)
#
# After first boot, on controller: sudo k0s install controller --config /etc/k0s/k0s.yaml && sudo k0s start
# On worker: sudo k0s install worker --token-file /root/k0s-token (or token from controller)

hostname: k0s-node
manage_etc_hosts: true
package_upgrade: true
package_reboot_if_required: true
locale: en_US.UTF-8
timezone: Europe/Oslo

packages:
  - openssh-server
  - qemu-guest-agent
  - curl
  - ca-certificates
  - iptables
  - conntrack
  - socat
  - nfs-common
  # Optional: useful for debugging Ceph client paths (CSI still runs in containers)
  # - ceph-common

write_files:
  # Sysctls: Cilium stable docs focus on kernel BPF config + firewall ports (VXLAN/Geneve, health),
  # not a long sysctl list — see https://docs.cilium.io/en/stable/operations/system_requirements/
  # rp_filter=0 avoids strict reverse-path filtering that breaks many CNIs; Cilium Helm can still apply
  # per-interface fixes (e.g. systemd overriding rp_filter on some distros).
  - path: /etc/sysctl.d/99-k8s-network.conf
    content: |
      net.ipv4.ip_forward = 1
      net.ipv4.conf.all.rp_filter = 0
      net.ipv4.conf.default.rp_filter = 0
      # If you use IPv6 in Cilium (enable-ipv6), forwarding must be on.
      net.ipv6.conf.all.forwarding = 1
      net.ipv6.conf.default.forwarding = 1
      # Kubernetes nodes with many watches (Flux, operators): avoids inotify exhaustion.
      fs.inotify.max_user_instances = 8192
      fs.inotify.max_user_watches = 524288

runcmd:
  # Optional persistent bpffs — Cilium can mount this itself, but docs recommend fstab for persistence
  # across agent restarts: https://docs.cilium.io/en/stable/operations/system_requirements/#mounted-ebpf-filesystem
  - test -f /etc/fstab && grep -q '[[:space:]]/sys/fs/bpf[[:space:]]' /etc/fstab || echo 'bpffs /sys/fs/bpf bpf defaults 0 0' >> /etc/fstab
  - mkdir -p /sys/fs/bpf
  - mountpoint -q /sys/fs/bpf || mount -t bpf bpf /sys/fs/bpf
  - sysctl --system
  - systemctl enable --now qemu-guest-agent
  - systemctl enable --now ssh
  # Install k0s (pin version in production by downloading a specific k0s binary instead)
  - curl -sSLf https://get.k0s.sh | sh
  # Load RBD for Ceph CSI node plugin (module may already load on first attach)
  - modprobe rbd || true
  - echo rbd >> /etc/modules-load.d/k8s-storage.conf
