# Based on kyverno/policies disallow-latest-tag. Tag-only refs are allowed (semver pins for Dependabot);
# supply-chain verifyImages rules may still mutate tags to digests at admission where configured.
# Audit only.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: wsh-disallow-latest-require-digest
  annotations:
    policies.kyverno.io/title: Disallow latest container image tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/description: >-
      Containers must not use the :latest tag. Pin a specific version tag (e.g. v1.2.3 or 1.2.3-alpine).
spec:
  validationFailureAction: Audit
  background: true
  rules:
  - name: disallow-latest-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          - flux-system
          - traefik
    validate:
      message: >-
        Using a mutable image tag such as 'latest' is not allowed. Pin a specific version tag.
      foreach:
      - list: "request.object.spec.containers"
        pattern:
          image: "!*:latest"
      - list: "request.object.spec.initContainers"
        pattern:
          image: "!*:latest"
      - list: "request.object.spec.ephemeralContainers"
        pattern:
          image: "!*:latest"
