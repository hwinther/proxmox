# Cosign vulnerability scan attestation (Grype → SARIF predicate, cosign attest --type vuln).
# Large Grype JSON predicates exceed Kyverno’s default maxContextSize (2Mi) when loaded into the policy engine.
# Identity: reusable-workflows docker/dotnet-container @ refs/tags/v1, except ghcr.io/hwinther/proxmox/sdr/*
# (hwinther/proxmox build-*.yaml — same as clusterpolicy-cyclonedx-sbom).
# Remove this resource from bases/kyverno-supply-chain/kustomization.yaml if you do not publish vuln attestations.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: wsh-require-cosign-vuln-attestation
  annotations:
    policies.kyverno.io/title: Require Cosign vuln attestation (ghcr.io/hwinther)
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: false
  # Kubernetes caps webhook timeout at 30s.
  webhookTimeoutSeconds: 30
  rules:
  - name: cosign-vuln-attestation
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          - flux-system
    verifyImages:
    - imageReferences:
      - ghcr.io/hwinther/proxmox/sdr/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      useCache: true
      attestations:
      - predicateType: https://cosign.sigstore.dev/attestation/vuln/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/proxmox/\.github/workflows/build-[a-z0-9-]+\.ya?ml@refs/(heads/main|tags/.+)$
              rekor:
                url: https://rekor.sigstore.dev
    - imageReferences:
      - ghcr.io/hwinther/*
      skipImageReferences:
      - ghcr.io/hwinther/proxmox/sdr/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      useCache: true
      attestations:
      - predicateType: https://cosign.sigstore.dev/attestation/vuln/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker|dotnet)-container\.yml@refs/tags/v1$
              rekor:
                url: https://rekor.sigstore.dev
