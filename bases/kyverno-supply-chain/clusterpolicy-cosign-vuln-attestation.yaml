# Cosign vulnerability scan attestation (Grype → SARIF predicate, cosign attest --type vuln).
#
# AUDIT-ONLY: the reusable hwinther/reusable-workflows docker-container.yml pipeline currently
# publishes ONLY the SLSA provenance sigstore bundle (actions/attest-build-provenance). It does
# NOT push a standalone `cosign attest --type vuln` predicate to the registry — Grype output goes
# to workflow artifacts + GitHub Security, not an image attestation. So no image satisfies this
# policy today. Kept as Audit so PolicyReports still surface the gap as a visible signal; flip
# failureAction back to Enforce (and restore mutateDigest/verifyDigest) once the pipeline emits it.
# Real supply-chain gating lives in clusterpolicy-github-slsa-provenance.yaml (still Enforce).
#
# Identity (SAN): the reusable-workflows docker/dotnet-container workflow, pinned either by floating tag
# (@refs/tags/vN[.N[.N]]) or by 40-hex commit SHA. The caller repo is NOT carried in this predicate type;
# scope is enforced via `imageReferences` (which registry paths are evaluated).
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: wsh-require-cosign-vuln-attestation
  annotations:
    policies.kyverno.io/title: Require Cosign vuln attestation (ghcr.io/hwinther, ghcr.io/wshno)
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: medium
spec:
  validationFailureAction: Audit
  background: false
  # Kubernetes caps webhook timeout at 30s.
  webhookTimeoutSeconds: 30
  rules:
  - name: cosign-vuln-attestation
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          - flux-system
    verifyImages:
    # Scoped to the docker-container.yml-built images that actually carry a cosign vuln
    # attestation. .NET images (hwinther/clutterstock*, built via dotnet-container.yml)
    # publish only SLSA provenance — they are covered by clusterpolicy-github-slsa-provenance
    # and intentionally NOT matched here (would otherwise hard-fail with "missing digest").
    - imageReferences:
      - ghcr.io/hwinther/wsh-rtl-sdr/*
      - ghcr.io/wshno/*
      # Audit mode: mutateDigest requires Enforce, so it (and verifyDigest) are off here.
      # When the pipeline starts emitting this attestation, flip to Enforce + re-enable both.
      failureAction: Audit
      mutateDigest: false
      verifyDigest: false
      useCache: true
      attestations:
      - predicateType: https://cosign.sigstore.dev/attestation/vuln/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker|dotnet)-container\.yml@(refs/tags/v[0-9]+(\.[0-9]+){0,2}|[a-f0-9]{40})$
              rekor:
                url: https://rekor.sigstore.dev
