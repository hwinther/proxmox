# GitHub actions/attest-build-provenance publishes Sigstore bundles (SLSA v1).
# Keyless identity is the reusable workflow ref (github.workflow_ref), e.g.
# …/docker-container.yml@refs/tags/v1 (Node/web images) or …/dotnet-container.yml@refs/tags/v1 (.NET API).
# Consumers must use uses: …@v1. Branch test runs use @refs/heads/… and will not match.
# Scoped to ghcr.io/hwinther/* — other registries/images are not evaluated (no exception needed).
#
# Legacy org images without attestations: add skipImageReferences on each verifyImages entry, or create
# ClusterPolicyException (kyverno.io/v2) with spec.verifyImages.imageReferences for those patterns.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: wsh-require-github-slsa-provenance
  annotations:
    policies.kyverno.io/title: Require GitHub SLSA provenance (ghcr.io/hwinther)
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: false
  # Kubernetes caps webhook timeout at 30s.
  webhookTimeoutSeconds: 30
  rules:
  - name: slsa-provenance-github-oidc
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          - flux-system
    verifyImages:
    - imageReferences:
      - ghcr.io/hwinther/*
      # Optional central allowlist (same patterns on all three policies if you use it):
      # skipImageReferences:
      #   - ghcr.io/hwinther/legacy-service/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      type: SigstoreBundle
      attestations:
      - predicateType: https://slsa.dev/provenance/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker|dotnet)-container\.yml@refs/tags/v1$
              rekor:
                url: https://rekor.sigstore.dev
        conditions:
        - all:
          - key: "{{ buildDefinition.buildType }}"
            operator: Equals
            value: https://actions.github.io/buildtypes/workflow/v1
