# GitHub actions/attest-build-provenance publishes Sigstore bundles (SLSA v1).
# Keyless identity (SAN) is the reusable workflow ref (github.job_workflow_ref), not the caller repo —
# even when the build is initiated by a workflow in a different repo (e.g. hwinther/wsh-rtl-sdr), the
# SAN reflects the reusable that ran (hwinther/reusable-workflows/.github/workflows/docker-container.yml).
# The caller's repository is recorded inside the SLSA predicate at externalParameters.workflow.repository,
# which we assert separately for the wsh-rtl-sdr scoped block below.
#
# Workflows pinned by SHA produce SAN endings of `@<40-hex-sha>`; semver-tagged refs produce
# `@refs/tags/vX.Y.Z`. The regex accepts both; branch refs are rejected.
#
# Accepted reusable workflows (SAN):
#   - docker-container.yml / dotnet-container.yml — build + push + sign in one go (release path)
#   - image-push.yml                                — push + sign artifacts built earlier
#                                                     (PR path: build-and-scan-*.yml builds locally,
#                                                     image-push.yml then pushes if the PR is labelled
#                                                     `deploy-feature`). image-push.yml's
#                                                     attest_build_provenance_enabled defaults to true,
#                                                     so the SLSA predicate is produced under this SAN.
#
# Scoped to ghcr.io/hwinther/* — other registries/images are not evaluated (no exception needed).
# Legacy images without attestations: add skipImageReferences on each verifyImages entry, or create
# ClusterPolicyException (kyverno.io/v2) with spec.verifyImages.imageReferences for those patterns.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: wsh-require-github-slsa-provenance
  annotations:
    policies.kyverno.io/title: Require GitHub SLSA provenance (ghcr.io/hwinther)
    policies.kyverno.io/category: Supply Chain
    policies.kyverno.io/severity: high
spec:
  validationFailureAction: Audit
  background: false
  # Kubernetes caps webhook timeout at 30s.
  webhookTimeoutSeconds: 30
  rules:
  - name: slsa-provenance-github-oidc
    match:
      any:
      - resources:
          kinds:
          - Pod
    exclude:
      any:
      - resources:
          namespaces:
          - kube-system
          - kyverno
          - flux-system
    verifyImages:
    # Edge SDR images (feeders + sdr-base/build + gsm-tools). Built via the reusable
    # docker-container workflow but the *caller* must be hwinther/wsh-rtl-sdr — proven
    # by externalParameters.workflow.repository in the SLSA predicate. Defense-in-depth:
    # even if someone else hijacks the reusable, only wsh-rtl-sdr-initiated builds verify.
    - imageReferences:
      - ghcr.io/hwinther/wsh-rtl-sdr/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      useCache: true
      type: SigstoreBundle
      attestations:
      - predicateType: https://slsa.dev/provenance/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker-container|dotnet-container|image-push)\.yml@(refs/tags/v[0-9]+(\.[0-9]+){0,2}|[a-f0-9]{40})$
              rekor:
                url: https://rekor.sigstore.dev
        conditions:
        - all:
          - key: "{{ buildDefinition.buildType }}"
            operator: Equals
            value: https://actions.github.io/buildtypes/workflow/v1
          - key: "{{ buildDefinition.externalParameters.workflow.repository }}"
            operator: Equals
            value: https://github.com/hwinther/wsh-rtl-sdr
    # wshno-org images (ghcr.io/wshno/*). Built by the same hwinther/reusable-workflows
    # docker-container.yml, but the *caller* must be a wshno/* GitHub repo — proven by
    # externalParameters.workflow.repository in the SLSA predicate. Defense-in-depth: even
    # if the reusable is hijacked, only wshno-initiated builds verify.
    - imageReferences:
      - ghcr.io/wshno/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      useCache: true
      type: SigstoreBundle
      attestations:
      - predicateType: https://slsa.dev/provenance/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker-container|dotnet-container|image-push)\.yml@(refs/tags/v[0-9]+(\.[0-9]+){0,2}|[a-f0-9]{40})$
              rekor:
                url: https://rekor.sigstore.dev
        conditions:
        - all:
          - key: "{{ buildDefinition.buildType }}"
            operator: Equals
            value: https://actions.github.io/buildtypes/workflow/v1
          - key: "{{ buildDefinition.externalParameters.workflow.repository }}"
            operator: Equals
            value: https://github.com/wshno/wshno
    # General fallback for any other ghcr.io/hwinther/* image (clutterstock, headlamp plugins
    # we publish ourselves, etc). Same reusable SAN, no caller-repo restriction.
    - imageReferences:
      - ghcr.io/hwinther/*
      skipImageReferences:
      - ghcr.io/hwinther/wsh-rtl-sdr/*
      failureAction: Enforce # Note: Enforce is required for mutateDigest: true
      mutateDigest: true
      verifyDigest: true
      useCache: true
      type: SigstoreBundle
      attestations:
      - predicateType: https://slsa.dev/provenance/v1
        attestors:
        - entries:
          - keyless:
              issuer: https://token.actions.githubusercontent.com
              subjectRegExp: ^https://github.com/hwinther/reusable-workflows/\.github/workflows/(docker-container|dotnet-container|image-push)\.yml@(refs/tags/v[0-9]+(\.[0-9]+){0,2}|[a-f0-9]{40})$
              rekor:
                url: https://rekor.sigstore.dev
        conditions:
        - all:
          - key: "{{ buildDefinition.buildType }}"
            operator: Equals
            value: https://actions.github.io/buildtypes/workflow/v1
