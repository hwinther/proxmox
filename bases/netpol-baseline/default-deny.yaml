# Default-deny floor for every pod in the namespace (Ingress + Egress).
# All traffic must be allowed by another policy in this component, an app-level
# NetworkPolicy, or a CiliumNetworkPolicy (allows are unioned across policies).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
