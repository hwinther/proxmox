# Metrics scraping: allow ingress from the observability namespace to any port.
# Namespace-level trust (matches the authelia-production precedent); per-port
# restriction isn't practical in a shared component since metrics ports differ per app.
# Production-cluster specific (edge-sdr has no observability-production namespace).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: observability-production
