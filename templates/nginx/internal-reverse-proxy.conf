# Place this map inside http { } before any server that uses $wsh_upstream (e.g. include from nginx.conf).
map $host $wsh_upstream {
    default                    10.20.13.11:8000;
    kt.wsh.no                  10.20.1.123:8000;
    mgmt-kt.wsh.no             10.20.1.123:8000;
    ~^[^.]+\.kt\.wsh\.no$      10.20.1.123:8000;
    ~^[^.]+\.mgmt-kt\.wsh\.no$ 10.20.1.123:8000;
}

server {
  server_name  *.kt.wsh.no *.mgmt-kt.wsh.no *.wsh.no *.test.wsh.no *.preview.wsh.no *.mgmt.wsh.no wsh.no;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kt.wsh.no/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kt.wsh.no/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

  location / {
    proxy_pass      http://$wsh_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host            $host;
    proxy_set_header X-Forwarded-For $remote_addr;
    add_header       X-Upstream      $upstream_addr;
  }
}

server {
    if ($host ~ ^[^.]+\.kt\.wsh\.no$) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  listen       80;
  listen [::]:80;
  server_name  *.kt.wsh.no *.mgmt-kt.wsh.no *.wsh.no *.test.wsh.no *.preview.wsh.no *.mgmt.wsh.no wsh.no;
    return 404; # managed by Certbot
}
