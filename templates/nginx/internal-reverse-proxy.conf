# =============================================================================
# Include everything below inside http { } before server blocks that use it.
#
# Routing model (see INTERNAL_REVERSE_PROXY.md in this directory):
# - wsh_general: production k0s Traefik — HelmRelease uses DaemonSet + hostNetwork
#   and web on port 8000, so Traefik listens on :8000 on every node. List every
#   cluster node LAN IP here; nginx load-balances and skips failed nodes.
# - wsh_kt: dedicated host(s) for kt/mgmt-kt hostnames (not pod-scheduled); add
#   more server lines only if you run multiple backends for that path.
# - wsh_edge_sdr: edge k0s cluster (mgmt-edge-sdr / *.edge-sdr hostnames).
# =============================================================================

upstream wsh_general {
    least_conn;
    server 10.20.13.11:8000 max_fails=3 fail_timeout=30s;
    # Add each k0s node IP that runs Traefik (same port 8000):
    # server 10.20.13.12:8000 max_fails=3 fail_timeout=30s;
    # server 10.20.13.13:8000 max_fails=3 fail_timeout=30s;
}

upstream wsh_kt {
    least_conn;
    server 10.20.1.123:8000 max_fails=3 fail_timeout=30s;
    # Optional second KT backend:
    # server 10.20.1.124:8000 max_fails=3 fail_timeout=30s backup;
}

upstream wsh_edge_sdr {
    least_conn;
    server 10.20.13.23:8000 max_fails=3 fail_timeout=30s;
}

map $host $wsh_upstream_pool {
    default                    wsh_general;
    kt.wsh.no                  wsh_kt;
    mgmt-kt.wsh.no             wsh_kt;
    ~^[^.]+\.kt\.wsh\.no$      wsh_kt;
    ~^[^.]+\.mgmt-kt\.wsh\.no$ wsh_kt;
    mgmt-edge-sdr.wsh.no       wsh_edge_sdr;
    ~^[^.]+\.mgmt-edge-sdr\.wsh\.no$ wsh_edge_sdr;
    ~^[^.]+\.edge-sdr\.wsh\.no$      wsh_edge_sdr;
}

server {
  server_name  *.kt.wsh.no *.mgmt-kt.wsh.no *.wsh.no *.test.wsh.no *.preview.wsh.no *.mgmt.wsh.no wsh.no mgmt-edge-sdr.wsh.no *.mgmt-edge-sdr.wsh.no *.edge-sdr.wsh.no;

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/kt.wsh.no/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/kt.wsh.no/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

  location / {
    proxy_pass      http://$wsh_upstream_pool;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host               $host;
    proxy_set_header X-Real-IP          $remote_addr;
    proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto  $scheme;
    proxy_set_header X-Forwarded-Host   $host;
    add_header       X-Upstream          $upstream_addr;
  }
}

server {
    if ($host ~ ^[^.]+\.kt\.wsh\.no$) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

  listen       80;
  listen [::]:80;
  server_name  *.kt.wsh.no *.mgmt-kt.wsh.no *.wsh.no *.test.wsh.no *.preview.wsh.no *.mgmt.wsh.no wsh.no mgmt-edge-sdr.wsh.no *.mgmt-edge-sdr.wsh.no *.edge-sdr.wsh.no;
    return 404; # managed by Certbot
}
