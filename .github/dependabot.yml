# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
- package-ecosystem: "github-actions"
  directories:
  - "/"
  - "/.github/actions/*"
  open-pull-requests-limit: 20
  target-branch: "main"
  schedule:
    interval: "weekly"
    day: "monday"
  cooldown:
    default-days: 7
  groups:
    reusable-workflows:
      patterns:
      - "hwinther/reusable-workflows/*"

- package-ecosystem: "npm"
  directory: "/"
  open-pull-requests-limit: 20
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

- package-ecosystem: "pip"
  directory: "/"
  open-pull-requests-limit: 20
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

# esp-poller container image — pins its own runtime deps in requirements.txt
# (kept separate from the root pyproject so the image rebuild surface is small).
- package-ecosystem: "pip"
  directory: "/images/esp-poller"
  open-pull-requests-limit: 20
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

# edge-sdr cluster (k0s / SDR edge).
- package-ecosystem: "docker"
  directories:
  - "/clusters/edge-sdr"
  - "/clusters/edge-sdr/apps"
  - "/clusters/edge-sdr/apps/adsb-edge-sdr"
  - "/clusters/edge-sdr/apps/ais-catcher-edge-sdr"
  - "/clusters/edge-sdr/apps/fluent-bit-edge-sdr"
  - "/clusters/edge-sdr/apps/node-exporter-edge-sdr"
  - "/clusters/edge-sdr/apps/prometheus-agent-edge-sdr"
  - "/clusters/edge-sdr/apps/traefik"
  - "/clusters/edge-sdr/apps/ceph-csi"
  - "/clusters/edge-sdr/apps/homepage"
  - "/clusters/edge-sdr/apps/headlamp-edge-sdr"
  - "/clusters/edge-sdr/apps/podinfo-edge-sdr"
  - "/clusters/edge-sdr/apps/kyverno"
  - "/clusters/edge-sdr/apps/kyverno-policies"
  - "/clusters/edge-sdr/apps/kubescape-edge-sdr"
  - "/clusters/edge-sdr/apps/policy-reporter-edge-sdr"
  - "/clusters/edge-sdr/apps/oidc-k8s-admins-rbac"
  - "/clusters/edge-sdr/flux-system"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "hwinther/clutterstock/*"
    test:
      patterns:
      - "hwinther/test/*"
    fluxcd:
      patterns:
      - "fluxcd/*"
  open-pull-requests-limit: 20

# Production cluster — prod workloads only (excludes in-cluster test apps).
- package-ecosystem: "docker"
  directories:
  - "/clusters/production"
  - "/clusters/production/apps"
  - "/clusters/production/apps/authelia-production"
  - "/clusters/production/apps/ceph-csi"
  - "/clusters/production/apps/cert-manager"
  - "/clusters/production/apps/cert-manager/install"
  - "/clusters/production/apps/cilium-lb"
  - "/clusters/production/apps/cnpg-system"
  - "/clusters/production/apps/clutterstock"
  - "/clusters/production/apps/clutterstock-migrate"
  - "/clusters/production/apps/headlamp-production"
  - "/clusters/production/apps/kubescape-production"
  - "/clusters/production/apps/kyverno"
  - "/clusters/production/apps/kyverno-policies"
  - "/clusters/production/apps/homepage"
  - "/clusters/production/apps/observability"
  - "/clusters/production/apps/oidc-k8s-admins-rbac"
  - "/clusters/production/apps/platform-production"
  - "/clusters/production/apps/policy-reporter-production"
  - "/clusters/production/apps/postgres-cnpg"
  - "/clusters/production/apps/postgres-production"
  - "/clusters/production/apps/postgres-test"
  - "/clusters/production/apps/private-apps"
  - "/clusters/production/apps/rabbitmq-production"
  - "/clusters/production/apps/traefik"
  - "/clusters/production/apps/wshno"
  - "/clusters/production/apps/home-assistant-production"
  - "/clusters/production/apps/node-red-production"
  - "/clusters/production/apps/mosquitto-production"
  - "/clusters/production/apps/esp-poller-production"
  - "/clusters/production/apps/previews/clutterstock"
  - "/clusters/production/apps/previews/clutterstock/base"
  - "/clusters/production/apps/previews/clutterstock/databases"
  - "/clusters/production/apps/previews/ddnsadmin"
  - "/clusters/production/apps/previews/ddnsadmin/base"
  - "/clusters/production/apps/shared/production"
  - "/clusters/production/flux-system"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "hwinther/clutterstock/*"
    test:
      patterns:
      - "hwinther/test/*"
    fluxcd:
      patterns:
      - "fluxcd/*"
  open-pull-requests-limit: 20

# Production cluster — test-tier apps (separate PRs from prod workloads above).
- package-ecosystem: "docker"
  directories:
  - "/clusters/production/apps/clutterstock-test"
  - "/clusters/production/apps/clutterstock-test-migrate"
  - "/clusters/production/apps/test-test"
  - "/clusters/production/apps/shared/test"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "hwinther/clutterstock/*"
    test:
      patterns:
      - "hwinther/test/*"
  open-pull-requests-limit: 20
