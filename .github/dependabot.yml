# Please see the documentation for all configuration options:
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
- package-ecosystem: "github-actions"
  directories:
  - "/"
  open-pull-requests-limit: 20
  target-branch: "main"
  schedule:
    interval: "weekly"
    day: "monday"
  cooldown:
    default-days: 7

- package-ecosystem: "npm"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

- package-ecosystem: "pip"
  directory: "/"
  schedule:
    interval: "weekly"
  cooldown:
    default-days: 7

# Compose / SDR templates only (separate PR stream from cluster manifests).
- package-ecosystem: "docker"
  directories:
  - "/compose/templates/adsb/adsbexchange"
  - "/compose/templates/adsb/dump1090-fa"
  - "/compose/templates/adsb/fr24"
  - "/compose/templates/adsb/opensky"
  - "/compose/templates/adsb/piaware"
  - "/compose/templates/adsb/tar1090"
  - "/compose/templates/ais/ais-catcher"
  - "/compose/templates/sdr-base/bookworm/base-image"
  - "/compose/templates/sdr-base/bookworm/build-image"
  - "/compose/templates/sdr-base/bullseye/base-image"
  - "/compose/templates/sdr-base/bullseye/build-image"
  - "/compose/templates/sdr-base/buster/base-image"
  - "/compose/templates/sdr-base/buster/build-image"
  schedule:
    interval: "daily"

# Test cluster (test-deployment) — separate from production.
- package-ecosystem: "docker"
  directories:
  - "/clusters/test-deployment"
  - "/clusters/test-deployment/apps"
  - "/clusters/test-deployment/apps/clutterstock-migrate"
  - "/clusters/test-deployment/apps/homepage"
  - "/clusters/test-deployment/apps/headlamp-test"
  - "/clusters/test-deployment/apps/kubevious"
  - "/clusters/test-deployment/apps/kyverno"
  - "/clusters/test-deployment/apps/kyverno-policies"
  - "/clusters/test-deployment/apps/observability"
  - "/clusters/test-deployment/apps/policy-reporter-test"
  - "/clusters/test-deployment/flux-system"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "ghcr.io/hwinther/clutterstock/*"
    test:
      patterns:
      - "ghcr.io/hwinther/test/*"

# edge-sdr cluster (k0s / SDR edge).
- package-ecosystem: "docker"
  directories:
  - "/clusters/edge-sdr"
  - "/clusters/edge-sdr/apps"
  - "/clusters/edge-sdr/apps/traefik"
  - "/clusters/edge-sdr/apps/ceph-csi"
  - "/clusters/edge-sdr/apps/homepage"
  - "/clusters/edge-sdr/apps/headlamp-edge-sdr"
  - "/clusters/edge-sdr/apps/podinfo-edge-sdr"
  - "/clusters/edge-sdr/apps/kyverno"
  - "/clusters/edge-sdr/apps/kyverno-policies"
  - "/clusters/edge-sdr/apps/kubescape-edge-sdr"
  - "/clusters/edge-sdr/apps/policy-reporter-edge-sdr"
  - "/clusters/edge-sdr/flux-system"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "ghcr.io/hwinther/clutterstock/*"
    test:
      patterns:
      - "ghcr.io/hwinther/test/*"

# Production cluster — prod workloads only (excludes in-cluster test apps).
- package-ecosystem: "docker"
  directories:
  - "/clusters/production"
  - "/clusters/production/apps"
  - "/clusters/production/apps/ceph-csi"
  - "/clusters/production/apps/clutterstock"
  - "/clusters/production/apps/clutterstock-migrate"
  - "/clusters/production/apps/headlamp-production"
  - "/clusters/production/apps/kubescape-production"
  - "/clusters/production/apps/kyverno"
  - "/clusters/production/apps/kyverno-policies"
  - "/clusters/production/apps/homepage"
  - "/clusters/production/apps/observability"
  - "/clusters/production/apps/policy-reporter-production"
  - "/clusters/production/apps/traefik"
  - "/clusters/production/apps/shared/production"
  - "/clusters/production/flux-system"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "ghcr.io/hwinther/clutterstock/*"
    test:
      patterns:
      - "ghcr.io/hwinther/test/*"

# Production cluster — test-tier apps (separate PRs from prod workloads above).
- package-ecosystem: "docker"
  directories:
  - "/clusters/production/apps/clutterstock-test"
  - "/clusters/production/apps/clutterstock-test-migrate"
  - "/clusters/production/apps/test-test"
  - "/clusters/production/apps/shared/test"
  schedule:
    interval: "daily"
  groups:
    clutterstock:
      patterns:
      - "ghcr.io/hwinther/clutterstock/*"
    test:
      patterns:
      - "ghcr.io/hwinther/test/*"

- package-ecosystem: "docker-compose"
  directories:
  - "/compose/templates/adsb"
  - "/compose/templates/ais"
  - "/compose/templates/sdr-base"
  schedule:
    interval: "weekly"

- package-ecosystem: "docker-compose"
  directories:
  - "/compose/servers/radio-pi01/ais"
  - "/compose/servers/radio-pi01/adsb"
  assignees: [ "hwinther" ]
  target-branch: "deploy/radio-pi01"
  schedule:
    interval: "daily"

- package-ecosystem: "docker-compose"
  directories:
  - "/compose/servers/radio-pi02/ais"
  - "/compose/servers/radio-pi02/adsb"
  assignees: [ "hwinther" ]
  target-branch: "deploy/radio-pi02"
  schedule:
    interval: "daily"
