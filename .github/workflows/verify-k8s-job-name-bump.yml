name: Verify Kubernetes Job name bump

on:
  pull_request:
    paths:
      - "**/job.yaml"
      - ".github/scripts/verify_job_metadata_name_bump.py"
      - ".github/workflows/verify-k8s-job-name-bump.yml"
  push:
    branches:
      - main
    paths:
      - "**/job.yaml"
      - ".github/scripts/verify_job_metadata_name_bump.py"
      - ".github/workflows/verify-k8s-job-name-bump.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Verify Job name bumps when spec changes
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python .github/scripts/verify_job_metadata_name_bump.py
