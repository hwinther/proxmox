name: Verify Kubernetes Job name bump

on:
  pull_request:
    paths:
      - "**/job.yaml"
      - ".github/scripts/verify_job_metadata_name_bump.py"
      - ".github/workflows/verify-k8s-job-name-bump.yml"
  push:
    branches:
      - main
    paths:
      - "**/job.yaml"
      - ".github/scripts/verify_job_metadata_name_bump.py"
      - ".github/workflows/verify-k8s-job-name-bump.yml"

jobs:
  verify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Verify Job name bumps when spec changes
        id: verify-job-metadata-name
        env:
          BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python .github/scripts/verify_job_metadata_name_bump.py

      - name: Comment on PR when Job name bump is required
        if: github.event_name == 'pull_request' && steps.verify-job-metadata-name.outcome == 'failure'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const marker = '<!-- verify-k8s-job-name-bump -->';
            const body = [
              marker,
              '### Kubernetes Job `metadata.name` must change when the Job spec changes',
              '',
              'This check failed because a `**/job.yaml` file has spec changes compared to the base branch, but `metadata.name` was not bumped.',
              '',
              '**To fix it automatically:** add the label `bump-k8s-job-name` to this PR. The [Bump Kubernetes Job name (label)](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/.github/workflows/bump-k8s-job-name-on-label.yml) workflow will commit the required name bumps.',
              '',
              'You can also bump `metadata.name` yourself and push again.',
            ].join('\n');
            const issue_number = context.payload.pull_request.number;
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
            });
            const existing = comments.find(
              (c) =>
                c.body?.includes(marker) &&
                c.user?.login === 'github-actions[bot]',
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number,
                body,
              });
            }
