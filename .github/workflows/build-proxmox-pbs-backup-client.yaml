name: Publish Proxmox PBS backup client docker image

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    tags: ["v*"]
    paths:
      - ".github/workflows/build-proxmox-pbs-backup-client.yaml"
      - "images/proxmox-pbs-backup-client/**"

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: ${{ github.ref }}-proxmox-pbs-backup-client
  cancel-in-progress: true

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  PACKAGE_NAME: backup-client
  PACKAGE_PATH: /proxmox/pbs/
  PACKAGE_DESCRIPTION: "Proxmox Backup Server client"
  PACKAGE_VENDOR: WSH
  WORKING_DIRECTORY: images/proxmox-pbs-backup-client

jobs:
  publish-docker-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Remove v prefix in tag
        id: remove-v-prefix
        uses: ./.github/actions/git-tag-remove-prefix

      - name: Check for changes in the specified path between tags
        id: git-tag-diff
        uses: ./.github/actions/git-tag-diff
        with:
          file_path: ${{ env.WORKING_DIRECTORY }}

      - name: Build and push docker image
        uses: ./.github/actions/docker
        with:
          package_name: ${{ env.PACKAGE_NAME }}
          package_path: ${{ env.PACKAGE_PATH }}
          package_description: ${{ env.PACKAGE_DESCRIPTION }}
          package_vendor: ${{ env.PACKAGE_VENDOR }}
          working_directory: ${{ env.WORKING_DIRECTORY }}
          push_condition: ${{ github.event_name != 'pull_request' }}
          latest_tag_enabled: ${{ !startsWith(github.ref, 'refs/tags/') }}
          tag: ${{ startsWith(github.ref, 'refs/tags/') && steps.remove-v-prefix.outputs.tag || '0.1.0' }}
          attest_supply_chain: "true"
