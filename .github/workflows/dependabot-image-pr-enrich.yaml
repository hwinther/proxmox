name: Dependabot image PR — version comments & release notes

# When Dependabot bumps digest-pinned images, sync the trailing `# version` comment from
# OCI labels and append GitHub release notes to the PR body (see .github/scripts/enrich_dependabot_image_pr.py).

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - "**/*.yaml"
      - "**/*.yml"

concurrency:
  group: dependabot-image-enrich-${{ github.repository }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  enrich:
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: read
    steps:
      - name: Check out PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Enrich pinned images (comments + PR body)
        id: enrich
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python .github/scripts/enrich_dependabot_image_pr.py

      - name: Commit manifest fixes
        if: steps.enrich.outputs.commit_needed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore(deps): sync digest version comments on Dependabot PR"
          git push
