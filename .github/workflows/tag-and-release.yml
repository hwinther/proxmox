name: "Opprett tag og release"

on:
    workflow_dispatch:
        inputs:
            tag_name:
                description: "Navn på tag (f.eks. v1.2.3)"
                required: false
                default: "auto"
            release_notes:
                description: "Utgivelsesnotater for denne taggen"
                required: false
            create_release:
                description: "Opprett en GitHub Release for denne taggen"
                required: false
                default: true
                type: boolean

permissions:
    contents: write
    # Required so we can dispatch container workflows after tagging (tag push from GITHUB_TOKEN does not fire on.push.tags)
    actions: write

jobs:
    tag:
        # No `secrets:` block: the reusable tag-and-release.yml uses only GITHUB_TOKEN
        # (auto-available to called workflows). Avoids the zizmor "secrets unconditionally
        # inherited" finding.
        uses: hwinther/reusable-workflows/.github/workflows/tag-and-release.yml@fda2ed0c124592518431318dfcd4de7c034777f9 # v1.64.0
        with:
            tag_name: ${{ inputs.tag_name }}
            release_notes: ${{ inputs.release_notes }}
            create_release: ${{ inputs.create_release }}

    # GitHub does not run tag-push workflows when the tag was created with GITHUB_TOKEN; dispatch the same jobs explicitly.
    trigger-container-builds:
        needs: tag
        if: success()
        runs-on: ubuntu-latest
        permissions:
            actions: write
            contents: read
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
              with:
                  fetch-depth: 0

            - name: Determine ref for container builds
              id: ref
              env:
                  TAG: ${{ inputs.tag_name }}
              run: |
                  git fetch --tags --force
                  if [ "$TAG" = "auto" ] || [ -z "$TAG" ]; then
                    REF=$(git tag -l 'v*' --sort=-v:refname | head -n1)
                  else
                    REF="$TAG"
                  fi
                  if [ -z "$REF" ]; then
                    echo "::error::Could not resolve a tag ref for container builds."
                    exit 1
                  fi
                  echo "Using ref: $REF"
                  echo "ref=$REF" >> "$GITHUB_OUTPUT"

            - name: Dispatch proxmox-pbs-backup-client container workflow
              env:
                  GH_TOKEN: ${{ github.token }}
                  REF: ${{ steps.ref.outputs.ref }}
              run: gh workflow run build-proxmox-pbs-backup-client.yml --ref "$REF"
