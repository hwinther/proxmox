name: Publish esp-poller container to GHCR

# Manual-only trigger: this image isn't tied to GitVersion releases, just
# rebuild when poller.py or its deps change.
on:
    workflow_dispatch:
        inputs:
            grype_fail_build:
                description: "Fail the build if Grype finds vulnerabilities"
                type: boolean
                default: true

permissions:
    contents: read
    packages: write
    id-token: write
    attestations: write
    actions: write
    security-events: write
    pull-requests: write

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: false

jobs:
    # Compute a short SHA that the build job appends to gitversion-derived tags as a suffix
    # (e.g. :0.6.1-86a584a). Without this every workflow_dispatch on main publishes the same
    # gitversion tag (GitHubFlow/v1 keeps MajorMinorPatch constant between v* tags) and
    # silently overwrites the previous image.
    setup:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        outputs:
            short_sha: ${{ steps.sha.outputs.short_sha }}
        steps:
        - name: Compute short SHA
          id: sha
          env:
              GITHUB_SHA: ${{ github.sha }}
          run: echo "short_sha=${GITHUB_SHA:0:7}" >> "$GITHUB_OUTPUT"

    esp_poller:
        needs: setup
        # No `secrets:` block: docker-container.yml only takes an optional npm_auth_token
        # (unused here); GITHUB_TOKEN is auto-available to called workflows. Avoids the
        # zizmor "secrets unconditionally inherited" finding.
        uses: hwinther/reusable-workflows/.github/workflows/docker-container.yml@81d8764d1f0c6a18d1e22452f137376c0ec6d023 # v1.59.0
        with:
            container_registry: ghcr.io
            # ghcr.io/<repo-owner>/<repo>/<postfix> → ghcr.io/hwinther/proxmox/esp-poller
            container_image_name_postfix: esp-poller
            build_context: images/esp-poller
            dockerfile: images/esp-poller/Dockerfile
            # Makes gitversion-derived tags unique per commit: :0.6.1 → :0.6.1-86a584a.
            tag_suffix: ${{ needs.setup.outputs.short_sha }}
            grype_fail_build: ${{ github.event_name != 'workflow_dispatch' ||
                fromJSON(github.event.inputs.grype_fail_build || 'true') }}
