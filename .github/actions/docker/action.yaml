name: "Docker build and push"
description: "Build and push docker image to registry"
branding:
  icon: server
  color: black

inputs:
  package_name:
    required: true
    description: Short form of package name
  package_path:
    required: false
    description: Path to the package in the registry
    default: "/"
  package_description:
    required: true
    description: A longer description of the package
  package_vendor:
    required: true
    description: Vendor name
  working_directory:
    required: true
    description: Working directory path, where the Dockerfile is located
  platforms:
    required: false
    description: Platforms to build for
    default: "linux/amd64, linux/arm64"
  push_condition:
    required: false
    description: Condition to push the image
    default: ${{ github.event_name != 'pull_request' }}
  tag:
    required: false
    description: Additional tag to apply to the image
  edge_tag_enabled:
    required: false
    description: Enable edge tag for default branch
    default: "false"
  branch_tag_enabled:
    required: false
    description: Enable branch tag
    default: "false"
  latest_tag_enabled:
    required: false
    description: Enable latest tag for default branch
    default: "false"
  attest_supply_chain:
    required: false
    description: >-
      After push, attach SLSA provenance (registry + GH API), Cosign CycloneDX SBOM, and Grype vuln attestations for Kyverno verifyImages. Requires job permissions id-token:write, attestations:write. Cosign is pinned to v2.x so attestations are stored as registry manifests compatible with Kyverno’s verifyImages fetch path (sha256-….att); Cosign v3+ prefers OCI referrers only, which Kyverno 1.17’s embedded cosign does not resolve.
    default: "false"

runs:
  using: "composite"
  steps:
  - name: Calculate Container Metadata
    id: meta
    uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
    with:
      images: ghcr.io/${{ github.repository }}${{ inputs.package_path }}${{ inputs.package_name }}
      tags: |
        type=edge,branch=main,enable=${{ github.ref == 'refs/heads/main' && inputs.edge_tag_enabled == 'true' }}
        type=ref,event=tag,enable=${{ inputs.branch_tag_enabled == 'true' }}
        type=ref,event=branch
        # set latest tag for default branch if tag has not been provided
        type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' && inputs.latest_tag_enabled == 'true' }}
        type=raw,value=${{ inputs.tag }},enable=${{ (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')) && inputs.tag != '' }}
      labels: |
        org.opencontainers.image.title=${{ inputs.package_name }}
        org.opencontainers.image.description=${{ inputs.package_description }}
        org.opencontainers.image.vendor=${{ inputs.package_vendor }}

  - name: Setup QEMU
    uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0

  - name: Setup Buildx
    uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

  - name: Login to GitHub Container Registry
    uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
    with:
      registry: ghcr.io
      username: ${{ github.actor }}
      password: ${{ env.GH_TOKEN }}

  - name: Build and Push Images
    id: build
    uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
    with:
      context: ${{ inputs.working_directory }}
      platforms: ${{ inputs.platforms }}
      push: ${{ inputs.push_condition }}
      tags: ${{ steps.meta.outputs.tags }}
      labels: ${{ steps.meta.outputs.labels }}
      outputs: type=image,name=target,annotation-index.org.opencontainers.image.description=${{ inputs.package_description }}
      # provenance: false # To simplify pruning
      # sbom: false

  - name: Attest SLSA provenance (registry)
    if: ${{ inputs.push_condition == 'true' && inputs.attest_supply_chain == 'true' }}
    uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
    with:
      subject-name: ghcr.io/${{ github.repository }}${{ inputs.package_path }}${{ inputs.package_name }}
      subject-digest: ${{ steps.build.outputs.digest }}
      push-to-registry: true

  - name: Install Cosign
    if: ${{ inputs.push_condition == 'true' && inputs.attest_supply_chain == 'true' }}
    uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
    with:
      # Kyverno 1.17 resolves attestations like cosign v2 (.att manifest). Cosign v3 publishes via referrers → 404 on cluster.
      # See https://github.com/sigstore/cosign/issues/4708 for updates on the issues resolution.
      cosign-release: v2.4.3

  - name: Install Syft and Grype
    if: ${{ inputs.push_condition == 'true' && inputs.attest_supply_chain == 'true' }}
    shell: bash
    env:
      SYFT_VERSION: v1.38.0
      GRYPE_VERSION: v0.87.0
    run: |
      set -euo pipefail
      curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin "${SYFT_VERSION}"
      curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh | sh -s -- -b /usr/local/bin "${GRYPE_VERSION}"

  - name: Cosign attest SBOM and vulnerability scan
    if: ${{ inputs.push_condition == 'true' && inputs.attest_supply_chain == 'true' }}
    shell: bash
    env:
      COSIGN_EXPERIMENTAL: "1"
      REGISTRY_TOKEN: ${{ env.GH_TOKEN }}
      REGISTRY_USER: ${{ github.actor }}
      IMAGE_REF: ghcr.io/${{ github.repository }}${{ inputs.package_path }}${{ inputs.package_name }}@${{ steps.build.outputs.digest }}
    run: |
      set -euo pipefail
      echo "${REGISTRY_TOKEN}" | cosign login ghcr.io -u "${REGISTRY_USER}" --password-stdin
      syft "${IMAGE_REF}" -o cyclonedx-json=/tmp/sbom.cdx.json
      cosign attest --yes --predicate /tmp/sbom.cdx.json --type cyclonedx "${IMAGE_REF}"
      grype "${IMAGE_REF}" -o json > /tmp/grype.json
      cosign attest --yes --predicate /tmp/grype.json --type vuln "${IMAGE_REF}"
